usage_tips:
  - 把普通桶投向主要进攻塔，让诱饵桶迫使对手决定如何分配法术和单位。
  - 在对手只有一张可靠小法术时使用，双路同时落地更容易让一侧哥布林获得攻击机会。
  - 改变普通桶落点，避免对手只看固定位置就能立即判断和预判防守。
matchups:
  - { title: 适合应对, text: 只有一张小法术或防守资源集中在单路的卡组，双路落桶能迫使其拆分应对。 }
  - { title: 需要提防, text: 多张范围法术、范围塔楼部队和能快速辨认诱饵的对手会显著降低额外压力。 }
  - { title: 搭配思路, text: 与公主、哥布林团伙等诱饵卡配合，持续消耗对手范围法术并制造双路选择。 }
