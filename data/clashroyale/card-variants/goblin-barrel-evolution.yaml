overview:
  - 觉醒哥布林飞桶在目标位置投下普通飞桶的同时，会向另一座公主塔投下一只诱饵桶。诱饵桶同样放出三名哥布林，但生命值和伤害较低，用于迫使对手同时照顾两路。
  - 对手可以根据飞桶起飞时短暂不同的视觉效果辨认诱饵，范围法术也能低费处理一侧。觉醒价值来自分散防守资源，而不是让诱饵哥布林拥有与本体相同的输出。
