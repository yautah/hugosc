usage_tips:
  - 等英雄法师已经锁定推进目标后再开技能，避免五秒持续时间浪费在赶路上，并让连续火球尽可能多地触发龙卷风。
  - 地面单体单位贴近时可用升空暂时规避攻击，但仍要用其他单位承接目标，否则技能结束后法师和皇家塔会再次承压。
  - 对付坦克带后排的推进时，龙卷风可以把单位拉近，让普通范围火球同时命中更多目标。
  - 技能冷却较长，不要只为少量皇家塔消耗随意开启；优先用于关键防守或能形成完整反击的时点。
matchups:
  - { title: 适合应对, text: '适合聚集推进和只能攻击地面的追击单位，升空与拉扯能同时获得生存和范围输出收益。' }
  - { title: 需要提防, text: '远程防空、减速、眩晕与强制落地会减少技能攻击次数；技能结束后的本体仍只有普通法师的耐久。' }
  - { title: 搭配思路, text: '与高生命值前排和其他范围输出配合，让龙卷风持续聚集敌军；也可搭配建筑延长防守时间，等技能完成多次攻击。' }
