overview:
  - 英雄法师保留普通法师的范围火球，主动技能“烈焰飞行”在一秒准备后让他升空五秒，并提高 50% 移动速度。飞行期间每次攻击都会生成火焰龙卷风，拉扯空中和地面目标并造成额外伤害。
  - 技能可以暂时躲开只能攻击地面的单位，并把推进中的前后排聚在一起，但二十秒冷却和短暂持续时间要求准确把握开火时机。藤蔓等强制落地效果和减速控制会明显降低技能收益。
