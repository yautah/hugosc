usage_tips:
  - 与气球兵、戈仑石人等建筑目标单位同行，让风场缩短其接近目标的时间，同时用范围伤害清理沿途人海。
  - 防守时把飞龙宝宝放在敌军推进侧面，让大范围风场覆盖主力并减缓移动，为皇家塔和其他防守单位争取输出时间。
  - 风场只在攻击期间稳定存在，应确保附近有可攻击目标；被拉离战场或迟迟不接敌会浪费觉醒能力。
  - 阵亡后仍有约两秒残留，可在即将被消灭时利用最后的减速完成防守，或让后续进攻单位继续获得短暂加速。
matchups:
  - { title: 适合应对, text: '适合减缓密集推进和近战单位，并帮助慢速建筑目标单位更快接近；范围伤害还能同步处理人海。' }
  - { title: 需要提防, text: '高伤防空、拉扯和远离风场的分散部署会降低能力覆盖，本体单体伤害仍不足以快速处理高生命值目标。' }
  - { title: 搭配思路, text: '与气球兵、熔岩猎犬、戈仑石人和圣水戈仑搭配，利用移动加速扩大推进压力。' }
