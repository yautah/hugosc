overview:
  - 觉醒飞龙宝宝本体属性与普通形态一致，攻击时会在周围形成八乘九格的风场。风场使范围内友军移动速度提高百分之三十，同时让敌军移动速度降低百分之三十。
  - 飞龙宝宝被消灭后，风场还会停留约两秒。效果只改变移动速度，不直接提高攻击速度；它最适合帮助建筑目标单位更快接近目标，或在防守中拖慢敌军推进。
