usage_tips:
  - 让前排先吸引目标，确保烟花炮手完成至少一次攻击；火花区域需要命中并覆盖行进路线，才能把持续伤害完整转化为价值。
  - 利用她的超长投射距离让主弹锁定前排、弹片覆盖后排，持续火花可以同时限制支援单位和皇家塔附近区域。
  - 不要为了触发觉醒把她直接暴露在桥头。她生命值没有额外提升，火球、万箭齐发和快速贴身单位仍能及时处理。
  - 对手必须穿过固定路线推进时，优先让火花落在桥口或建筑附近；减速能延长单位停留时间，并为其他防守争取更多输出。
matchups:
  - { title: 适合应对, text: '移动缓慢、沿同一路线推进的成组单位。持续火花能够覆盖其行进路径，并利用 15% 减速延长受伤时间。' }
  - { title: 需要提防, text: '火球、万箭齐发、矿工和能够迅速贴身的单位。觉醒形态没有额外生命值，未完成开火前与普通烟花炮手同样脆弱。' }
  - { title: 搭配思路, text: '与皇家巨人、野猪骑士等前排或建筑目标单位配合，迫使对手集中防守，再利用弹片和火花持续消耗后排与皇家塔。' }
balance_history:
  - date: '2025-08-04'
    type: nerf
    summary: 视野范围从 8.5 格缩短至 8 格，开火后后坐距离从 1.5 格缩短至 1 格。
  - date: '2025-02-04'
    type: adjustment
    summary: 狂暴樵夫进入幽灵状态时不再受到火花区域影响。
  - date: '2025-01-30'
    type: adjustment
    summary: 符文巨人的伤害强化改为平均分配到五枚弹片，而不是让每枚弹片获得完整增幅。
  - date: '2024-05-14'
    type: adjustment
    summary: 大火花持续时间从 2.5 秒延长至 3 秒，小火花从 2 秒延长至 2.5 秒，并新增 15% 减速；同时移除额外生命值增幅。
  - date: '2023-08-08'
    type: nerf
    summary: 生命值增幅从 143% 降低至 130%，后坐距离从 1.95 格缩短至 1.5 格，同类火花区域的伤害不再叠加。
  - date: '2023-06-30'
    type: nerf
    summary: 首次攻击间隔从 0.6 秒延长至 0.65 秒。
  - date: '2023-06-19'
    type: evolution
    summary: 觉醒烟花炮手正式加入游戏，推出大、小火花区域持续伤害机制。
