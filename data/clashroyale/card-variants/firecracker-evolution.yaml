overview:
  - 觉醒烟花炮手保留普通形态的远距离散射和开火后坐。主弹着地点会形成一个持续三秒的大火花区，五枚分裂弹片的落点各形成持续 2.5 秒的小火花区；区域每 0.25 秒结算一次伤害，并使其中目标减速 15%。
  - 大火花与小火花适合持续封锁单位行进路线，但同类火花的伤害不能在同一目标上叠加。她仍然需要较长时间完成一次攻击，也会被法术和快速贴身单位处理，因此价值取决于能否让至少一发完整落在关键区域。
