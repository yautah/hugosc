usage_tips:
  - 把技能留给需要改变路线的关键推进，炮塔作为建筑可以把野猪骑士、巨人等目标从皇家塔前拉开。
  - 炮塔生成在火枪手前方，部署本体时应提前考虑三格位置，避免炮塔出现在无法拉扯或会让火枪手一起承受范围伤害的位置。
  - 本体加技能共需七费，普通火枪手已经能完成防守时不要额外召唤；炮塔十秒后会自然消失，空放收益很低。
  - 面对空地混合推进时，炮塔与火枪手可以形成两处对空火力，但仍要防止火球或雷电法术同时命中两个高价值目标。
matchups:
  - { title: 适合应对, text: '野猪骑士、巨人和其他只攻击建筑的单位。临时炮塔既改变路线，也能与火枪手共同输出。' }
  - { title: 需要提防, text: '雷电巨人、范围法术和能同时覆盖本体与炮塔的攻击。技能费用较高，错误召唤容易形成明显费用劣势。' }
  - { title: 搭配思路, text: '与控制法术和低费防守搭配，把敌军固定在炮塔射程内；防守后保留火枪手本体，再用前排组织反击。' }
