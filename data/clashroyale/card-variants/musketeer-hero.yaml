  - { label: 基础卡牌, value: 火枪手 }
overview:
  - 精英火枪手的基础远程输出与普通火枪手相近，主动技能会在约一秒施放后，于她前方三格处召唤一座随身炮塔。炮塔可以攻击空中和地面，也具有建筑属性，能够吸引野猪骑士、巨人等只攻击建筑的单位。
  - 炮塔只持续十秒，并会随时间损失生命值，因此更适合在关键防守时临时改变路线，而不是当作长期建筑。火枪手和技能合计七费，错误时机召唤会让整次防守成本过高；应同时计算拉扯价值、炮塔输出和火枪手本体的安全位置。
