usage_tips:
  - 等关键防守单位进入两格抓取范围后再发动技能，过早施放只会等待目标，给对手调整站位的时间。
  - 把高伤害近战单位扔到另一条路线，可以暂时保护巨人与后排；同时要准备处理目标落地后的反向压力。
  - 建筑无法被投掷，面对地狱之塔等核心建筑时仍需依靠法术、控制或支援单位解决。
  - 技能合计费用较高，对手只有低威胁单位时保留两费，通常比强行使用更有价值。
matchups:
  - { title: 适合应对, text: '适合移走威猛矿工、超级骑士等单个高生命值防守者，暂时清空巨人所在路线并打乱对手的支援关系。' }
  - { title: 需要提防, text: '防御建筑、人海和分散部署能明显降低投掷收益；被扔到另一条路线的单位仍然存活，可能形成新的反击。' }
  - { title: 搭配思路, text: '与墓园、双王子或高输出后排配合，利用投掷移走主要拦截单位，让其他进攻组件继续接近皇家塔。' }
