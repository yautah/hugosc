overview:
  - 精英巨人的基础属性和普通巨人一致，主动技能“巨力投掷”会在短暂施放后，抓起自身两格内生命值最高的一名敌方单位，将其横向扔出九格。目标落地时会受到伤害并眩晕两秒，能够把主要防守者从巨人所在路线暂时移开。
  - 技能只影响单个部队，不能把建筑从路线中移走，对人海的作用也很有限。精英巨人和技能合计七费，使用前需要判断被扔走的目标是否足够关键，以及另一条路线是否会因此形成新的防守压力。
