usage_tips:
- 等第一批哥布林已经迫使对手交出主要范围法术后再激活技能，能提高第二批援军存活并形成反击的概率。
- 关注最后一只哥布林的位置；在己方半场留下旗帜更适合继续防守，在桥头或皇家塔附近留下则能形成更直接的进攻压力。
- 不要因为技能只需一费就无条件使用。第一批会被快速清除、或对手仍有第二张范围牌时，保留圣水往往更稳妥。
- 配合其他法术诱饵时，可利用第一批哥布林试探对手回应，再决定援军是继续同路施压还是保留技能应对下一轮。
matchups:
- title: 适合应对
  text: 依赖单次范围法术处理人海、缺少连续清场能力的卡组。第一批被解决后，限时旗帜仍会迫使对手为第二批哥布林保留回应。
- title: 需要提防
  text: 同时携带多张低费范围伤害、能够持续清理小单位的范围部队，以及可在旗帜生成位置附近提前控场的法术。
- title: 搭配思路
  text: 适合滚木诱饵和矿工消耗体系，也能与公主、哥布林飞桶等牌共享对手的小法术压力；卡组应准备稳定对空，避免三费投入后被换路空军惩罚。
