overview:
- 精英哥布林的基础部署仍然是四个两费近战单位，主动技能“旗帜援军”需要额外消耗一费。技能激活后，最后一只精英哥布林被击败时会留下旗帜，并在旗帜有效期内召来三只哥布林，使对手需要准备第二次清场手段。
- 这项技能不会立即增加场上单位，收益取决于最后一只哥布林的死亡位置和旗帜能否持续存在。过早激活可能让第一批和援军被同一套范围伤害连续处理，激活过晚则可能来不及留下旗帜；三费总投入也要求玩家提前判断对手的小法术循环。
