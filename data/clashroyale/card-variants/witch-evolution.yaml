usage_tips:
  - 从国王塔后部署，让首批骷髅兵先行并在接战后提供治疗，通常比桥头直接使用更容易积累超额生命。
  - 面对轻型范围攻击时，不要急于保护每一只骷髅；骷髅被击败可以换取治疗，但本体仍要避开能够一次造成高额伤害的单位。
  - 与慢速前排搭配时保持间距，避免雷电或火箭同时命中前排支援和女巫；治疗不能弥补一次被高伤害法术直接击败。
  - 计算对手法术周期，等关键高伤害法术离手后再投入觉醒女巫，能显著提高持续召唤和治疗的上限。
matchups:
  - { title: 适合应对, text: '适合消耗单体攻击和低频范围单位，骷髅兵死亡后的治疗可以抵消部分持续伤害，并让本体在慢速交战中越战越久。' }
  - { title: 需要提防, text: '火箭、雷电等高伤害法术和能够快速接近本体的单位仍是直接解法；范围伤害若能同时覆盖本体，也不会只留下治疗收益。' }
  - { title: 搭配思路, text: '与巨人、戈仑石人和气球兵等慢速推进组合，让前排吸引主要火力，觉醒女巫在后方召唤、治疗并处理空地防守。' }
