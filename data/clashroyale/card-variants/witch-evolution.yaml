overview:
  - 觉醒女巫保留普通女巫的攻击和召唤方式，核心差异是她自己召唤的普通骷髅兵被击败后会为她恢复生命。治疗可以超过初始生命上限，最高达到基础生命值的 124%，因此骷髅兵不仅承担拉扯，也会直接延长本体存活时间。
  - 治疗只由觉醒女巫自己召唤的普通骷髅兵触发，其他骷髅、觉醒骷髅和骷髅护卫均不能提供治疗。高伤害法术仍可直接处理本体；用低伤害范围攻击反复清理骷髅兵，反而可能让她维持较高生命值。
