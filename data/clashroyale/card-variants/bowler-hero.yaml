overview:
  - 精英巨石投手保留普通形态的生命值、伤害和滚石攻击，新增“远投三分”技能。发动后会经过 2.5 秒准备并固定在原地，攻击方式暂时改为最远 11.5 格的抛投，巨石落点造成圆形范围伤害，但不再沿直线滚动或击退敌军。
  - 2026 年 6 月调整后技能持续 7.3 秒，通常能够投出三颗巨石。技能对皇家塔只有 50% 伤害，因此价值主要来自超远距离覆盖、提前打击后排和迫使对手改变站位，而不是无条件远程削塔。
