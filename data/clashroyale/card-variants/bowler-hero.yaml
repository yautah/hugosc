usage_tips:
  - 在对手后排或皇家塔进入 11.5 格射程、且巨石投手暂时不需要移动时发动技能，避免准备动作结束后没有合适目标。
  - 技能攻击不带直线贯穿和击退，防守快速地面推进时普通攻击往往更可靠；不要因为技能可用就立即失去原本的控制能力。
  - 利用建筑或前排固定敌军位置，让远投巨石覆盖后排与皇家塔附近区域；对手若分散站位，落点范围价值会明显降低。
  - 技能持续时间有限且额外消耗两费，优先用于跨河压制高价值单位或制造明确的塔前压力。
matchups:
  - { title: 适合应对, text: '适合远程压制女巫、火枪手等后排，或在推进被建筑牵制时越过前排打击后方单位。' }
  - { title: 需要提防, text: '技能准备和持续期间无法移动，突进单位、法术和分散站位都能降低远投收益；空军仍可直接攻击他。' }
  - { title: 搭配思路, text: '与坦克、建筑和龙卷风搭配，固定战线或聚拢目标，为三次远投创造稳定落点。' }
