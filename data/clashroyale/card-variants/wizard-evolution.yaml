usage_tips:
  - 面对密集地面部队时可以部署在其附近，利用护盾破裂的伤害与击退先创造距离，再让普通火球继续清场。
  - 对手有火球或雷电法术时，护盾能避免法师被一次解决，但仍应与其他高价值单位分散，防止法术获得额外收益。
  - 小法术能先破盾，部署前观察对手是否留有滚木、电击法术或巨型雪球，不要把护盾等同于稳定存活保证。
  - 护盾爆炸会改变敌军位置，可与皇家塔、建筑和其他范围单位配合，让被推开的目标重新进入己方火力范围。
matchups:
  - { title: 适合应对, text: '适合密集人海和依赖单次高伤害清后排的防守，护盾爆炸还能拉开贴身单位与法师的距离。' }
  - { title: 需要提防, text: '小法术可以低成本破盾，不受击退的重型单位也能继续前进；连续控制会压缩法师后续输出。' }
  - { title: 搭配思路, text: '与巨人、戈仑石人等前排搭配保护护盾，并用飓风法术聚集目标，让范围攻击和护盾爆炸覆盖更多单位。' }
