overview:
  - 觉醒法师的普通攻击与基础形态相同，额外获得一层独立火焰护盾。护盾存在时可以挡住一次足以击败法师的攻击，破裂后对三格内敌军造成伤害，并把可推动单位击退三格。
  - 护盾让他更难被单张高伤害法术直接清除，也能在敌军贴身时创造空间。小法术可以低成本先破盾，重型单位又不受击退，因此部署位置仍决定他能否持续输出。
