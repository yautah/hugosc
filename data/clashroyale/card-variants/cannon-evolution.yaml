overview:
  - 觉醒加农炮保留普通形态的持续输出和地面拉扯能力，部署时额外向半径两格范围发射九发炮弹。弹幕能快速削弱靠近落点的地面单位，为加农炮争取稳定开火的时间。
  - 弹幕只在部署时触发，而且对皇冠塔伤害明显降低。若落点附近没有合适目标，觉醒收益就会被浪费；它仍然无法攻击空中单位，也会被远程部队和法术快速处理。
