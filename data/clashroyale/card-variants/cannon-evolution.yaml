usage_tips:
  - 尽量让部署弹幕同时命中多个地面单位，再利用建筑位置完成后续拉扯。
  - 面对单个高生命值目标时，把落点贴近其行进路线，确保九发炮弹尽可能集中命中。
  - 不要为了皇冠塔伤害强行前置部署，弹幕对塔伤害较低，防守价值通常更高。
matchups:
  - { title: 适合应对, text: 适合处理靠近落点的地面人海和中型推进，弹幕可先削弱目标，再由本体持续输出。 }
  - { title: 需要提防, text: 空中单位、远程高伤和法术仍能绕开或快速处理加农炮，分散目标也会降低弹幕集中伤害。 }
  - { title: 搭配思路, text: 与减速、拉扯和击退效果配合，把更多地面单位聚到部署区域，提高弹幕命中率。 }
