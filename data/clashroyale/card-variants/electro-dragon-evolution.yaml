overview:
  - 觉醒雷电飞龙的攻击先按普通形态命中最多三个目标并造成眩晕，第三个目标之后，只要附近仍有另一个可连接单位，雷电就会继续在目标之间反复弹射。后续弹射伤害降低、速度变慢，并且不再眩晕。
  - 无限连锁需要至少两个相互靠近的存活目标，面对单个坦克时不会产生额外弹射。它最擅长处理分裂、召唤或密集推进，目标越多且生命值越高，雷电往返次数越容易累积。
