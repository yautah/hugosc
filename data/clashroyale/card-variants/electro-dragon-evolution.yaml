usage_tips:
  - 等对手的分裂或召唤单位聚集后再部署，确保雷电前三跳后仍保留至少两个相邻目标，让后续弹射持续发生。
  - 配合飓风法术把单位拉到四格连接范围，既能增加首轮命中数，也能防止后续弹射因目标分散而中断。
  - 单个高生命目标不会触发无限连锁，不要为了觉醒效果单独面对皮卡超人或戈仑石人，应等待其后排或分裂单位进入范围。
  - 本体仍然是五费中等生命单位，需要前排承伤；如果被远程单位或法术快速处理，再强的连锁也无法完成第二轮攻击。
matchups:
  - { title: 适合应对, text: '对戈仑石人、熔岩猎犬、圣水戈仑等会分裂的单位，以及女巫、墓园等持续生成目标的体系尤其有效。' }
  - { title: 需要提防, text: '分散部署和单体高伤害能切断连锁并快速处理本体，单个孤立单位也不会提供无限弹射条件。' }
  - { title: 搭配思路, text: '与重型前排和飓风法术搭配，前排保护本体，飓风维持目标密度，让雷电在多个单位间持续往返。' }
