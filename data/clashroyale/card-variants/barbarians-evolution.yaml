overview:
- 觉醒野蛮人仍然一次部署五个地面近战单位，每个单位的生命值比普通野蛮人高 10%。他们完成攻击后会在 3 秒内提高 30% 的攻击速度和移动速度，持续攻击可以刷新加速时间，使五人合计输出迅速提高。
- 加速需要先完成攻击才能启动，因此觉醒野蛮人最擅长围住坦克或从防守转入反击。面对火球配合补充伤害、范围攻击或持续击退时，他们仍可能在建立加速前损失大量单位；五费投入也意味着部署位置和对手法术轮转比普通低费觉醒更重要。
