usage_tips:
- 用觉醒野蛮人包围高生命值地面单位，让多名单位尽快完成首次攻击并进入加速状态，比在远处追赶目标更容易发挥机制价值。
- 防守后只要还有两到三名觉醒野蛮人存活，就能利用已经启动的加速形成反击；此时再补坦克或法术通常比桥头直接下满五人更稳定。
- 在国王塔后方分路部署可以降低范围法术收益，但也会拆散合计输出，应根据两路压力和对手法术决定是否分兵。
- 面对持续击退或范围伤害单位时，优先用其他卡牌处理核心威胁，避免觉醒野蛮人在无法接触目标时被逐步消耗。
matchups:
- title: 适合应对
  text: 高生命值地面坦克、野猪骑士和攻城锤等建筑目标单位。完成首次攻击后，加速能让他们更快结束防守并保留反击单位。
- title: 需要提防
  text: 火球配合低费法术、毒药法术、范围伤害和持续击退。对手若能在首次攻击前削减单位数量，觉醒机制的整体收益会明显下降。
- title: 搭配思路
  text: 可用于火球诱饵和分路体系，也适合与能够吸收范围伤害或控制防守单位的前排搭配，让存活的觉醒野蛮人持续刷新加速。
