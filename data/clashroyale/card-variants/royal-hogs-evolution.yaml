overview:
  - 觉醒皇家野猪部署时处于飞行状态，直接朝最近建筑移动。飞行期间只能被能够攻击空中的单位和法术命中；一旦受伤或到达目标，它们会坠落并造成小范围落地伤害，之后按普通皇家野猪继续攻击建筑。
  - 四只野猪分别判断受击与落地，因此对手可以通过范围法术让它们提前统一落下，也可能被迫分散防空火力。当前落地伤害经过两次削弱，主要价值已经转向越过地面防守和改变可选目标，而非依靠爆发清场。
