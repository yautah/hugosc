usage_tips:
  - 先判断对手的防空和法术：缺少对空手段时集中一侧可以最大化飞行接近距离，有范围法术时分路能降低一次命中四只的收益。
  - 地面建筑仍会吸引飞行中的野猪，配合地震法术提前削弱建筑，可以让落地后的普通攻击更快转向皇家塔。
  - 不要依赖当前落地伤害单独清理人海；它需要两只野猪同时落地才能击败部分低生命值单位，应准备小法术补充清场。
  - 与后排单位反击时，飞行阶段不会为只能攻击地面的敌军承伤，注意保护单位的实际目标顺序可能与普通皇家野猪不同。
matchups:
  - { title: 适合应对, text: '适合越过只能攻击地面的拦截单位，并用四个飞行目标分散单体防空；抵达建筑时还可补充范围伤害。' }
  - { title: 需要提防, text: '范围法术会让多只野猪提前落地，防空范围单位和中央建筑也能稳定限制飞行阶段的路线收益。' }
  - { title: 搭配思路, text: '与地震法术、火球和分路远程单位配合，先处理建筑与范围防守，再让落地后的野猪持续攻击。' }
