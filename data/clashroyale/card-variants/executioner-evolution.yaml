overview:
  - 觉醒飞斧屠夫保留普通形态的生命值与回旋飞斧。斧头处于自身 2.5 格范围内时，每段会触发近身强化伤害；去程还能击退可推动的敌军 1 格，回程继续追加伤害但不再次击退。
  - 强化机制主要保护飞斧屠夫的近身区域，并不能提升远端斧头伤害。重型单位不受击退，远程单位也能站在强化范围外输出，因此仍需要站位、前排和龙卷风协助。
