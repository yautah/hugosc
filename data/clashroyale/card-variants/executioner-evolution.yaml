usage_tips:
  - 把觉醒飞斧屠夫部署在需要保护的区域后方，让突进单位进入 3.5 格强化范围后再被飞斧击退并承受额外伤害。
  - 配合龙卷风把分散目标拉入近身强化范围，尽量让去程与回程都穿过同一批单位。
  - 对重型单位不要依赖击退，皮卡超人、超级骑士等仍可继续接近；需要前排、建筑或高单体伤害补足防守。
  - 一次觉醒周期使其能较频繁登场，但五费投入仍较重，普通形态能够完成防守时不必为了轮转强行下牌。
matchups:
  - { title: 适合应对, text: '适合处理可击退的地面突进、人海与空地混合推进，近身额外伤害能迅速清理贴脸单位。' }
  - { title: 需要提防, text: '重型单位免疫击退，远程单位可在强化范围外输出；高伤法术也能显著压低他的持续防守能力。' }
  - { title: 搭配思路, text: '与龙卷风、冰人和防御建筑组合，主动把目标送入强化范围并保证飞斧完整往返。' }
