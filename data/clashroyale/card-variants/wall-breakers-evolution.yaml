overview:
  - 觉醒攻城炸弹人保留普通形态的生命值与连接伤害。当外层火药桶在接触建筑前被摧毁时，会立即造成范围死亡伤害，并各自生成一名继续冲向建筑的炸弹人，使对手必须连续完成两次拦截。
  - 桶破坏后的死亡伤害对部队与皇冠塔采用不同数值，2026 年调整后更偏向进攻续航而非防守清场。生成单位生命值更低、连接伤害也低于普通形态，但速度同样极快。
