usage_tips:
  - 利用第一段死亡爆炸削弱防守单位，再让后续炸弹人继续冲塔；对手若只准备一次攻击或一个单体单位，往往难以连续处理两段。
  - 与矿工或冰人配合承受塔伤，可以同时提高外层与后续单位的连接机会；两费低成本也适合在另一条路制造即时压力。
  - 不要过度依赖死亡伤害防守大型推进，2026 年后对部队伤害已经降低，主要价值仍是迫使对手完成第二次拦截。
  - 面对范围攻击时适当分路或错开节奏，避免同一轮伤害同时摧毁两个桶并快速清理全部后续单位。
matchups:
  - { title: 适合应对, text: '对单体攻击、攻击间隔较长或只准备一次拦截的防守特别有效，后续单位能利用攻击空档继续冲塔。' }
  - { title: 需要提防, text: '炸弹塔、女武神等持续范围伤害可以连续覆盖两段单位，建筑也能把全部冲锋集中到可控位置。' }
  - { title: 搭配思路, text: '与矿工、冰人和雪球搭配，用前排承伤、雪球击退防守者，让两个阶段的单位依次获得连接窗口。' }
