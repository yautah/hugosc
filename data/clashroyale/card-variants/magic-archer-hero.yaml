overview:
  - 精英神箭游侠拥有“连环三箭”能力。花费两点圣水后，他会向后位移 3.5 格，在原位置留下诱饵，并让下一次攻击同时射出三支穿透箭。
  - 三支箭的最大飞行距离为 13.5 格，可从不同角度穿过多个目标。能力既能躲开近战追击、重新拉开射程，也能借诱饵吸引锁定；但诱饵生命值较低，不能承担长时间前排作用。
