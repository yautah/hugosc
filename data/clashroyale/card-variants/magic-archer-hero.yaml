usage_tips:
  - 等近战或突进单位接近后再发动能力，后撤可以重新拉开距离，诱饵则留在原地承受锁定，为后续穿透攻击争取时间。
  - 三箭具有不同角度，先观察敌军和皇家塔的位置再启动；只为躲避一次普通攻击而浪费三箭连线，往往无法收回两点圣水成本。
  - 2026 年 7 月后后撤距离和三箭飞行距离都已缩短，不能继续按早期五格位移估算安全距离，应给神箭游侠保留额外保护。
  - 防守精英神箭游侠时可从侧面或后方包夹，避免所有单位与皇家塔排成一线；诱饵生命值很低，不必为它单独投入高费解牌。
matchups:
  - { title: 适合应对, text: '适合从近战追击中脱身，并利用三支穿透箭覆盖成组推进、建筑和皇家塔连线。' }
  - { title: 需要提防, text: '火球、毒药法术和多方向包夹不会因后撤完全失效，快速单位也可能越过诱饵再次接近本体。' }
  - { title: 搭配思路, text: '与飓风法术、低费前排和桥头施压单位搭配，先聚集或固定目标，再用三箭扩大穿透范围。' }
