overview:
  - 觉醒哥布林巨人保留本体和两名背包投矛手的基础属性，当生命值降到 50% 以下后，每隔 2.2 秒额外放出一只近战哥布林。对手处理本体的时间越长，场上累积的哥布林就越多。
  - 额外哥布林能包围单体防守单位并继续向塔施压，但它们仍会被范围伤害和小法术快速清理。觉醒效果的价值取决于本体在半血以下还能存活多久，而不是只看是否触发。
