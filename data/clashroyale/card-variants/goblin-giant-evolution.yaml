usage_tips:
  - 让本体在接近对手防线时进入半血，生成的哥布林才能立即围攻防守单位；过早触发会让它们在赶路途中被范围伤害清理。
  - 准备法术处理女武神、飞斧屠夫等范围单位，这些卡牌能同时伤害本体、投矛手和持续生成的哥布林。
  - 本体半血后的存活时间决定生成数量，可用眩晕重置地狱系伤害，或用高威胁后排迫使对手分散输出。
  - 防守觉醒哥布林巨人时优先快速击败本体，再用范围伤害清理残留单位，避免单体防守者被不断生成的哥布林包围。
matchups:
  - { title: 适合应对, text: '对依赖单体地面防守的卡组压力很大，持续生成的哥布林会分散攻击并保护后排推进单位。' }
  - { title: 需要提防, text: '地狱之塔和高单体伤害能缩短生成窗口，女武神、炸弹塔等范围伤害则能同时清理本体周围单位。' }
  - { title: 搭配思路, text: '与电磁炮、狂暴法术和眩晕效果搭配，用哥布林群分散防守，再让核心后排处理范围单位与建筑。' }
