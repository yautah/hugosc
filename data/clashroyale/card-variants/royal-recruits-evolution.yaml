overview:
- 觉醒皇家卫队仍然部署六名属性与基础形态相同的带盾单位。每名卫队的盾牌被击破后，会获得类似王子的冲锋能力；连续移动 2.5 格便进入冲锋状态，命中目标时造成两倍伤害。六名单位通常分赴两路，因此一次觉醒可以同时在两侧制造必须处理的冲锋威胁。
- 冲锋不是部署后立即生效，必须先失去盾牌并获得足够的直线移动距离。持续范围伤害可以在破盾后继续清理本体，建筑和低费单位也能打断冲锋路线；反过来，若对手只完成破盾却没有及时消灭卫队，就可能等于主动为后续反击开启冲锋。
