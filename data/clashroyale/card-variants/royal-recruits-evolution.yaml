usage_tips:
- 根据进攻方向调整二四或四二分路，让更多觉醒卫队进入压力较大的一侧，同时保留另一侧的反击威胁。
- 盾牌被击破后给卫队留下直线行进空间，不要让己方其他单位或错误站位阻挡冲锋路线。
- 对手用法术统一破盾后，及时在两路补充前排或控制，迫使其同时处理多名已经获得冲锋能力的卫队。
- 面对范围输出时分散后续支援，不要把全部投入集中在一侧，让对手用同一张牌连续清理盾牌和本体。
matchups:
- title: 适合应对
  text: 单体地面输出和需要分路防守的进攻。破盾但未能及时清除卫队的攻击，还会为觉醒卫队创造冲锋反击。
- title: 需要提防
  text: 女武神、炸弹兵、法师等持续范围输出，以及能够反复改变目标或阻断直线路径的建筑和低费单位。
- title: 搭配思路
  text: 与皇家野猪和飞行器组成双路施压，用法术清除范围防守；也可在防守成功后分别向两路补充进攻核心，放大一次觉醒的覆盖面。
