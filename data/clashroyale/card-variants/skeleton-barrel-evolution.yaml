usage_tips:
- 配合矿工或前排吸引防御塔，让第一桶生成的骷髅兵立刻获得攻击时间，并迫使对手提前交出小法术。
- 观察对手的对空单位位置，尽量让第一桶在靠近防御塔处触发，而不是在河道远端被高攻速单位提前打落。
- 防守密集地面单位时可把觉醒骷髅气球放在其上方，让两次落桶伤害和最多十四个骷髅兵连续参与防守。
- 不要把两次落桶视为必然的塔伤；炸弹塔、范围对空和准备好的小法术仍能分阶段处理，应先用其他诱饵消耗解牌。
matchups:
- { title: 适合应对, text: '只准备一张小法术、对空输出较慢的阵容。两批骷髅兵迫使对手在立即清理和等待合并之间作出取舍。' }
- { title: 需要提防, text: '炸弹塔、烟花炮手、法师和飞斧屠夫等范围输出，以及能在远处快速打落气球并继续清理骷髅兵的高攻速对空单位。' }
- { title: 搭配思路, text: '与矿工、哥布林飞桶和其他人海组成多层诱饵，先消耗小法术和范围解牌，再利用两次落桶持续制造塔前压力。' }
