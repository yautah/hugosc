overview:
- 觉醒骷髅气球仍然只需三费，但本体生命值比基础形态高 25%，并同时携带两桶骷髅兵。生命值首次降至 75% 时会提前落下第一桶并造成死亡伤害、生成七个骷髅兵；气球最终被摧毁或到达目标时，再落下第二桶并重复同样效果。
- 两次落桶把原本一次性的空中推进拆成两个时间点。防守方若立刻用小法术清理第一批骷髅兵，第二批仍可能抵达防御塔；若等待两批聚集，又可能先承受第一批伤害。高攻速或范围对空单位可更稳定地控制落桶位置，但也要避免站进两次死亡伤害范围。
