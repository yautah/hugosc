overview:
  - 觉醒攻城槌的主体属性与普通形态一致，但冲锋路径会对沿途地面单位造成伤害和击退。撞上建筑后它不会立即停止，而是向后弹开并尝试再次冲锋，若未及时处理便可能连续命中同一目标。
  - 攻城槌被摧毁后会生成两名觉醒野蛮人。它仍然无法攻击空中单位，眩晕和击退也能重置冲锋；重型单位不会被路径击退，适合用来稳定截停。
