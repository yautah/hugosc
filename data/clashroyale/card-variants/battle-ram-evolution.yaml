usage_tips:
  - 不要把它当作普通攻城槌直接送入人海；等待开始冲锋后，路径伤害才能清理轻型地面防守并保护后续野蛮人。
  - 对建筑形成第一次撞击后，利用法术或其他单位延长存活时间，弹回后的第二次冲锋往往是主要收益来源。
  - 眩晕与击退会重置冲锋，面对电击法术或滚木时可先用其他单位逼出手段，再部署觉醒攻城槌。
  - 空中单位不会受到路径伤害，应准备远程防空或法术，避免低费空军稳定拆掉整次进攻。
matchups:
  - { title: 适合应对, text: '适合突破轻型地面人海和缺少重型拦截的建筑防线，连续撞击会对固定建筑形成很高压力。' }
  - { title: 需要提防, text: '空中单位、眩晕、持续击退和不受击退的重型部队都能限制冲锋；保龄球尤其能反复打断它。' }
  - { title: 搭配思路, text: '与皮卡超人和桥头进攻单位共同施压，并用地震或毒药处理建筑及周围防守，可提高连续撞击概率。' }
