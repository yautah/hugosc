overview:
  - 觉醒吹箭哥布林每次命中都会在目标位置生成持续一秒的毒素区域。区域会根据命中的飞镖数量逐步增强：第一支进入一阶段，第四支进入二阶段，第七支进入三阶段；阶段越高，每秒造成的伤害越高。
  - 毒素区域可以伤害空中与地面单位，对皇冠塔仅造成四分之一伤害。觉醒形态本体仍然十分脆弱，想让毒素升到高阶段，需要用肉盾、控制或建筑拉扯为它创造持续攻击同一区域的时间。
