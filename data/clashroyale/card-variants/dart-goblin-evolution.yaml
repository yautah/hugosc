usage_tips:
  - 把它放在肉盾或防守单位后方，让飞镖持续落在同一片区域；只打一两次时毒素收益有限，升到二、三阶段才会形成明显压制。
  - 面对移动缓慢或被建筑吸引的单位时更容易叠加毒素，可用冰雪精灵、飓风法术或其他控制延长目标停留时间。
  - 进攻皇冠塔时不要只看三阶段面板，毒素对皇冠塔仅造成四分之一伤害，本体飞镖和存活时间仍决定主要输出。
  - 本体生命值没有额外强化，应避开小法术和远程点杀；必要时先用其他单位逼出法术，再部署觉醒形态。
matchups:
  - { title: 适合应对, text: '适合攻击移动缓慢、聚集或被持续拉扯的单位，高阶段毒素能同时消耗目标及其周围支援。' }
  - { title: 需要提防, text: '小法术、远程点杀和快速突进会在毒素升级前解决本体；不断移动的目标也很难留在同一落点。' }
  - { title: 搭配思路, text: '与肉盾、建筑、冰冻减速和飓风法术配合，为连续七次命中及三阶段毒素创造时间。' }
