usage_tips:
  - 第一次滚动未能清理完整路线时再发动技能，用第二段伤害处理后续进入路线的地面单位。
  - 计算额外一点圣水是否能换来关键解场，不要为了重复滚动而让总费用失去优势。
  - 利用第二次滚动延伸控制路线，为随后出现的野蛮人减少需要面对的小型单位。
matchups:
  - { title: 适合应对, text: 沿同一路线连续进入的地面人海和低生命值支援单位，第二次滚动可补充清场。 }
  - { title: 需要提防, text: 空中单位不受滚桶影响，分散站位和高生命值单位也会降低额外一点圣水的收益。 }
  - { title: 搭配思路, text: 与需要地面清路的推进单位配合，用两段滚动移除小型防守，再由野蛮人继续承接反击。 }
