overview:
  - 精英野蛮人滚桶保留普通滚桶的路线伤害和野蛮人部署，新增“喧闹再滚”技能。支付一点圣水后，滚桶会沿路线再滚动一次，用第二段范围伤害继续清理地面单位并延伸控制范围。
  - 当前来源页仍在建设中，尚未公布独立技能冷却和额外倍率表；页面仅采用已确认的基础属性与技能费用，不对未公开数值作推测。第二次滚动仍只能命中地面目标，技能投入也会把整次使用成本提高到三点圣水。
