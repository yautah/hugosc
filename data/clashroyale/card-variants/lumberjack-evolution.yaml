overview:
  - 觉醒狂暴樵夫本体属性与基础形态一致。阵亡时除了释放狂暴法术，还会生成一名拥有无限生命、无法被部队、建筑和皇家塔直接选中的樵夫幽灵。
  - 樵夫幽灵只有位于本次死亡产生的狂暴区域内才能维持存在，离开区域后会在短时间内消失。额外释放的狂暴法术不能延长其寿命，但击退、减速、眩晕和冰冻仍能浪费它有限的输出时间。
