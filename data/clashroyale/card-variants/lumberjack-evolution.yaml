usage_tips:
  - 让本体在接近皇家塔或高价值后排时阵亡，樵夫幽灵才能在狂暴区域内获得完整输出时间；过早被拉到中场击败会明显降低觉醒收益。
  - 幽灵无法被普通攻击选中，但仍会被击退、减速、眩晕和冰冻。对手控制手段已经交出后再部署，通常更容易让幽灵锁定目标。
  - 防守大型推进时可以把本体直接放到前排附近，阵亡狂暴先处理低生命单位，幽灵再利用有限时间追击后排。
  - 面对觉醒樵夫时优先把本体拉离皇家塔，并用滚木、冰冻、电击或减速拖延幽灵；不要尝试用额外狂暴延长己方幽灵寿命。
matchups:
  - { title: 适合应对, text: '适合处理缺少击退和控制的地面推进，幽灵不可被普通攻击选中，能在死亡狂暴期间持续追击后排。' }
  - { title: 需要提防, text: '滚木、冰冻、大雪球、电击和减速效果可以消耗幽灵有限的存在时间，拉扯也能迫使它离开自身狂暴区域。' }
  - { title: 搭配思路, text: '与气球兵、冰冻法术和高生命前排搭配，让本体阵亡后同时提供狂暴加速与幽灵压力。' }
