overview:
  - 觉醒迫击炮每次发射都会把一只哥布林送到炮弹落点，既保留远程范围伤害，又能在命中后追加近战压力。锁定皇冠塔时，哥布林会直接落到塔旁，迫使对手继续处理。
  - 迫击炮仍然存在近距离盲区和较长攻击间隔。被低费单位反复改变目标、被单位快速贴身或提前拆除时，携带哥布林的优势也无法兑现。
