usage_tips:
  - 优先保护第一次锁定，炮弹携带的哥布林能迫使对手在承受炮击后继续交牌处理。
  - 用低费法术清理迫击炮前方的小单位，避免每发炮弹都被廉价目标吸引。
  - 防守时也可利用哥布林落点补充场面单位，但不要忽略迫击炮本身的盲区。
matchups:
  - { title: 适合应对, text: 缺少快速贴身和远程拆建筑能力的卡组，尤其容易被连续炮击与落地哥布林消耗。 }
  - { title: 需要提防, text: 快速突进、地震法术和低费循环单位会减少实际开火次数，进入盲区后也难以自保。 }
  - { title: 搭配思路, text: 与矿工、滚木、火球和低费单位配合，清理落点周围的防守并放大哥布林压力。 }
