usage_tips:
- 优先让觉醒冰雪精灵命中王子、蛮羊骑士、电磁炮和地狱系单位，延迟冰爆可以在三秒后再次打断其攻击、冲锋或蓄力。
- 在对手支援单位即将靠近被标记目标时制造冰爆，使后续范围伤害和冻结同时覆盖更多单位。
- 进攻前先清理可能吸收跳跃的骷髅兵、烈焰精灵等低费单位，避免关键防守单位完全绕开冰爆标记。
- 不要在被标记目标附近继续堆叠己方单位；镜像对局或对手使用觉醒冰雪精灵时，应主动拉开站位避免第二次范围冻结。
matchups:
- title: 适合应对
  text: 王子、黑暗王子、蛮羊骑士、攻城锤、电磁炮和地狱系单位。两次冻结可以反复打断冲锋、蓄力和持续输出。
- title: 需要提防
  text: 骷髅兵、烈焰精灵等一费单位可以在前方吸收初次跳跃，使冰爆标记落在低价值目标上；分散站位也会降低后续范围效果。
- title: 搭配思路
  text: 与野猪骑士、矿工和快速循环体系搭配，用一费连续制造两次控制；也可配合防御建筑和远程输出，让目标在两轮冻结期间承受更多火力。
