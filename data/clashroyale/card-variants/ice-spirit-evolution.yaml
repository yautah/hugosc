overview:
- 觉醒冰雪精灵仍然只需一费，初次跳跃的伤害和生命值与基础形态相同，但溅射半径从 1.5 格扩大到 2 格。它命中目标后会留下冰爆效果，3 秒后再次造成与初次跳跃相同的范围伤害，并再次冻结目标 1.1 秒。
- 延迟冰爆会围绕被标记的目标触发，因此目标在三秒内移动到其他单位附近时，也可能把后续伤害和冻结带到新的区域。对手可以用低费单位在前方吸收初次跳跃，让关键部队避开标记；使用者则应优先命中需要打断蓄力、冲锋或持续输出的核心目标。
