overview:
  - 觉醒猎人保留普通猎人的十枚弹丸和近距离爆发，每隔五秒还会向攻击距离内最近的单位投出捕网。目标在三秒内无法移动和攻击，空中目标会暂时落地，使原本只能攻击地面的友军也能命中它。
  - 捕网动作会占用一次动画时间，因此对大量低生命单位未必比普通猎人更高效。它更适合控制气球兵、熔岩猎犬和单个高价值单位，让猎人及友军获得稳定输出窗口。
