usage_tips:
  - 把觉醒猎人部署在气球兵或大型空中单位路线前方，捕网落地效果能让地面高伤害单位共同参与防守。
  - 面对单个目标时，五秒捕网间隔和三秒持续时间能大幅压缩其行动窗口；尽量避免让低价值单位先进入四格范围骗走捕网。
  - 贴近部署仍是获得十枚弹丸满额伤害的关键，捕网负责固定目标，但不能弥补猎人站位过远造成的弹丸散失。
  - 对墓园等持续生成单位时，捕网动画可能拖慢普通攻击，不要只依赖觉醒猎人单卡清场，应准备小法术或塔部队协助。
matchups:
  - { title: 适合应对, text: '非常适合控制气球兵、熔岩猎犬和单个高价值推进单位，定身与落地能显著扩大可参与防守的单位范围。' }
  - { title: 需要提防, text: '低费单位可以抢先吸收捕网，远程击退会降低弹丸集中度；大量持续生成的人海也会利用捕网动画争取输出。' }
  - { title: 搭配思路, text: '与渔夫、地面高爆发单位和小法术搭配，先控制目标位置，再让猎人的近距离弹丸与友军共同完成击杀。' }
