overview:
  - 觉醒亡灵大军仍然部署六只亡灵。每只亡灵第一次受到不会直接将其击败的伤害时，会各自进入三秒免疫状态；免疫期间不能被锁定，不受伤害和控制效果影响，但移动速度降低约三分之一、攻击速度降低一半。
  - 免疫按单个亡灵分别触发，因此范围攻击可能让整组同时进入免疫，单体攻击则会逐只触发。箭雨等足以直接击败当前生命值亡灵的伤害不会留下触发机会，部署时机仍需围绕对手的范围法术和对空输出判断。
