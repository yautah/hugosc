usage_tips:
  - 优先在对手只能用多段或低伤害范围攻击处理时部署，让六只亡灵获得触发免疫并接近目标的机会。
  - 免疫期间攻速和移速都会下降，不要只看无敌时间；最好让前排或控制法术帮助它们维持攻击距离。
  - 可以利用单体防空逐只触发免疫的特点吸收火力，但面对能直接击败亡灵的高伤害法术时应先用其他单位诱出解牌。
  - 防守大型单体单位时从其上方或侧后方部署，亡灵在第一次受击后进入免疫，能够继续围攻并拖延推进。
matchups:
  - { title: 适合应对, text: '伤害不足以一次击败亡灵的范围单位和单体防空。它们往往会主动触发免疫，却无法在三秒内继续处理目标。' }
  - { title: 需要提防, text: '万箭齐发等能够直接击败亡灵的范围法术，以及先压低生命值再补伤害的多段组合；致命伤害不会触发免疫。' }
  - { title: 搭配思路, text: '与矿工、巨人和熔岩猎犬等前排搭配，让前排吸引皇家塔，觉醒亡灵大军则利用免疫穿过防空火力并补充爆发输出。' }
