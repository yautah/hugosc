usage_tips:
  - 等黑暗王子接近密集地面防守或皇家塔附近后再发动技能，下马范围伤害和击退可以先清理道路，犀牛随后独立冲向建筑。
  - 利用目标锁定关系让下马本体继续承受火力，不要把技能理解为重新隐身；犀牛能否脱离防守单位的攻击路线决定技能收益。
  - 技能额外消耗三费，普通黑暗王子已经能完成防守时应保留圣水；一次性投入七费会显著降低另一条路线的应对能力。
  - 皇家塔不再承受下马范围伤害，靠近塔时的核心收益是击退地面防守和生成犀牛，而不是额外直接削塔。
matchups:
  - { title: 适合应对, text: '适合突破依赖地面单位拦截的防守，下马范围伤害可以清理或击退周围单位，犀牛则迫使对手额外处理建筑目标压力。' }
  - { title: 需要提防, text: '防御建筑可以直接吸引犀牛，空中单位不受下马范围伤害；高爆发防守也可能在分离后迅速处理本体和犀牛。' }
  - { title: 搭配思路, text: '与王子、巨人或桥头施压单位组合，利用下马击退打乱地面防守；小法术和防空单位负责补足对人海及空中目标的处理。' }
