overview:
  - 精英黑暗王子的主动技能会把一个单位拆成两个独立目标。下马时对三格内地面单位造成范围伤害和击退，黑暗王子保留生命值、护盾和普通范围攻击，但不再冲锋；犀牛则锁定最近建筑并拥有自己的生命值、普通伤害和冲锋伤害。
  - 技能只能在每次部署中使用一次，部署与技能合计需要七费。分离后，原本锁定黑暗王子的敌军不会自动改攻犀牛，因此可以让本体继续承受火力、犀牛趁机冲向建筑。2026 年 6 月调整后，犀牛的下马伤害不再影响皇家塔，首次冲锋也需要移动 2.5 格。
