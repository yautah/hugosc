overview:
  - 觉醒哥布林钻机在生命值降至约三分之二和三分之一时会重新潜入地下，再从附近位置钻出。每次转移都能改变哥布林出现方向，并让对手重新调整范围防守位置。
  - 潜入期间不会持续留在原位承伤，但当前重新钻出不再造成伤害和击退。对手仍可用覆盖范围较大的法术或单位守住多个可能落点，钻机本体的生成节奏也与普通形态一致。
