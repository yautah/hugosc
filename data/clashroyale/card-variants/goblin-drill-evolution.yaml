usage_tips:
  - 利用两次重新钻出改变哥布林方向，让固定覆盖单一落点的防守难以处理整段持续时间。
  - 配合其他进攻单位迫使对手先交范围伤害，再让后续潜入阶段继续产生哥布林压力。
  - 防守使用时要留意重新钻出会改变建筑位置，可能影响后续对以建筑为目标单位的拉扯。
matchups:
  - { title: 适合应对, text: 依赖固定站位范围防守的卡组，钻机多次转移能绕开单一落点并持续制造哥布林。 }
  - { title: 需要提防, text: 毒药法术、大范围单位和多层防守可以覆盖多个落点，重新钻出本身也不再造成额外伤害。 }
  - { title: 搭配思路, text: 与矿工、攻城炸弹人和法术配合制造多点压力，迫使对手无法把范围解牌全部留给钻机。 }
