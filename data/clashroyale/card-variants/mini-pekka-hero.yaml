overview:
  - 精英迷你皮卡的基础攻击与普通形态一致，核心差异是“早餐强化”。它会随时间积累薄饼进度，每次完成攻击还能额外获得相当于十秒的进度；主动发动技能后会消耗全部薄饼、回复 30% 生命值，并根据当前进度提升等级。
  - 技能没有薄饼时也能提升一级，三格全部蓄满时共提升五级，但整场只能发动一次。等待越久收益越高，也意味着更可能在技能发动前被击败；最佳时机通常是它完成防守、已经受到伤害并准备转入反击时。
