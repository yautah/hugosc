usage_tips:
  - 优先让它参与防守并多次攻击，攻击会显著加快薄饼积累；完成防守后发动技能，能同时回复损失生命并强化反击。
  - 不必一味等待三格全满。面对即将到来的高伤害或法术时，提前用一费技能保住单位通常比追求最高五级提升更有价值。
  - 观察对手的大法术和杂兵轮转，技能施放有短暂延迟，过晚发动可能在回复生效前被击败。
  - 已经蓄满技能时可把它保留给对手的核心地面推进，既能快速积累攻击进度，也能在防守完成后形成高等级反击。
matchups:
  - { title: 适合应对, text: '高生命值地面单位和攻击频率不足以迅速击败它的目标。连续攻击既能造成高额伤害，也能加快薄饼积累。' }
  - { title: 需要提防, text: '骷髅军团等杂兵、能够直接击败它的高伤害法术，以及在技能生效前完成爆发的单位。' }
  - { title: 搭配思路, text: '与皇家大厨和大型前排配合可以增加存活与攻击次数，小法术和范围部队则负责清理阻止它接近目标的杂兵。' }
