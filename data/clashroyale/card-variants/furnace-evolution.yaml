overview:
  - 觉醒烈焰熔炉保留普通形态的本体属性和七秒常规生成，但在本体处于攻击状态时会进入火热生成，改为每二点四秒生成一只烈焰精灵。精灵从左右两侧交替出现，可以更快形成两路或错位压力。
  - 火热生成依赖本体持续攻击，若被远程点杀、控制或没有目标可打，觉醒收益会明显下降。当前本体射程已缩短至五点五格，因此需要更谨慎地选择部署位置，让它尽快接敌又不至于暴露在前排。
