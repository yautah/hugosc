usage_tips:
  - 尽量把本体部署在能够持续攻击的位置，火热生成只在交战时发挥作用；用前排或控制阻止对手快速接近熔炉。
  - 左右交替生成可以扰乱单体防守，但精灵仍会寻找附近目标，不要只依赖生成方向保证另一侧塔伤。
  - 面对高伤法术时与其他关键单位拉开距离，避免对手一张法术同时削弱熔炉和后排，使火热生成过早结束。
  - 当前射程只有五点五格，部署太靠后可能迟迟无法启动火热生成；部署太靠前又容易被集火，需要根据敌军路线取中间位置。
matchups:
  - { title: 适合应对, text: '适合处理持续推进和需要多次响应的地面人海，本体一旦稳定攻击，快速生成会不断补充范围压力。' }
  - { title: 需要提防, text: '远程高伤、快速突进、控制和法术都能缩短攻击窗口；没有可攻击目标时也无法触发高频生成。' }
  - { title: 搭配思路, text: '与高生命值前排、减速控制和分路卡配合，保护本体持续开火，并让交替生成的精灵扩大场面压力。' }
