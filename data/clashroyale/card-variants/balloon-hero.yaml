usage_tips:
  - 在气球兵接近对手防空单位时发动技能，让空降骷髅兵落地造成伤害并吸引地面火力，争取气球兵继续飞向建筑。
  - 技能不能直接选择落点，发动前要确认最近的地面目标是否符合预期，避免骷髅兵被边路单位带离主战场。
  - 两点技能费用会显著提高整轮进攻成本，不要只为补充皇冠塔伤害而使用；对塔伤害衰减使这种用法收益很低。
  - 冷却为 12 秒，只有存活较久的气球兵才有机会再次发动，应优先围绕第一次技能创造投弹，而不是保留技能等待第二次。
matchups:
  - { title: 适合应对, text: '适合干扰猎人、弓箭手等地面防空单位，落地范围伤害能削弱它们，并让骷髅兵继续贴身施压。' }
  - { title: 需要提防, text: '纯空中防守单位不会成为俯冲目标，建筑还能改变气球兵路线；高额技能成本也可能让后续防守圣水不足。' }
  - { title: 搭配思路, text: '与前排、冰冻或击退法术配合，先让空降骷髅兵扰乱地面防空，再用控制效果帮助气球兵完成投弹。' }
