overview:
  - 精英气球兵保留普通气球兵的生命、投弹和死亡炸弹属性，新增“空降小队”技能。发动后，一名空降骷髅兵会寻找 6.5 格内最近的地面部队或建筑，俯冲并造成半径 2 格的落地伤害；范围内没有目标时会落在气球兵下方。
  - 俯冲不能主动锁定皇冠塔，落地伤害和骷髅兵对皇冠塔的伤害还会大幅降低，因此技能主要用于清理或牵制防空单位，帮助气球兵接近建筑，而不是额外制造塔伤。
