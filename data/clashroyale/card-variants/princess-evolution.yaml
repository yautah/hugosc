usage_tips:
  - 登场后的第一箭必定带减速，可用于关键防守或桥头立刻施压；不要把这一箭浪费在已经没有威胁的小单位上。
  - 三秒攻击间隔意味着后续冰箭触发较慢，应用前排或建筑保护公主，让她有时间完成三次攻击循环。
  - 死亡冰区也有价值。无法保住公主时，可以让她在对手推进路径上被击败，以减速区域继续拖延前排和后排。
  - 两个觉醒周期使登场频率有限，应根据牌序提前规划，不要在无压力轮次仅为过牌交出觉醒公主。
