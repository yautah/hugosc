overview:
  - 觉醒公主保留基础公主的超远射程和范围伤害。登场后的第一次攻击会射出冰箭，之后每完成两次普通攻击，第三次攻击再次触发冰箭。
  - 冰箭命中后在三格范围内降低敌军 30% 的移动和攻击速度，效果持续七秒。觉醒公主被击败时还会在原地留下同样大小、持续七秒的减速区域。
