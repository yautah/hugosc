overview:
- 觉醒蝙蝠仍然花费两费并部署五只单位，但初始生命值是普通蝙蝠的 1.5 倍。每次完成攻击时，每只蝙蝠会触发两次治疗，两次之间相隔 0.5 秒；治疗可以超过初始生命值，最高恢复到初始上限的两倍。
- 这套机制的前提是至少有蝙蝠成功完成第一次攻击。普通蝙蝠害怕的小法术在觉醒蝙蝠尚未治疗时仍然有效，但当它们通过攻击建立超额生命后，对手往往需要更高伤害的范围手段才能一次清理。
