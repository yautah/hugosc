usage_tips:
- 优先用觉醒蝙蝠围攻不能对空的单体单位，它们可以安全完成攻击并逐步将生命值恢复到超额上限。
- 对手已使用电击法术或巨型雪球后再部署，可以提高它们完成首次攻击的概率；一旦建立超额生命，小法术就不一定能全部清除。
- 与矿工、巨人或其他前排搭配，让前排吸引皇家塔火力，觉醒蝙蝠便能连续攻击、治疗并积累输出。
- 面对能快速对空或造成范围伤害的远程单位时，先用法术或前排限制其输出，不要指望蝙蝠在首次攻击前硬抗集中火力。
matchups:
- title: 适合应对
  text: 骑士、女武神、皮卡超人和其他不能对空的单体单位。它们可以为觉醒蝙蝠提供安全攻击和建立超额生命的机会。
- title: 需要提防
  text: 箭雨、觉醒电击法术，以及烟花炮手、法师、猎人等快速或范围对空单位。它们可以在治疗建立前同时清理多只蝙蝠。
- title: 搭配思路
  text: 与矿工和大型坦克搭配可以稳定触发攻击治疗，与狂暴法术配合则能更快攻击并维持超额生命，迫使对手使用更强的范围解牌。
