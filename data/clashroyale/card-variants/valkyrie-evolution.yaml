overview:
  - 觉醒瓦基丽武神的基础属性与普通形态一致，每次攻击都会在身边生成持续半秒的旋风。旋风可以影响空中和地面单位，把五格范围内的目标拉向她并造成伤害，使原本只能攻击地面的武神获得额外控制与对空消耗能力。
  - 拉扯效果可以阻止建筑目标单位继续前进，也能把分散敌军聚到范围伤害中心。她仍然需要完成攻击动作才能产生旋风，受到眩晕、击退或高伤害空中单位压制时，控制链会被明显缩短。
