usage_tips:
  - 把她部署在推进路线中央，让第一次旋转尽快触发旋风，可以同时拉住前排、后排与靠近的空中支援。
  - 对付野猪骑士、巨人等建筑目标单位时，连续拉扯能延长它们到达皇家塔的时间，应配合其他输出尽快完成击杀。
  - 旋风会把敌军聚集到一起，适合与飞斧屠夫、炸弹兵和烟花炮手等范围输出配合。
  - 面对高伤害空中单位时不要依赖旋风伤害单独解决，仍应准备防空单位保护觉醒武神继续攻击。
matchups:
  - { title: 适合应对, text: '适合地面人海、建筑目标单位和聚集推进；持续拉扯可以打乱路线，并让范围伤害覆盖更多目标。' }
  - { title: 需要提防, text: '重甲亡灵、地狱飞龙等高伤害空中单位不会被她的普通攻击命中，眩晕与击退也会减少旋风触发次数。' }
  - { title: 搭配思路, text: '与飞斧屠夫、烟花炮手、电磁炮等范围单位配合，让旋风把目标拉入集中火力；防守后也可作为反击前排。' }
