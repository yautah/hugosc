usage_tips:
- 先清除或控制防御建筑，让觉醒皇家巨人尽快锁定防御塔；每多完成一次开炮，就会额外触发一次周围清场。
- 面对地面人海时不必过早交出全部小法术，可让第一轮后坐冲击先削减和击退目标，再根据剩余单位补充处理。
- 用雷电精灵、冰雪精灵或法术限制高单体防守，避免皇家巨人在首次开炮前被迅速消灭，导致觉醒机制没有触发。
- 留意空中防守单位不会被地面击退；亡灵大军、蝙蝠等目标仍需提前准备对空支援或范围法术。
matchups:
- title: 适合应对
  text: 骷髅军团、哥布林团伙和野蛮人等需要贴身围攻的地面单位。只要皇家巨人完成开炮，后坐冲击就能同时伤害并推开它们。
- title: 需要提防
  text: 地狱塔、地狱龙、皮卡超人等能在开炮前快速造成高伤害的目标，以及不受地面击退影响的空中人海和远程输出。
- title: 搭配思路
  text: 与渔夫、猎人和雷电系控制搭配，既可在防守后形成反击，也能拉走或重置高威胁单位；法术则负责处理建筑和空中人海。
