overview:
- 觉醒皇家巨人的基础生命值、炮弹伤害和射程与普通形态相同，但每次开炮都会在自身周围 2.5 格范围内触发后坐冲击，造成范围伤害并将敌方地面单位击退 1 格。原本能够贴身围攻皇家巨人的地面人海会在每轮开炮时被反复清理或推开。
- 后坐冲击只会在皇家巨人完成攻击时触发。眩晕、冻结和高单体伤害可以减少开炮次数，空中单位也不会被地面击退影响；因此觉醒形态并非自动免疫所有近身防守，而是迫使对手先阻止开炮，或改用射程更远、位置更分散的解法。
