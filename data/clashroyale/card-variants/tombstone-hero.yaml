usage_tips:
  - 只在墓碑仍有机会发动技能且场面允许投入六点圣水时使用，避免建筑被快速摧毁导致计划落空。
  - 用普通墓碑位置完成正常拉扯，不要为了暴露技能意图而把本体放到不合理位置。
  - 墓碑女王以建筑为目标，发动前应确认其推进路线和对手建筑位置能带来足够收益。
matchups:
  - { title: 适合应对, text: 防守后有充足圣水转入推进的慢节奏对局，墓碑女王和骷髅兵能形成额外场面。 }
  - { title: 需要提防, text: 高伤法术、快速拆建筑和换路进攻可能让九点总投入来不及产生回报。 }
  - { title: 搭配思路, text: 与范围伤害和远程支援配合，先用墓碑完成防守，再保护墓碑女王向建筑推进。 }
