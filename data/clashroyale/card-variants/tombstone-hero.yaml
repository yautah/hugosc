overview:
  - 精英骷髅墓碑保留普通墓碑的拉扯和骷髅兵生成机制，新增“皇家复生”技能。支付六点圣水后，墓碑女王会从地下出现，生成骷髅兵并以建筑为攻击目标。
  - 本体与技能合计需要九点圣水，是一项高成本转化。当前来源页仍在建设中，尚未公开墓碑女王的独立逐级属性，因此页面只展示已确认的技能行为和基础墓碑数据，不虚构缺失数值。
