usage_tips:
  - 尽量保护后排骷髅将军；普通骷髅先承受伤害并转化为影子，才能把一次防守延长为持续输出。
  - 对手拥有万箭齐发或持续法术时不要把将军和全部骷髅暴露在同一范围，法术仍能直接处理影子并破坏核心机制。
  - 防守高伤单体时让普通骷髅从前方包围，将军利用长距离在后排输出，降低被近战单位首先锁定的概率。
  - 将军被消灭后，仍存活的普通骷髅不会再转化；发现核心即将倒下时，不要继续为影子投入过多支援。
matchups:
  - { title: 适合应对, text: '适合拖住缺少范围伤害和法术的单体地面单位，影子会持续输出并迫使对手优先寻找后排将军。' }
  - { title: 需要提防, text: '万箭齐发、毒药等覆盖法术可以同时处理将军和影子，穿透及范围单位也更容易触及后排核心。' }
  - { title: 搭配思路, text: '与法术诱饵和肉盾搭配，先逼出范围法术，再让将军维持影子军团完成防守反击。' }
