overview:
  - 觉醒骷髅军团会部署十五只普通骷髅，并在后方额外加入一名带护盾的骷髅将军。普通骷髅被消灭后会生成影子骷髅，影子不能被部队、建筑或皇家塔锁定，但仍会受到法术影响。
  - 骷髅将军是整套机制的核心：将军被消灭时，现有影子会同时消失，仍存活的普通骷髅也不再转化。防守方通常需要先用法术或穿透手段处理后排将军。
