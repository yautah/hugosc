overview:
  - 觉醒皮卡超人的基础攻击与普通形态一致，击败部队或建筑后会触发连续治疗脉冲。治疗量按被击败目标的生命值分为三个档位，目标越耐打，获得的治疗越多；治疗还可以超过初始生命值，最高达到基础生命值的 150%。
  - 她在防守大型推进时可以一边消灭单位一边恢复生命，形成更有威胁的反击。用大量低费单位围攻虽然仍能拖延她，但每个被她亲自击败的单位都会提供治疗，因此需要控制击杀归属或配合远程、空中输出。
