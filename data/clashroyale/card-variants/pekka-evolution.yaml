usage_tips:
  - 优先让觉醒皮卡超人参与高价值防守，争取由她完成最后一击；击败大型单位获得的治疗最多，能明显提高反击时的剩余生命值。
  - 不要为了触发治疗追逐远离主战场的低价值单位，她移动缓慢，错误目标会让整轮七费部署失去路线压力。
  - 进攻时准备小法术清理人海，但要控制法术时机：让皮卡超人击败部分单位可以治疗，完全交给法术则不会触发能力。
  - 面对空中或远程防守时仍需支援，治疗只能在她亲自完成击杀后发生，不能弥补持续无法接触目标的问题。
matchups:
  - { title: 适合应对, text: '适合处理由多个中高生命值地面单位组成的推进，连续击杀可以恢复防守损耗，并保留高生命值反击单位。' }
  - { title: 需要提防, text: '空中输出、远程拉扯和不提供击杀目标的高伤害单体单位能压缩治疗；觉醒骷髅等持续扩张人海仍可能在她攻击间隔内完成围杀。' }
  - { title: 搭配思路, text: '与电击法术、飓风法术和范围支援单位配合，控制人海和目标位置，让觉醒皮卡超人持续接触高价值单位并完成击杀。' }
