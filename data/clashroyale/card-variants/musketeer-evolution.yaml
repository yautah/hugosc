overview:
  - 觉醒火枪手部署后会携带三发狙击弹。当普通攻击距离内没有目标时，她可以锁定正前方 6 至 30 格内最近的部队或建筑，以一秒间隔发射狙击弹，每发造成普通攻击 180% 的伤害。
  - 狙击弹不会锁定皇家塔，且目标进入普通六格射程后会改用常规攻击，因此部署方向和距离决定弹药能否命中高价值后排。三发用尽后，她就按普通火枪手的方式继续战斗。
