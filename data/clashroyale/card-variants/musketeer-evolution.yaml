usage_tips:
  - 尽量在远离目标的位置部署，让目标处于六格普通射程之外，确保她优先消耗狙击弹而不是向前移动后普通攻击。
  - 狙击弹只会攻击她正前方的目标，部署前先确认朝向和线路；错开一条路线可能让三发弹药找不到高价值目标。
  - 利用不能锁定皇家塔的规则清理塔后支援或圣水收集器，不要把狙击弹总伤害误算成直接塔伤。
  - 三发狙击结束后仍是一名完整火枪手，可让前排接住后续火力，继续把远程输出转化为反击。
matchups:
  - { title: 适合应对, text: '竞技场后方部署的远程支援、飞龙和普通建筑。超远狙击可以在它们接近战场前先行削弱或清除。' }
  - { title: 需要提防, text: '快速贴近普通射程的单位、改变线路的移动技能和能直接用法术处理火枪手的组合；距离不足时不会消耗狙击弹。' }
  - { title: 搭配思路, text: '与能够拖慢推进或固定目标位置的建筑、前排搭配，使目标长时间保持在狙击线路上，三发打完后再衔接常规防守。' }
