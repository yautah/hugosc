overview:
  - 觉醒电击法术会在第一次电击后再触发一次范围更大的电击，两次均可伤害空地单位并造成短暂眩晕。连续控制能再次重置递增伤害、攻击和冲锋，也能处理第一击后仍存活的小型单位。
  - 第二次电击并非瞬间同时发生，目标可能在间隔中离开中心区域。它对皇冠塔的伤害依然受法术衰减限制，主要价值来自双次清场和控制。
