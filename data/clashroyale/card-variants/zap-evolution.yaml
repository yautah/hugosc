usage_tips:
  - 用两次眩晕重置地狱之塔、地狱飞龙或冲锋单位，为己方单位争取更长输出窗口。
  - 预判目标在两次电击之间的移动，让第二次扩大范围仍能覆盖主要单位。
  - 面对成群低生命值单位时，可利用第二次伤害清理第一击未能消灭的目标。
matchups:
  - { title: 适合应对, text: 依赖重置的递增伤害单位、冲锋单位和能被两次范围伤害清理的人海。 }
  - { title: 需要提防, text: 高生命值单位不会因双击直接失去战斗力，快速离开范围也会降低第二次命中收益。 }
  - { title: 搭配思路, text: 与快速推进和高伤单位配合，用连续眩晕阻止防守单位完成关键攻击。 }
