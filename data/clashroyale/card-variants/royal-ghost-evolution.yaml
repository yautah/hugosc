overview:
  - 觉醒皇家幽灵保留基础形态的范围攻击、悬浮移动和隐身机制。每次结束隐身并显形攻击时，会在身边召唤两名幽灵士兵，士兵登场时先造成一次范围伤害。
  - 幽灵士兵不会自动消失，能继续以范围近战参与战斗。皇家幽灵重新隐身并再次显形后可以再召唤一组，因此让本体存活并脱离战斗是积累收益的关键。
