usage_tips:
  - 尽量让本体在消灭目标后获得 1.8 秒空档重新隐身，再次显形可继续召唤士兵，单次部署的收益会随存活时间明显提高。
  - 士兵登场伤害和本体范围攻击会集中爆发，适合对付贴近的中低生命防守，但 2026 年削弱后不应再把它视为一次性秒杀手段。
  - 与前排或远程核心搭配，让对手先处理其他威胁，给皇家幽灵重新隐身和重复召唤的空间。
  - 防守觉醒幽灵时用瓦基丽武神等范围近战同时处理本体与士兵，或先用低费单位迫使本体显形，再落下登场伤害单位。
matchups:
  - { title: 适合应对, text: '适合处理成组地面单位和持续生成单位的建筑，重复显形能够不断补充士兵。' }
  - { title: 需要提防, text: '瓦基丽武神、超级骑士和皇家速递等范围伤害可以同时覆盖本体与士兵，高伤近战也能限制重新隐身。' }
  - { title: 搭配思路, text: '与巨人、皇家巨人、戈仑石人和觉醒骷髅气球搭配，让前排吸引火力并为重复召唤争取时间。' }
