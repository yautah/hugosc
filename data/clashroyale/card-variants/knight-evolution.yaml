usage_tips:
- 把觉醒骑士部署在需要穿过远程火力的位置，让移动减伤覆盖接近目标的过程。
- 避免让他过早停在低威胁单位面前攻击，否则会失去减伤并承受后方火力。
- 防守完成后在他身后补充远程单位，利用剩余生命值组织反击，通常比单独桥头施压更划算。
matchups:
- title: 适合应对
  text: 擅长承接远程单体输出和中等伤害的防守单位，尤其适合保护己方后排完成推进。
- title: 需要提防
  text: 密集近战单位、持续控制和能够迫使他停下攻击的拉扯会迅速削弱移动减伤的价值。
- title: 搭配思路
  text: 可与远程范围伤害或稳定对空单位搭配，让觉醒骑士负责吸收伤害，后排负责清理围攻单位。
