overview:
- 觉醒骑士保留了普通骑士费用低、生命值高的特点，并在移动时获得减伤效果。只要他尚未停下攻击，来自敌方的伤害就会明显降低，因此更擅长顶住远程火力向前推进。
- 减伤不会让觉醒骑士成为无条件的正面突破手。进入攻击动作后，他会失去移动减伤，密集近战单位、持续控制和拉扯依然能够快速消耗他。使用时应尽量让他承担接近目标过程中的伤害，再由后排单位完成输出。
