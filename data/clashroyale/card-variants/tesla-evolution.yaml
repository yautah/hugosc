usage_tips:
  - 利用单位接近的节奏让电磁塔重新升起，脉冲可同时打断多名单位并帮助皇家塔集中输出。
  - 面对冲锋单位时保留部署时机，用首次脉冲重置其攻击，再通过中央位置完成拉扯。
  - 不要让低威胁单位长期维持电磁塔地上状态，否则很难再次触发升起脉冲。
matchups:
  - { title: 适合应对, text: 适合处理聚集的空地推进、冲锋单位和依赖连续攻击的目标，脉冲提供额外控制。 }
  - { title: 需要提防, text: 地震法术、远程高伤和用于维持锁定的低费单位会压缩脉冲次数与建筑寿命。 }
  - { title: 搭配思路, text: 与拉扯、击退和范围伤害配合，把敌军留在脉冲覆盖区并延长皇家塔输出窗口。 }
