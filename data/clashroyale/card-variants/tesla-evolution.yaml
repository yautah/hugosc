overview:
  - 觉醒特斯拉电磁塔每次从地下升起时都会释放六格半径的电击脉冲，对空中和地面单位造成伤害并眩晕半秒。脉冲能打断冲锋、重置部分攻击并为本体争取额外输出时间。
  - 脉冲依赖电磁塔重新升起，持续锁定目标时不会反复触发。对手可以用单位维持其地上状态，也可以通过法术和远程火力缩短它的存活时间。
