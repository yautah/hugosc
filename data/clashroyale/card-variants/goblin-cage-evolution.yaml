usage_tips:
  - 让牢笼靠近最需要控制的地面核心，抓取期间集中处理其余支援单位。
  - 面对单体高伤单位时，抓取能显著延长防守时间，但仍要避免牢笼被其他单位快速集火。
  - 牢笼破坏后及时补充远程支援，让哥布林硬汉把防守转化为反击。
matchups:
  - { title: 适合应对, text: 单个高威胁地面单位、冲锋单位和需要被暂时移出战场的推进核心。 }
  - { title: 需要提防, text: 空中单位、分散人海与远程支援不会全部被抓取，法术也能缩短牢笼控制时间。 }
  - { title: 搭配思路, text: 与范围伤害和远程对空配合，牢笼控制最危险目标，其他单位清理剩余支援。 }
