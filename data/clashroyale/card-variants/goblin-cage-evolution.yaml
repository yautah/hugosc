overview:
  - 觉醒哥布林牢笼可以把三格内的地面部队拖入牢笼并持续攻击，被抓单位暂时无法行动。牢笼被摧毁后，哥布林硬汉照常登场，形成控制、承伤和反击三段价值。
  - 抓取只针对地面部队，无法处理空中目标；目标进入牢笼后，其他敌军仍可继续推进。面对多单位进攻时，需要额外防守覆盖未被抓取的威胁。
