usage_tips:
- 让第一目标与敌方后排或皇家塔保持直线，后续两次弹跳才有机会穿过前排继续命中高价值目标。
- 防守时可以配合飓风法术重新排列敌人，使多个地面单位进入同一条弹跳路径，而不是只依赖首次溅射范围。
- 进攻中让坦克先吸引火力，觉醒炸弹兵从后方选择第一目标；过早越过前排会让他被近战单位贴身，失去弹跳输出。
- 面对空军较多的卡组时，不要因为觉醒机制投入过多保护资源，仍需把主要圣水留给可靠对空单位。
matchups:
- title: 适合应对
  text: 纵向排列的地面推进、建筑后方支援单位和与皇家塔站成直线的防守目标。弹跳可以在处理前排的同时制造额外后排伤害。
- title: 需要提防
  text: 空中单位、从侧面快速贴身的近战单位，以及刻意错开站位的防守。只要第一目标方向被改变，后续弹跳就可能完全落空。
- title: 搭配思路
  text: 与巨人等坦克、飓风法术和能够固定目标位置的控制单位配合较好；坦克负责维持直线，控制负责集中目标，炸弹兵完成连续范围输出。
