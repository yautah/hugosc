overview:
- 觉醒炸弹兵保留两费地面范围输出的定位，炸弹首次命中后还会沿投掷方向弹跳两次，每次间隔 2.5 格并造成相同范围伤害。只要目标与后排或皇家塔形成直线，一次攻击就可能同时命中多个区域。
- 弹跳方向由首次目标决定，因此站位价值高于单纯面板伤害。对手可以通过错开单位、从侧面贴身或改变第一目标位置避开后续弹跳；觉醒炸弹兵依然不能攻击空中，生命值也不足以在没有前排时稳定完成多次投弹。
