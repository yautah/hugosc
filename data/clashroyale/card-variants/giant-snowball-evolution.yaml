usage_tips:
  - 从侧面施法可把防守单位推离己方进攻路线，也能把目标集中到后续范围伤害中。
  - 防守时把目标向场地中央或远离皇家塔的方向推动，为皇家塔争取额外攻击时间。
  - 施法前确认滚动方向，避免把近战单位直接推到己方后排或皇家塔附近。
matchups:
  - { title: 适合应对, text: 依赖站位的远程防守、气球兵等需要被推离目标的单位，以及密集空地人海。 }
  - { title: 需要提防, text: 位移不敏感的高生命值目标和错误施法角度会降低控制价值，伤害本身也不足以处理大型单位。 }
  - { title: 搭配思路, text: 与范围法术、建筑和快速推进配合，利用长距离推动改变锁定和防守站位。 }
