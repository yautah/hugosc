overview:
  - 觉醒大雪球在落点造成范围伤害后继续向前滚动，把命中的空地单位沿施法方向推动，最多移动四点五格。四秒减速会进一步拖延目标回到战斗位置。
  - 推动方向取决于施法角度，错误落点可能把敌军送向己方皇家塔或避开后续法术。大型或特殊目标的位移效果也可能受限制，需要以控制位置而不是伤害作为主要目的。
