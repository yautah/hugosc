usage_tips:
- 面对单体高伤害单位时，从目标周围部署，让至少一到两个骷髅兵先完成攻击并开始增殖，比从远处追赶目标更稳定。
- 先观察对手的小法术循环；对方刚使用滚木、巨型雪球或电击法术后，觉醒骷髅兵更容易获得第一次攻击并扩大数量。
- 分路部署可以降低一次法术清除全部单位的概率，但也会减少单路增殖速度，应根据两侧压力决定是否拆分初始三只。
- 不要把觉醒骷髅兵直接用于防守范围伤害单位或雷电巨人；这些目标能够在增殖开始前连续清理新生成单位。
matchups:
- title: 适合应对
  text: 皮卡超人、王子等攻击目标单一且攻击频率有限的地面单位，以及缺少即时范围伤害的坦克。只要完成首次攻击，单位数量就会迅速扩大。
- title: 需要提防
  text: 电击法术、巨型雪球等低费范围牌，女武神等持续范围攻击，以及雷电巨人的反伤。它们都能阻止觉醒骷髅兵建立数量优势。
- title: 搭配思路
  text: 与冰人、控制法术和防御建筑配合，可以让目标停在原地并争取更多攻击次数；在诱饵体系中也能与其他人海牌共同消耗对手的小法术。
