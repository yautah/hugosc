overview:
- 觉醒骷髅兵仍然只需一费并初始部署三个单位，但每个单位完成攻击后会生成一个新的觉醒骷髅兵，场上最多累积八个。面对攻击速度慢、缺少范围伤害的单体目标时，它们可以边拖延边扩大数量，把一费防守转化为必须立即回应的反击。
- 增殖发生在攻击完成后，而不是部署时立即生效。小法术、范围攻击和登场伤害可以在第一轮攻击前清除整组单位，雷电巨人等反伤机制也会阻止它们稳定增加；因此真正的价值来自创造一次安全攻击，而不是把它们直接丢进任何进攻单位中间。
