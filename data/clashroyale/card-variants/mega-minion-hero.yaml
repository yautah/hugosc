usage_tips:
  - 观察技能标记后再决定是否跃迁，优先利用它清除藏在坦克后方、最大生命值较低的远程单位。
  - 瞬移会让原本攻击重甲亡灵的单位重新选择目标，可在它承受火力时用技能脱离，但要确认新落点不会进入更危险的包围。
  - 技能每次部署只能使用一次，不必在第一个可用时机立即消耗；等待对手放下关键后排往往更有价值。
  - 目标规则依据最大生命值而不是当前剩余生命值，不能依靠先削弱某个高生命值单位来强行改变锁定顺序。
matchups:
  - { title: 适合应对, text: '适合越过坦克处理生命值较低的远程后排，也能跨路线接近圣水收集器等非皇家塔建筑。' }
  - { title: 需要提防, text: '对手可以用更低最大生命值的单位影响锁定目标，瞬移落点附近的人海和集中防空也能迅速处理它。' }
  - { title: 搭配思路, text: '与慢速坦克搭配时，跃迁负责清理后排防守；防守阶段则可先完成单体交换，再把存活单位送往有价值的目标。' }
