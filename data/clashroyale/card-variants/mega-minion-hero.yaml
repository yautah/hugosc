overview:
  - 精英重甲亡灵的基础属性与普通形态相同，主动技能“致伤跃迁”会锁定全场最大生命值最低的敌方目标，并瞬移到目标附近发动一次强化攻击。最大生命值相同时会优先选择距离更远的目标，因此技能既能清理后排，也可能让重甲亡灵跨越整座竞技场。
  - 技能每次部署只能使用一次，不能直接选择目标，也不会锁定皇家塔。目标由系统提前标记，施放前需要确认瞬移后的落点、附近防守和另一条路线的变化；只看眼前伤害而忽略落点，容易让单位深入敌方火力。
