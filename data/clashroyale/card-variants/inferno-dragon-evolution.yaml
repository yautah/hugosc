usage_tips:
  - 先锁定高生命前排完成升档，再利用七秒保留窗口转向后排或皇家塔，减少重新从第一档开始的时间。
  - 击退和拉扯本身不会立即清空档位，但眩晕、冰冻与电击仍会重置；应优先逼出对手的重置牌。
  - 第四档需要极长连续输出，不能作为常规对局的默认收益；主要价值仍是第三档在目标切换后的延续。
  - 两个觉醒周期意味着登场频率有限，应把觉醒轮次留给能连续处理多个高生命目标的关键防守或反打。
matchups:
