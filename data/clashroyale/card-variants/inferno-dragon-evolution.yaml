overview:
  - 觉醒地狱飞龙保留基础形态的三档递增伤害。目标被消灭或暂时离开射程后，当前伤害档位不会立即清零，而是最多保留 7 秒；重新锁定其他目标时可从保留档位继续输出。
  - 连续造成伤害约 20 秒后还能进入第四档，单次伤害约为第三档两倍。眩晕与冰冻仍会重置蓄能，因此觉醒主要减少目标切换造成的损失，并没有消除传统重置手段。
