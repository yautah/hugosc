overview:
- 精英骑士的基础战斗方式与普通骑士一致，核心差异来自主动技能“凯旋嘲讽”。技能发动后，他会获得护盾并迫使范围内的敌方单位转而攻击自己，可以保护高价值后排，也能打断敌方原本的进攻目标。
- 技能需要额外消耗圣水，并且冷却时间较长。嘲讽的收益取决于施放时机：过早使用可能只吸引少量单位，过晚使用则来不及保护后排。面对范围伤害时，还要避免把己方单位聚集在精英骑士附近。
