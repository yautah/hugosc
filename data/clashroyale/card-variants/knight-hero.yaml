usage_tips:
- 等敌方关键单位进入嘲讽范围后再发动技能，避免把额外圣水花在只能吸引单个低威胁目标的场面。
- 用护盾和嘲讽保护火枪手等后排单位时，应留意敌方范围伤害，避免保护动作反而让部队过度集中。
- 防守反击中保留技能通常更有威胁，对手必须持续考虑目标被改变以及护盾吸收伤害的可能。
matchups:
- title: 适合应对
  text: 适合干扰依赖锁定目标的单体单位，并为己方脆弱后排争取重新输出或撤离的时间。
- title: 需要提防
  text: 范围伤害、强控制和能够快速击破护盾的集中火力会压缩嘲讽带来的保护收益。
- title: 搭配思路
  text: 与高输出远程单位组合最直接，也可以利用嘲讽改变目标，为另一条进攻路线争取时间。
