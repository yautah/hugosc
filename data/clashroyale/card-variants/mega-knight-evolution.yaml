overview:
  - 觉醒超级骑士与基础形态拥有相同生命值和伤害，但每次普通攻击都会把当前目标朝最近的敌方皇家塔方向击退。轻中型单位被推 4 格，重型单位在 2026 年 6 月调整后只被推 2.5 格。
  - 定向击退可以把前排与后排拆开，并把目标重新送入 3.5 至 5 格的跃击区间。只有当前锁定目标被击退，范围内其他单位仍能继续攻击，因此包围与重型人海仍可限制他。
