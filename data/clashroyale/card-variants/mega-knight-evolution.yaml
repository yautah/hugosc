usage_tips:
  - 用登场伤害解场后，让普通攻击把前排推离后排；目标进入跃击距离时可以继续形成击退与跃击循环。
  - 定向击退会朝敌方皇家塔移动目标，可与神箭游侠、飞斧屠夫等贯穿单位配合，创造对塔直线。
  - 面对重型单位时击退只有 2.5 格，不能再依赖无限推离；需要建筑、递增伤害或其他高单体输出共同处理。
  - 七费且只需一个觉醒周期，仍应优先用于高价值防守，不要为了轮转在缺乏目标时沉底部署。
matchups:
  - { title: 适合应对, text: '适合拆散以单一前排保护后排的地面推进，并反复打断可击退单位的攻击与冲锋。' }
  - { title: 需要提防, text: '空军、地狱之塔和分散包围不会被定向击退整体解决，重型单位的击退距离也已经缩短。' }
  - { title: 搭配思路, text: '与贯穿输出、蝙蝠和重置法术组合，利用击退制造直线，同时补足对空和递增伤害对局。' }
