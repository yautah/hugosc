overview:
- 觉醒弓箭手仍然是两名可以攻击空中和地面的远程单位，但射程提高到 6 格。目标与她们相距 4–6 格时，攻击会转为强力射击，造成普通攻击 150% 的伤害，因此站位和距离控制比普通弓箭手更重要。
- 强力射击适合快速消耗坦克、远程支援和防御建筑。敌人一旦进入 4 格以内，觉醒弓箭手就会恢复普通伤害；她们的生命值也没有额外提升，万箭齐发等范围法术以及贴身单位依然能够稳定处理两名弓箭手。
