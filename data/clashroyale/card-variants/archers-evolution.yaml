usage_tips:
- 尽量让目标停留在 4–6 格的强力射击区间，可以用骑士等低费前排拦住敌人，为弓箭手保持输出距离。
- 从国王塔后方分路部署仍然有效，但两名弓箭手分开后更难同时利用强力射击，需要根据来袭路线决定是否分路。
- 防守大型单位时应提前部署，让目标在接近之前承受更多强力射击；等敌人贴近后再下牌会明显损失觉醒收益。
- 进攻时与其他后排保持距离，避免对手用一个范围法术同时处理觉醒弓箭手和主要支援单位。
matchups:
- title: 适合应对
  text: 适合远距离消耗高生命值部队、空中单位和射程较短的防御单位，也能利用额外射程压制部分建筑。
- title: 需要提防
  text: 万箭齐发、皇家速递等范围伤害依然能够处理她们；快速贴身或将她们拉入 4 格以内，也会关闭强力射击。
- title: 搭配思路
  text: 与骑士等迷你坦克配合最直接，前排负责固定敌人位置，觉醒弓箭手在后方维持强力射击；攻城和矿工体系也能利用她们的远距离输出。
