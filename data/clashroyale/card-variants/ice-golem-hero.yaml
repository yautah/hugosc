usage_tips:
  - 先用冰人吸引敌军聚集，再在多个目标进入四格半径后开启技能，确保三次脉冲都能覆盖关键单位。
  - 与野猪骑士等快速建筑目标单位进攻时，可在接塔附近冻结防守，为主攻单位增加输出窗口。
  - 技能需要额外两费，不要在普通冰人的拉扯已经足够时开启；保留圣水往往比少量脉冲伤害更重要。
  - 暴风雪已经没有击退，不能依靠它把单位推离皇家塔或改变路线，应提前用部署位置完成实际拉扯。
matchups:
  - { title: 适合应对, text: '适合密集推进、攻击频率高的单位和需要争取输出时间的关键防守，完整三次脉冲可追加冻结。' }
  - { title: 需要提防, text: '远程分散站位和快速离开范围的单位会减少脉冲覆盖，爆发伤害也可能在技能完成前击败冰人。' }
  - { title: 搭配思路, text: '与野猪骑士、气球兵和远程范围输出搭配，用减速与冻结延长主攻单位或后排的攻击窗口。' }
