overview:
  - 英雄戈仑冰人保留低费建筑目标肉盾和死亡冰爆，主动技能“暴风雪”在一秒准备后产生三次范围脉冲。每次脉冲都会伤害并减速四格内的空中和地面单位，连续承受三次后再被冻结一点五秒。
  - 该技能适合把廉价拉扯升级为范围控制，但部署加技能共需四费。2026 年 4 月移除击退后，暴风雪不能再靠推动改变单位路线，主要价值集中在减速、冻结和为后排争取输出时间。
