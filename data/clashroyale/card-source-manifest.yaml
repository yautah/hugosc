  release_date: 4 January 2016
  official_id: 26000012
  official_description_zh: |-
    召唤一支骷髅大军。
    来见见拉里和他的好哥们
    哈里、格里、特里和玛丽一家子吧。
- key: witch
  fandom_page: Witch
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Witch
  name_zh: 女巫
  cost: '5'
  arena: P.E.K.K.A.'s Playhouse
  release_date: 4 January 2016
  official_id: 26000007
  official_description_zh: 不仅能召唤骷髅军队，还可以发射魔法光束，只可惜那对粉光电眼无法发射激光。
- key: pekka
  fandom_page: P.E.K.K.A.
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/P.E.K.K.A.
  name_zh: 皮卡超人
  cost: '7'
  arena: P.E.K.K.A.'s Playhouse
  release_date: 4 January 2016
  official_id: 26000004
  official_description_zh: 身披重甲的近战勇士，虽然她摇摆着身体，动作有点缓慢，但攻击力极高。
- key: dark-prince
  fandom_page: Dark Prince
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Dark_Prince
  name_zh: 黑暗王子
  cost: '4'
  arena: Royal Arena
  release_date: 29 February 2016
  official_id: 26000027
  official_description_zh: 黑暗王子可以造成范围伤害，他用狼牙棒为自己代言 — 因为当他说话时，听起来就像头上罩了个水桶。
- key: prince
  fandom_page: Prince
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Prince
  name_zh: 王子
  cost: '5'
  arena: Royal Arena
  release_date: 4 January 2016
  official_id: 26000016
  official_description_zh: 不要因为王子骑的是匹小马就小瞧他哦。一旦王子开始往前冲，你就知道他有多厉害了。王子冲锋时会造成双倍伤害。
- key: balloon
  fandom_page: Balloon
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Balloon
  name_zh: 气球兵
  cost: '5'
  arena: Royal Arena
  release_date: 4 January 2016
  official_id: 26000006
  official_description_zh: 这些气球虽然非常漂亮，但您绝不想看到它们成队出现在您的领空。气球兵会投掷强大的炸弹，而且气球被击落后将爆炸，造成范围伤害。
- key: giant-skeleton
  fandom_page: Giant Skeleton
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Giant_Skeleton
  name_zh: 骷髅巨人
  cost: '6'
  arena: Frozen Peak
  release_date: 4 January 2016
  official_id: 26000020
  official_description_zh: 骷髅的个头越大，携带的炸弹威力就越强。骷髅巨人携带的炸弹会在他阵亡后爆炸。
- key: rune-giant
  fandom_page: Rune Giant
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Rune_Giant
  name_zh: 符文巨人
  cost: '4'
  arena: Jungle Arena
  release_date: 6 January 2025
  name_source: https://supercell.com/en/games/clashroyale/zh-hans/blog/release-notes/2月-活动-挑战-2
- key: goblin-giant
  fandom_page: Goblin Giant
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Goblin_Giant
  name_zh: 哥布林巨人
  cost: '6'
  arena: Jungle Arena
  release_date: 5 September 2018
  official_id: 26000060
  official_description_zh: 哥布林巨人总是很欢乐，他魁梧的身躯会坚定地朝着敌方建筑迈进。他无论走到哪里都背着两名哥布林投矛手。这个组合看似奇怪，但他们的实力不容小觑！
- key: hunter
  fandom_page: Hunter
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Hunter
  name_zh: 猎人
  cost: '4'
  arena: Hog Mountain
  release_date: 12 December 2017
  official_id: 26000044
  official_description_zh: 他能对近距离目标造成大量伤害，但对付远距离目标时效果略逊一筹。他的射击精度不高，不过他那标志性的浓密眉毛却给他加分不少。命中不够，造型来凑！
- key: golem
  fandom_page: Golem
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Golem
  name_zh: 戈仑石人
  cost: '8'
  arena: Hog Mountain
  release_date: 4 January 2016
  official_id: 26000009
  official_description_zh: 缓慢但强韧的戈仑石人只会攻击建筑。被摧毁后，他会分裂成两个小戈仑石人，同时造成范围伤害！
- key: electro-dragon
  fandom_page: Electro Dragon
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Electro_Dragon
  name_zh: 雷电飞龙
  cost: '5'
  arena: Spooky Town
  release_date: 9 November 2018
  official_id: 26000063
  official_description_zh: 雷电飞龙喷出的雷电每次最多可攻击到3个目标。和所有排行老二的孩子一样，它也是个渴望关爱的宝宝。
- key: wall-breakers
  fandom_page: Wall Breakers
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Wall_Breakers
  name_zh: 攻城炸弹人
  cost: '2'
  arena: Spooky Town
  release_date: 26 February 2019
  official_id: 26000058
  official_description_zh: 这两个炸弹人举着炸药桶，在竞技场上视死如归。只有轰塌一座座建筑才能让炸弹人那颗冰冷的心得到些许温暖。
- key: electro-giant
  fandom_page: Electro Giant
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Electro_Giant
  name_zh: 雷电巨人
  cost: '7'
  arena: Rascal's Hideout
  release_date: 2 November 2020
  official_id: 26000085
  official_description_zh: |-
    雷电巨人背着一个特制的电击背包，可以发射电流，击晕并伤害作用范围内胆敢对他动手的敌人。

    可别当着雷电巨人的面说"比手枪"是幼稚行为，不然他准会给你来场电疗。
- key: bowler
  fandom_page: Bowler
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Bowler
  name_zh: 巨石投手
  cost: '5'
  arena: Rascal's Hideout
  release_date: 4 July 2016
  official_id: 26000034
  official_description_zh: 这个蓝皮大个子一辈子只做两件简单的事：豪饮暗黑重油、投掷巨型岩石。他扔出的巨石在击中目标后，仍会向前滚动对路径上的目标造成伤害。
- key: executioner
  fandom_page: Executioner
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Executioner
  name_zh: 飞斧屠夫
  cost: '5'
  arena: Serenity Peak
  release_date: 27 January 2017
  official_id: 26000045
  official_description_zh: 他扔出的斧头像一把回旋镖，斧头在飞出和飞回时都会对其路径上的敌军造成伤害。斧头这么使还能保住双臂，真是奇迹。
- key: cannon-cart
  fandom_page: Cannon Cart
  type: troop
  rarity: epic
  source_url: https://clashroyale.fandom.com/wiki/Cannon_Cart
  name_zh: 加农炮战车
  cost: '5'
  arena: Miner's Mine
  release_date: 5 August 2017
  official_id: 26000054
  official_description_zh: 带轮子的加农炮？敌军肯定没料到！一旦护盾被击破，它就会变成一个不带轮子的加农炮。
- key: mega-knight
  fandom_page: Mega Knight
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Mega_Knight
  name_zh: 超级骑士
  cost: '7'
  arena: Electro Valley
  release_date: 8 September 2017
  official_id: 26000055
  official_description_zh: 他登场时伴随着"千髯之力"，之后他会跃向敌军发动攻击，跃击能造成巨量范围伤害。最好离他远点！
- key: ram-rider
  fandom_page: Ram Rider
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Ram_Rider
  name_zh: 蛮羊骑士
  cost: '5'
  arena: Electro Valley
  release_date: 24 December 2018
  official_id: 26000051
  official_description_zh: 竞技场上，一人一羊，缚敌推塔，势不可挡，还有......青草真香？！
- key: electro-wizard
  fandom_page: Electro Wizard
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Electro_Wizard
  name_zh: 闪电法师
  cost: '4'
  arena: Electro Valley
  release_date: 30 December 2016
  official_id: 26000042
  official_description_zh: 天空一声轰隆巨响，闪电法师酷炫登场。登场眩晕附近敌军，双手放电英姿飒爽！真是个爱显摆的家伙。
- key: inferno-dragon
  fandom_page: Inferno Dragon
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Inferno_Dragon
  name_zh: 地狱飞龙
  cost: '4'
  arena: Electro Valley
  release_date: 30 September 2016
  official_id: 26000037
  official_description_zh: 地狱飞龙对单个目标喷射火焰射线，造成的伤害会随着时间递增。飞行有危险，记得戴头盔。
- key: sparky
  fandom_page: Sparky
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Sparky
  name_zh: 电磁炮
  cost: '6'
  arena: Electro Valley
  release_date: 3 May 2016
  official_id: 26000033
  official_description_zh: 电磁炮会慢慢充能，然后可造成巨量范围伤害。她的字典里可没有"伤害过量"这个词。
- key: miner
  fandom_page: Miner
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Miner
  name_zh: 掘地矿工
  cost: '3'
  arena: Electro Valley
  release_date: 3 May 2016
  official_id: 26000032
  official_description_zh: 掘地矿工可以掘地三尺并在竞技场中的任何位置破土而出。这可不是什么魔法，他靠的是他的铲子。对皇家塔的伤害会大打折扣。
- key: princess
  fandom_page: Princess
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Princess
  name_zh: 公主
  cost: '3'
  arena: Electro Valley
  release_date: 29 February 2016
  official_id: 26000026
  official_description_zh: 这位迷人的公主会从远距离发射火焰箭。如果你看到她时感到很温暖，当心了，这可能是因为你身上着火了。
- key: phoenix
  fandom_page: Phoenix
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Phoenix
  name_zh: 凤凰
  cost: '4'
  arena: Spooky Town
  release_date: 26 October 2022
  official_id: 26000087
  official_description_zh: |-
    被击倒后，这只神秘生物将变成一颗蛋。这颗蛋如果成功孵化，凤凰将重新在竞技场上翱翔！这技能真是鸟见鸟爱！

    凤凰蛋成功孵化后会以完整生命值和伤害重返竞技场，但重生的凤凰再次被击败时不会生成新的蛋。
- key: royal-ghost
  fandom_page: Royal Ghost
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Royal_Ghost
  name_zh: 皇家幽灵
  cost: '3'
  arena: Spooky Town
  release_date: 4 January 2018
  official_id: 26000050
  official_description_zh: 一个在竞技场中游荡的隐形幽灵，当他被敌人惊醒后便会显形并发动攻击！解决了眼前的敌人后，他会再次隐身继续呼呼大睡。
- key: ice-wizard
  fandom_page: Ice Wizard
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Ice_Wizard
  name_zh: 寒冰法师
  cost: '3'
  arena: Spooky Town
  release_date: 29 February 2016
  official_id: 26000023
  official_description_zh: 这位超酷的法师会向敌人发射冰晶，降低他们的移动速度和攻击速度。虽然寒冰法师外表冷酷，但他那迷人的胡子透露出的热情就足以让他在皇室频道人气大旺了。
- key: magic-archer
  fandom_page: Magic Archer
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Magic_Archer
  name_zh: 神箭游侠
  cost: '4'
  arena: Rascal's Hideout
  release_date: 2 March 2018
  official_id: 26000062
  official_description_zh: 说他是法师或是弓箭手未免有点太小瞧他了！他射出的神箭穿透性极强，可对飞行路径上的所有敌人造成伤害。这可不是街头魔术，这是他的魔法神箭！
- key: bandit
  fandom_page: Bandit
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Bandit
  name_zh: 幻影刺客
  cost: '3'
  arena: Rascal's Hideout
  release_date: 24 March 2017
  official_id: 26000046
  official_description_zh: 幻影刺客可以向目标发动突袭，造成双倍伤害！幻影刺客在突袭过程中不会受到攻击。面具掩饰了她神秘的身份，也给她增添了一分高冷！
- key: lava-hound
  fandom_page: Lava Hound
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Lava_Hound
  name_zh: 熔岩猎犬
  cost: '7'
  arena: Rascal's Hideout
  release_date: 3 May 2016
  official_id: 26000029
  official_description_zh: 熔岩猎犬是一只专门攻击建筑物的飞行巨兽。熔岩幼犬的个头虽没那么伟岸，但它们脾气暴躁，会攻击任何单位。
- key: night-witch
  fandom_page: Night Witch
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Night_Witch
  name_zh: 暗夜女巫
  cost: '4'
  arena: Serenity Peak
  release_date: 31 May 2017
  official_id: 26000048
  official_description_zh: 她能召唤蝙蝠，只要她一声号令，这些蝙蝠便会为她赴汤蹈火。如果你靠得太近，她可不介意用手中那造型恐怖的法杖教训教训你。
- key: lumberjack
  fandom_page: Lumberjack
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Lumberjack
  name_zh: 狂暴樵夫
  cost: '4'
  arena: Serenity Peak
  release_date: 4 July 2016
  official_id: 26000035
  official_description_zh: 他白天砍树，晚上追踪滚木。当他倒下时，他扛着的那瓶狂暴药水便会洒得到处都是。
- key: spirit-empress
  fandom_page: Spirit Empress
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Spirit_Empress
  name_zh: 精灵女王
  cost: '6 ''''(Air form: if the player''s Elixir count ≥ 6)''''<br />3 ''''(Ground form: otherwise)'''''
  arena: Miner's Mine
  release_date: 7 July 2025
  name_source: https://supercell.com/en/games/clashroyale/zh-hans/blog/news/全新-主题季-女王-的-新衣
- key: goblin-machine
  fandom_page: Goblin Machine
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Goblin_Machine
  name_zh: 哥布林机甲
  cost: '5'
  arena: Miner's Mine
  release_date: 17 June 2024
  name_source: https://supercell.com/en/games/clashroyale/zh-hans/blog/news/哥布林女皇征程更新
- key: mother-witch
  fandom_page: Mother Witch
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Mother_Witch
  name_zh: 女巫婆婆
  cost: '4'
  arena: Miner's Mine
  release_date: 7 December 2020
  official_id: 26000083
  official_description_zh: |-
    女巫婆婆每次攻击都会对敌方军队施加魔法，受到魔力侵蚀的军队单位被消灭后会变成野猪。这些被魔力侵蚀的野猪会加入女巫婆婆的阵营，向敌方建筑发起冲击！

    除了会魔法，女巫婆婆还烤得一手好饼干。
- key: fisherman
  fandom_page: Fisherman
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Fisherman
  name_zh: 渔夫
  cost: '3'
  arena: Miner's Mine
  release_date: 5 August 2019
  official_id: 26000061
  official_description_zh: 他的远程攻击能将敌人拉到自己身前，也可以把自己拉到敌方建筑脚下。他还精通失传已久的"咸鱼十八掌"。
- key: ronin
  fandom_page: Ronin
  type: troop
  rarity: legendary
  source_url: https://clashroyale.fandom.com/wiki/Ronin
  name_zh: 浪人
  cost: '5'
  arena: Serenity Peak
  release_date: 6 July 2026
  name_source: https://supercell.com/en/games/clashroyale/zh-hans/blog/release-notes/全新-主题季-荣耀-与-离乡
- key: golden-knight
  fandom_page: Golden Knight
  type: troop
  rarity: champion
  source_url: https://clashroyale.fandom.com/wiki/Golden_Knight
  name_zh: 黄金圣骑
  cost: '4'
  arena: Executioner's Kitchen
  release_date: 27 October 2021
  official_id: 26000074
  official_description_zh: 他是一位秀发浓密、身体柔韧的战士。如有需要，他会展示自己的有氧运动技巧。
- key: skeleton-king
  fandom_page: Skeleton King
  type: troop
  rarity: champion
  source_url: https://clashroyale.fandom.com/wiki/Skeleton_King
  name_zh: 骷髅帝王
  cost: '4'
  arena: Executioner's Kitchen
  release_date: 27 October 2021
  official_id: 26000069
  official_description_zh: 不死之王本王。有时他会感到孤独（可能是因为他不太招人喜欢），会把死去的朋友召回战场和他并肩作战。硬汉也有柔情！
- key: boss-bandit
  fandom_page: Boss Bandit
  type: troop
  rarity: champion
  source_url: https://clashroyale.fandom.com/wiki/Boss_Bandit
  name_zh: 刺客头领
  cost: '6'
  arena: Royal Crypt
  release_date: 7 April 2025
  name_source: https://supercell.com/en/games/clashroyale/zh-hans/blog/release-notes/4月-更新
- key: archer-queen
  fandom_page: Archer Queen
  type: troop
  rarity: champion
  source_url: https://clashroyale.fandom.com/wiki/Archer_Queen
  name_zh: 弓箭女皇
  cost: '5'
  arena: Royal Crypt
  release_date: 27 October 2021
  official_id: 26000072
  official_description_zh: 她快如疾风、极其危险，并且难以捉摸。当心她的箭矢！和她对战别眨眼，不然你可能找不到她！
- key: mighty-miner
  fandom_page: Mighty Miner
  type: troop
  rarity: champion
  source_url: https://clashroyale.fandom.com/wiki/Mighty_Miner
  name_zh: 威猛矿工
  cost: 4
  arena: 17
  release_date: 30/3/2022
  official_id: 26000065
  official_description_zh: |-
    轻轻的我来了，扛着巨大的钻机！

    这位英雄对目标造成的伤害会不断提升，还能钻到另一路，从激战中脱身或改变攻击目标。

    凭着这股"钻"劲儿，他成为了竞技场上最威猛、最狡猾的矿工！
- key: goblinstein
  fandom_page: Goblinstein
  type: troop
  rarity: champion
  source_url: https://clashroyale.fandom.com/wiki/Goblinstein
  name_zh: 科学怪哥布林
  cost: '5'
  arena: Silent Sanctuary
