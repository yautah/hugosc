source_url: https://clashroyale.fandom.com/wiki/Bats
items:
- date: '2025-03-31'
  type: adjustment
  summary: 修正部署队形，使蝙蝠根据竞技场所在一侧正确镜像排列。
- date: '2023-10-02'
  type: evolution
  summary: 觉醒蝙蝠正式上线，蝙蝠获得觉醒形态。
- date: '2020-12-09'
  type: buff
  summary: 首次攻击间隔从 0.8 秒缩短至 0.6 秒。
- date: '2020-08-04'
  type: nerf
  summary: 攻击间隔从 1.1 秒延长至 1.3 秒，首次攻击间隔从 0.6 秒延长至 0.8 秒。
- date: '2020-06-02'
  type: buff
  summary: 每只蝙蝠之间的部署间隔从 0.15 秒缩短至 0.1 秒。
- date: '2019-11-26'
  type: visual
  summary: 卡牌信息界面更换为新的卡牌图片。
- date: '2019-03-04'
  type: adjustment
  summary: 五只蝙蝠改为依次部署，每只之间间隔 0.15 秒。
- date: '2018-01-24'
  type: nerf
  summary: 攻击间隔从 1 秒延长至 1.1 秒，首次攻击间隔从 0.5 秒延长至 0.6 秒。
- date: '2017-08-11'
  type: buff
  summary: 单位数量从 4 只增加至 5 只。
- date: '2017-07-07'
  type: release
  summary: 蝙蝠正式加入游戏。
