source_url: https://clashroyale.fandom.com/wiki/Rascals
items:
  - date: '2025-07-08'
    type: adjustment
    summary: 绿林小哥伤害提高 54%，绿林小妹伤害降低 6%。
  - date: '2025-03-31'
    type: adjustment
    summary: 调整部署队形，使三个单位根据竞技场所在一侧正确镜像排列。
  - date: '2023-04-04'
    type: buff
    summary: 绿林小哥生命值提高 6%，绿林小妹首次攻击间隔从 0.8 秒缩短至 0.5 秒，并扩大三个单位之间的部署距离。
  - date: '2021-12-07'
    type: buff
    summary: 绿林小妹攻击间隔从 1.1 秒缩短至 1 秒。
  - date: '2021-06-07'
    type: buff
    summary: 绿林小妹首次攻击间隔从 1 秒缩短至 0.8 秒。
  - date: '2020-06-02'
    type: buff
    summary: 三个单位依次出现的部署间隔从 0.15 秒缩短至 0.1 秒。
  - date: '2019-07-01'
    type: nerf
    summary: 绿林小哥攻击距离从 1 格缩短至 0.8 格，并归类为近战：短。
  - date: '2019-06-03'
    type: nerf
    summary: 绿林小哥攻击间隔从 1.3 秒延长至 1.5 秒，首次攻击间隔从 0.3 秒延长至 0.4 秒。
  - date: '2019-03-11'
    type: adjustment
    summary: 调整部署顺序，改为绿林小哥先于两名绿林小妹生成。
  - date: '2019-03-04'
    type: adjustment
    summary: 三个单位改为以 0.15 秒间隔依次部署。
  - date: '2018-07-02'
    type: nerf
    summary: 绿林小哥生命值降低 5.3%，绿林小妹首次攻击间隔从 0.4 秒延长至 1 秒。
  - date: '2018-05-25'
    type: release
    summary: 绿林团伙正式面向所有玩家加入游戏。
