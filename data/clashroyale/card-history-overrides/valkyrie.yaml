source_url: https://clashroyale.fandom.com/wiki/Valkyrie
items:
  - date: '2025-03-31'
    type: adjustment
    summary: 生命值降低 0.05%，伤害降低 0.45%。
  - date: '2024-01-01'
    type: evolution
    summary: 觉醒瓦基丽武神正式加入游戏。
  - date: '2022-04-04'
    type: nerf
    summary: 生命值降低 4%。
  - date: '2022-03-30'
    type: visual
    summary: 卡牌图片更换为当前版本。
  - date: '2021-06-07'
    type: visual
    summary: 卡牌角色立绘更新为皇室战争独立版本。
  - date: '2019-11-26'
    type: visual
    summary: 卡牌信息页面加入角色立绘。
  - date: '2019-09-30'
    type: buff
    summary: 范围伤害半径从 1.9 格提高至 2 格。
  - date: '2019-08-05'
    type: nerf
    summary: 范围伤害半径从 2.4 格缩短至 1.9 格，修复可命中过远近战单位的问题。
  - date: '2019-07-01'
    type: buff
    summary: 攻击距离从 1 格提高至 1.2 格，范围伤害半径从 2 格提高至 2.4 格。
  - date: '2019-01-07'
    type: buff
    summary: 攻击间隔从 1.6 秒缩短至 1.5 秒，首次攻击间隔从 0.2 秒缩短至 0.1 秒。
  - date: '2018-09-03'
    type: nerf
    summary: 攻击间隔从 1.4 秒延长至 1.6 秒，并加入 0.2 秒首次攻击延迟。
  - date: '2018-06-04'
    type: buff
    summary: 生命值提高 7%，首次攻击由 0.2 秒延迟改为立即发动。
  - date: '2018-02-12'
    type: buff
    summary: 攻击间隔从 1.5 秒缩短至 1.4 秒。
  - date: '2017-10-09'
    type: buff
    summary: 伤害提高 5%。
  - date: '2016-05-03'
    type: adjustment
    summary: 开始受到所有击退效果影响，并修正攻击距离显示；面板从 1.5 格改为 1 格，实际范围保持不变。
  - date: '2016-03-23'
    type: buff
    summary: 生命值和伤害均提高 10%。
  - date: '2016-02-29'
    type: buff
    summary: 目标在攻击动画中被击败时不再取消攻击，视野范围从 6 格缩短至 5.5 格。
  - date: '2016-02-09'
    type: buff
    summary: 攻击间隔从 1.6 秒缩短至 1.5 秒。
  - date: '2016-01-04'
    type: release
    summary: 瓦基丽武神随游戏上线加入初始卡牌池。
