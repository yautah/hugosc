items:
  - date: '2025-12-01'
    type: hero
    summary: 精英火枪手正式加入游戏，推出召唤随身炮塔的主动技能。
  - date: '2025-10-29'
    type: visual
    summary: 更换火枪手的卡牌图片。
  - date: '2025-03-31'
    type: nerf
    summary: 伤害降低 0.45%，生命值降低 0.06%。
  - date: '2025-02-04'
    type: buff
    summary: 首次攻击间隔从 0.8 秒缩短至 0.7 秒。
  - date: '2024-11-04'
    type: evolution
    summary: 觉醒火枪手正式加入游戏，推出三发超远距离狙击机制。
  - date: '2022-02-03'
    type: buff
    summary: 攻击间隔从 1.1 秒缩短至 1 秒。
  - date: '2021-09-02'
    type: visual
    summary: 更换火枪手的卡牌立绘。
  - date: '2020-10-06'
    type: nerf
    summary: 首次攻击间隔从 0.5 秒延长至 0.8 秒。
  - date: '2019-02-04'
    type: buff
    summary: 伤害提高 3%。
  - date: '2016-05-03'
    type: adjustment
    summary: 修复攻击距离显示问题，将显示值从 6.5 格修正为 6 格，实际有效距离不变。
  - date: '2016-02-29'
    type: visual
    summary: 视野范围从 6.5 格缩短至 6 格，并更换火枪手的卡牌图片。
  - date: '2016-02-19'
    type: buff
    summary: 伤害提高 11%。
  - date: '2016-02-09'
    type: adjustment
    summary: 圣水费用从 5 费降低至 4 费，伤害降低 25%。
  - date: '2016-01-04'
    type: release
    summary: 火枪手随游戏早期版本正式加入。
