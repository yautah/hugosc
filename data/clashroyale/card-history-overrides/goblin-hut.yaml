  - { date: '2025-08-04', type: adjustment, summary: '生成间隔由 1.8 秒延长至 1.9 秒，首次生成延迟由 1 秒缩短至 0.5 秒；哥布林投矛手首次攻击间隔由 0.4 秒延长至 0.5 秒，射程由 5.5 格降至 5 格。' }
