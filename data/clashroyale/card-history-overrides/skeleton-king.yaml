items:
  - { date: '2025-10-24', type: nerf, summary: '灵魂召唤的骷髅兵生成半径从 4 格缩短至 3.5 格。' }
  - { date: '2025-10-06', type: nerf, summary: '召唤骷髅兵的攻击间隔从 1 秒延长至 1.1 秒。' }
  - { date: '2024-06-17', type: nerf, summary: '生命值降低 0.08%，伤害降低 0.48%。' }
  - { date: '2022-10-26', type: adjustment, summary: '碰撞半径从 1.2 格缩小至 1 格。' }
  - { date: '2022-08-02', type: nerf, summary: '灵魂召唤的最大骷髅兵数量从 18 只降至 16 只。' }
  - { date: '2022-06-07', type: nerf, summary: '灵魂召唤的最大骷髅兵数量从 20 只降至 18 只。' }
  - { date: '2022-03-30', type: adjustment, summary: '修复克隆发生在灵魂召唤动画期间会取消技能的问题，并修正召唤骷髅兵的属性取整。' }
  - { date: '2021-11-04', type: buff, summary: '伤害提高 14%，溅射半径从 1 格提高至 1.3 格，并获得击退免疫。' }
  - { date: '2021-10-27', type: release, summary: '骷髅帝王作为首批英雄卡牌之一正式加入游戏。' }
