strategy:
  positioning: 迷你皮卡的主要价值是用较低费用处理高血量地面单位，并把存活单位转化为反击压力。它的单次伤害很高，但攻击间隔较长，部署位置和目标选择通常比主动桥头进攻更重要。
  strengths:
  - 对巨人、皇家巨人等高血量地面单位能快速造成大量伤害。
  - 防守后若仍有较高生命值，对手必须继续投入费用处理反击。
  - 能够迅速清除靠近推进单位的高价值单体后排。
  tips:
  - 尽量先在己方半场完成防守，再搭配前排或法术组织反击。
  - 对付坦克加后排的推进时，可优先切掉后排，再回头处理坦克。
  - 进攻前观察对手是否保留骷髅军团、哥布林团伙等杂兵，并准备相应的小法术。
  weaknesses:
  - 只能攻击地面，无法直接处理空中单位。
  - 攻击速度较慢，容易被骷髅兵、守卫和其他杂兵牵制。
  - 单独进攻容易被中置单位拉扯，四点圣水很难形成有效交换。
  synergies:
  - 电击法术、滚木等低费法术可清理杂兵，减少其被低费单位拖住的风险。
  - 女武神、飞斧屠夫等范围单位可以保护它免受杂兵围攻。
  - 冰人等低费前排能够吸收伤害并帮助它接近防守单位。
