  type: buff
  summary: 部署时间由 5 秒缩短至 4 秒。
- date: '2016-05-03'
  type: adjustment
  summary: 部署时间由 3 秒延长至 5 秒，伤害降低 10%，面板射程由 5 至 12 格调整为 4.5 至 11.5 格，实际有效射程不变，并更新音效和摧毁动画。
- date: '2016-02-29'
  type: adjustment
  summary: 目标在炮弹飞行途中被消灭时，迫击炮不再停止该发炮弹，并调整了解锁竞技场。
- date: '2016-02-09'
  type: buff
  summary: 持续时间由 20 秒提高至 30 秒。
- date: '2016-02-02'
  type: adjustment
  summary: 圣水费用由 6 点降至 4 点，伤害降低 40%，持续时间由 40 秒缩短至 20 秒，最大射程由 13 格降至 12 格。
- date: '2016-01-11'
  type: nerf
  summary: 持续时间由 60 秒缩短至 40 秒。
