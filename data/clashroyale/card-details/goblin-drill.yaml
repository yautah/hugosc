- date: '2022-06-07'
  type: nerf
  summary: 地下移动速度由 400 降至 300。
- date: '2022-03-30'
  type: adjustment
  summary: 修复星级外观错误使用矿工音效的问题。
- date: '2021-10-27'
  type: visual
  summary: 调整地下移动轨迹以区别于矿工，并修复与克隆法术的异常互动。
- date: '2021-09-06'
  type: nerf
  summary: 被摧毁时生成的哥布林由 3 名减少至 2 名。
- date: '2021-07-11'
  type: release
  summary: 哥布林钻机面向所有玩家正式推出。
- date: '2021-06-17'
  type: adjustment
  summary: 首次生成新增 1 秒延迟，调整被摧毁时哥布林的阵型，并降低钻出时对地面单位的推动效果。
- date: '2021-06-12'
  type: release
  summary: 哥布林钻机首次在专属选卡挑战中开放使用。
