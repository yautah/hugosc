overview:
- 蝙蝠是一张两费空中单位卡，一次部署五只移动速度极快的近战单位。单只蝙蝠的生命值很低，但五只同时攻击时具有较高的合计输出，可以迅速围攻缺少对空手段的单体单位。
- 这张卡的价值与对手的小法术循环紧密相关。电击法术、巨型雪球、箭雨和大多数范围攻击都能快速清理普通蝙蝠；若先用其他人海牌逼出这些手段，蝙蝠就更容易在防守后保留数量并转入反击。
usage_tips:
- 防守骑士、迷你皮卡和其他不能对空的单体单位时，从目标周围部署，让五只蝙蝠尽快同时攻击。
- 记住对手的电击法术、巨型雪球或箭雨是否已经使用，小法术不在手时再让蝙蝠承担进攻输出。
- 与矿工或坦克搭配时，让前排先吸引皇家塔和对空单位的目标，蝙蝠再从后方进场输出。
- 不要过早将蝙蝠放在远离交战区的位置；极快的移动速度会让它们超过前排，提前进入范围伤害或皇家塔火力。
matchups:
- title: 适合应对
  text: 骑士、迷你皮卡、皮卡超人和其他不能对空的单体单位，以及需要用低费高输出快速处理的空中目标。
- title: 需要提防
  text: 电击法术、巨型雪球、箭雨和能够对空的范围单位。普通蝙蝠生命值低，一次范围命中往往就会失去全部输出。
- title: 搭配思路
  text: 适合矿工、巨人和其他能吸引火力的单位，也可与骷髅军团、哥布林等人海牌组成法术诱饵，分散对手的范围解牌。
