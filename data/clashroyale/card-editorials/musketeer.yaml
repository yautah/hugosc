overview:
  - 火枪手是一张四费远程单体部队，六格射程和稳定攻速让她能够同时承担对空、防守和反击任务。她没有范围伤害或控制效果，但能持续处理多数中等生命值目标。
  - 她的价值依赖站位和存活时间。放在皇家塔后方可以安全输出，防守结束后也能跟随前排反击；若直接暴露在桥头或与其他后排重叠，则容易被法术一次处理并失去费用优势。
usage_tips:
  - 面对气球兵和飞龙等空中单位时尽量靠近己方皇家塔部署，让塔承担部分伤害并延长火枪手输出时间。
  - 防守后可在她前方补巨人、冰人或野猪骑士，把存活的远程输出转化为进攻压力。
  - 与其他远程部队保持适当间距，避免火球、雷电法术或毒药法术一次命中多个高价值目标。
  - 她缺少范围伤害，面对蝙蝠和亡灵大军时应配合小法术或其他范围单位，不要让攻击次数被人海消耗。
matchups:
  - { title: 适合应对, text: '气球兵、飞龙宝宝、重甲亡灵等需要稳定对空输出处理的目标，以及缺少快速贴身手段的中距离单位。' }
  - { title: 需要提防, text: '火球、雷电法术、矿工和能够快速跳到后排的近战单位。她生命值有限，被贴身后难以依靠射程自保。' }
  - { title: 搭配思路, text: '与巨人、冰人和野猪骑士等前排搭配，在防守后形成反击；小法术则负责清理会分散她单体火力的人海。' }
