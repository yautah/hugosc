overview:
  - 骷髅军团是一张三费地面人海卡牌，一次部署十五只骷髅。单只属性很低，但全部围住目标后能在短时间形成极高总伤害，适合处理缺少范围攻击的高费单体单位。
  - 十五个单位也让它极易受到范围伤害和小法术影响。部署过早会给对手充足反应时间，部署过于集中则可能被一张低费卡完全化解。
usage_tips:
  - 等高伤单体进入己方半场后再从周围部署，利用十五只骷髅快速包围，避免在桥头给对手提前使用法术的时间。
  - 记录对手小法术轮转；当滚木、万箭齐发或电击法术离手后再使用，骷髅军团更容易获得正向费用交换。
  - 与其他法术诱饵分开部署，迫使对手在多个低生命值威胁之间选择，避免同一范围法术同时处理多张卡。
  - 不要用于处理带持续范围伤害的单位，十五只骷髅会迅速消失；此时应改用远程或高生命值防守。
matchups:
  - { title: 适合应对, text: '适合围攻皮卡超人、王子等高伤单体地面单位，也能在对手法术离手时迅速消耗建筑或皇家塔。' }
  - { title: 需要提防, text: '小法术、范围部队和持续伤害可以低费清场，空中单位则完全不受骷髅军团攻击。' }
  - { title: 搭配思路, text: '与哥布林飞桶、吹箭哥布林等法术诱饵搭配，先逼出范围法术，再利用十五单位完成防守或反击。' }
