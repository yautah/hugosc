overview: [骷髅召唤会在九秒内于目标区域边缘持续生成骷髅兵，是依靠数量与随机站位消耗皇家塔的五费进攻法术。]
usage_tips: [先用坦克或残血单位吸引皇家塔，再覆盖塔区施放。, 等对手毒药或范围单位离手后进攻可提高骷髅存活时间。, 生成需要时间，配合减速或区域法术持续压制防守。]
matchups:
  - { title: 适合应对, text: '适合惩罚缺少持续范围伤害的卡组，并绕过常规建筑拉扯。' }
  - { title: 需要提防, text: '毒药、女武神、飞龙宝宝等持续范围手段能稳定清理骷髅。' }
  - { title: 搭配思路, text: '与骑士、飞龙宝宝、冰冻或毒药组成稳定的坦克加墓园推进。' }
