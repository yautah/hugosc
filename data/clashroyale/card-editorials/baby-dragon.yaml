overview:
  - 飞龙宝宝是一张四费空中范围单位，能够攻击空中和地面目标，并以一点五格溅射半径处理聚集部队。中等生命值让它不容易被小法术清除，适合稳定跟随坦克推进。
  - 它的单体每秒伤害不高，面对高生命值目标时需要较长时间。三点五格射程也意味着容易进入防空单位攻击范围，主要价值来自持续范围清场而不是单独突破。
usage_tips:
  - 放在高生命值前排后方，让前排吸引单体防守，飞龙宝宝负责清理围攻人海和后续支援。
  - 防守时利用空中移动避开地面近战，并调整角度让溅射同时命中多个目标；不要把攻击浪费在孤立的高生命值单位上。
  - 与飓风法术配合可以把敌军聚集到同一落点，提高每次火球的范围收益，并为皇家塔争取更安全的清场位置。
  - 面对远程防空时需要其他单位先吸引火力，飞龙宝宝本身射程有限，直接接近会损失大部分持续输出价值。
matchups:
  - { title: 适合应对, text: '适合处理空地人海、分裂单位和缺少高单体防空的推进，稳定范围伤害可以持续保护己方前排。' }
  - { title: 需要提防, text: '高伤远程防空、地狱飞龙和建筑拉扯会限制输出，孤立坦克也会暴露其单体伤害偏低的问题。' }
  - { title: 搭配思路, text: '与戈仑石人、熔岩猎犬、巨人和飓风法术搭配，用前排吸收伤害，再由飞龙宝宝清理聚集防守。' }
