overview:
  - 地狱飞龙是四费空中单体单位，每 0.4 秒造成一次伤害。持续锁定同一目标时火焰会从第一档升至第二档，再进入高额第三档，能够快速熔化高生命前排和皇家塔。
  - 眩晕、冰冻、电击和目标切换都会让伤害回到第一档。射程只有 3.5 格，也容易被远程防空、建筑或小单位牵引，因此需要保护其锁定过程。
usage_tips:
  - 防守高生命前排时让其他单位先吸引支援火力，保证地狱飞龙持续锁定主目标，不要让低费单位频繁插入改变目标。
  - 进攻时预留电击法术或箭雨处理蝙蝠、亡灵等空中人海，并用前排承受远程防空伤害。
  - 观察对手重置牌轮转，电击法术或闪电法师交出后再部署，完整升档比提前下牌更有威胁。
  - 对手用地狱飞龙时可通过眩晕、冰冻、击退出射程或小单位引导来重置，不必只依赖高伤法术硬解。
matchups:
  - { title: 适合应对, text: '适合处理戈仑石人、皮卡超人、超级骑士等高生命单位，持续锁定后第三档伤害极高。' }
  - { title: 需要提防, text: '闪电法师、电击法术、雷电飞龙和蝙蝠能够重置或打断锁定，远程防空也可在射程外输出。' }
  - { title: 搭配思路, text: '与矿工、巨人或熔岩猎犬搭配，用前排吸收火力，再以小法术保护递增输出。' }
