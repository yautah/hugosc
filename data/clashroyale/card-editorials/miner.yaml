overview:
  - 掘地矿工是三费近战单位，最大的特点是可以部署在竞技场任意位置。钻地期间不会被攻击，抵达目标位置后破土作战，适合直接接近皇家塔、后排输出或场地另一侧的建筑。
  - 矿工对普通单位造成完整伤害，但对皇家塔仅造成普通伤害的 20%。单次塔伤有限，真正价值在于持续换位消耗、吸引皇家塔火力，以及迫使对手预判落点。
usage_tips:
  - 进攻皇家塔时轮换不同落点，不要连续使用同一位置；对手若提前放置单位抓矿工，下一轮可改变方向或转而切后排。
  - 矿工可以为蝙蝠、亡灵、攻城炸弹人和哥布林飞桶吸引皇家塔，但应注意范围法术可能同时处理矿工身边的支援单位。
  - 对手后排在皇家塔旁部署时，可用矿工直接切入；判断其防守单位会落在哪里后，再配合毒药法术或小法术扩大交换收益。
  - 防守矿工时尽量用单位包围落点并迫使其重新锁定；飓风法术可将常见落点的矿工拉向国王塔，但应先熟悉无法激活的安全位置。
matchups:
  - { title: 适合应对, text: '适合处理公主、吹箭哥布林、烟花炮手等脆弱后排，也能越过前排直接攻击收集器和受损建筑。' }
  - { title: 需要提防, text: '低费人海、骑士等近战单位可以高效包围，飓风法术还可能借矿工激活国王塔。' }
  - { title: 搭配思路, text: '常与毒药法术、攻城炸弹人、蝙蝠、墓园或哥布林飞桶搭配，通过矿工承伤和持续换位制造消耗。' }
