overview: [飓风法术会把范围内敌军拉向中心并造成伤害，核心价值是改变站位、激活国王塔和把多个目标聚集给范围输出。]
usage_tips: [用野猪骑士等单位激活国王塔时要精确控制中心落点。, 把后排拉近前排可让飞斧屠夫等范围单位同时命中。, 持续时间很短，应与己方攻击节奏同步施放。]
matchups:
  - { title: 适合应对, text: '适合拉扯野猪骑士、气球兵和密集推进，并聚集目标。' }
  - { title: 需要提防, text: '伤害有限，无法独立处理高生命目标，部分特殊单位免疫拉扯。' }
  - { title: 搭配思路, text: '与飞斧屠夫、飞龙宝宝、法师和范围法术配合。' }
