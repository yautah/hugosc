overview:
  - 火箭是六费小范围高伤害法术，对区域内空中和地面目标造成一次重击，对皇家塔只保留部分伤害。它能直接处理多种高价值后排，也可作为对局末段的稳定斩杀手段。
  - 投射飞行时间较长、范围较小，预判失误的代价很高。中前期应优先争取同时命中单位与皇家塔，而不是无条件用六费换塔血。
usage_tips:
  - 对手在皇家塔旁叠放高费支援时再施放，争取一次法术同时获得单位交换和塔伤。
  - 处理移动目标要预判其路径，必要时等待目标停下攻击或被建筑拉住后再发射。
  - 进入法术斩杀前计算剩余塔血与循环费用，避免火箭离手后因六费空档被对手反推。
matchups:
  - { title: 适合应对, text: '适合处理电磁炮、飞斧屠夫、女巫等高价值单位，并在末段直接终结皇家塔。' }
  - { title: 需要提防, text: '作用范围小且飞行慢，分散站位和快速移动都可能让六费法术落空。' }
  - { title: 搭配思路, text: '常用于控制和速转体系，依靠稳固防守把对局推进到可计算的火箭斩杀阶段。' }
