overview: [滚木是两费地面直线法术，会伤害并击退沿途所有地面单位，滚动距离足以在特定落点附带皇家塔伤害。]
usage_tips: [让滚动路径覆盖多个单位而非只处理最近目标。, 利用击退打断冲锋并为皇家塔争取攻击时间。, 它不能命中空中单位，卡组需要另备防空法术。]
matchups:
  - { title: 适合应对, text: '适合处理公主、哥布林飞桶和地面人海，并打断冲锋。' }
  - { title: 需要提防, text: '完全无法影响空中单位，击退距离也已多次削弱。' }
  - { title: 搭配思路, text: '适合诱饵克制、速转与需要低费清路的进攻体系。' }
