overview:
  - 飞刀女爵会储存多把飞刀，并以很高频率连续投出；弹药充足时能迅速处理小型单位和短时间爆发进攻。飞刀耗尽后需要逐把恢复，持续输出能力会明显下降。
  - 她的强弱取决于进攻节奏。零散单位会不断消耗弹药，为后续主攻创造空窗；卡组需要在弹药不足时提供额外防守，避免高生命值单位直接压到塔下。
usage_tips:
  - 尽量用单位在塔前拦截持续进攻，让飞刀女爵保留部分弹药应对后续目标。
  - 对手用低费单位消耗飞刀时，不要无条件放任；必要时用低费解牌保护弹药节奏。
  - 弹药充足时可以减少应对小型突袭的投入，但面对长时间推进仍要准备主要防守。
matchups:
  - { title: 适合应对, text: 短时间进入射程的小型单位、突袭和需要快速连续攻击清理的目标。 }
  - { title: 需要提防, text: 持续施压、低费消耗后接高生命值前排，以及能在弹药恢复期间保持进攻的组合。 }
  - { title: 搭配思路, text: 与高效防守建筑和低费解牌配合，保护弹药储备并覆盖耗尽后的输出空窗。 }
