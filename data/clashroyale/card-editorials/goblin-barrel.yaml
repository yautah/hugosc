overview:
  - 哥布林飞桶是三费全场投放法术，在目标位置生成三只哥布林。它的伤害来自生成单位而非落地冲击，是经典诱饵体系的主要进攻核心。
  - 飞桶可以改变落点分散哥布林、规避预判法术或拉开与皇家塔的距离，但飞行时间给了对手观察和回应机会。
usage_tips:
  - 用公主、哥布林团伙等卡先逼出滚木或滚桶，再投飞桶争取对手缺少低费解牌的窗口。
  - 在塔前、塔后或角落变化落点，惩罚固定位置的预判法术；但偏离皇家塔也会延迟首次攻击。
  - 记录对手小法术循环，不要在同一解牌已经回手时机械连续进攻。
matchups:
  - { title: 适合应对, text: '适合消耗缺少即时范围法术的卡组，并迫使对手长期保留特定解牌。' }
  - { title: 需要提防, text: '滚木、野蛮人滚桶、万箭齐发和正确落点的电击都能高效处理生成单位。' }
  - { title: 搭配思路, text: '与公主、哥布林团伙和骷髅军团组成诱饵，让多张卡共同争夺对手的小法术。' }
