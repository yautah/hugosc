overview:
  - 皮卡超人是一张七费重型近战卡，生命值和单次伤害都很高，能够快速处理巨人、超级骑士和其他地面高生命值单位。她移动和攻击较慢，单独进攻时容易被低费单位反复拉扯。
  - 她最稳定的用法是先承担防守核心，利用高伤害减少对手大型推进，再围绕存活的皮卡超人补充后排和法术形成反击。直接从后场投入七费会暂时削弱双路防守能力。
usage_tips:
  - 面对大型地面推进时尽量让皮卡超人直接接触主要坦克，同时用其他单位处理后排，避免她被低价值单位持续吸引。
  - 防守后根据剩余生命值决定是否补充反击；生命值很低时保留圣水通常比强行堆叠支援更有价值。
  - 进攻时准备小法术或范围单位处理骷髅军团、哥布林团伙等人海，并用远程单位覆盖空中威胁。
  - 不要在另一条路线缺少回应时轻易从国王塔后部署，七费窗口足以让对手用快速单位造成明显伤害。
matchups:
  - { title: 适合应对, text: '适合处理巨人、超级骑士、皇家巨人和电磁巨炮等地面高价值目标，高单次伤害可以迅速压缩对手推进的前排。' }
  - { title: 需要提防, text: '骷髅军团、觉醒骷髅和低费拉扯单位能拖延她的攻击；空中单位、远程输出和防御建筑也可以在安全位置持续消耗。' }
  - { title: 搭配思路, text: '与电击法术、万箭齐发等人海解牌搭配，并配置法师、飞龙宝宝或雷电法师等空地支援，形成以防守反击为核心的推进。' }
