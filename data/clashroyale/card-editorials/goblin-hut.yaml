overview:
  - 哥布林小屋是一张四费支援建筑，敌军进入射程后会持续派出哥布林投矛手。它兼具拉扯建筑、远程消耗和分批补充场面的作用，适合在防守中逐渐积累单位优势。
  - 小屋需要敌军靠近才能高频生成，放置过远会浪费持续时间，放置过前又容易被快速拆除。生成单位生命值较低，范围伤害和法术可以有效压缩它的收益。
usage_tips:
  - 放在能够拉扯主力又能尽快触发生成的位置，让小屋本体和皇家塔共同承担防守。
  - 利用分批出现的投矛手支援两路，但不要把它们与其他低生命值后排集中在同一法术范围内。
  - 面对远程拆建筑单位时提前准备拉扯或法术，避免小屋在产生足够单位前被无伤处理。
matchups:
  - { title: 适合应对, text: 持续接近的地面推进和需要多轮远程补刀的场面，生成单位也能逐步转入反击。 }
  - { title: 需要提防, text: 高伤法术、范围伤害、远程拆建筑和不进入触发范围的消耗打法。 }
  - { title: 搭配思路, text: 与前排、范围伤害和分路卡配合，让生成单位持续补充后排并扩大两路压力。 }
