  - { title: 适合应对, text: '适合惩罚缺少小法术、建筑和低费地面防守的卡组，也能作为廉价分路威胁迫使对手提前留费。' }
  - { title: 需要提防, text: '法术可以主动打开草丛并配合皇家塔处理哥布林，中央建筑与范围单位也能稳定限制生成后的输出。' }
  - { title: 搭配思路, text: '与哥布林飞桶等法术诱饵、桥头压力和小法术搭配，在对手解牌轮转不足时争取哥布林接塔。' }
