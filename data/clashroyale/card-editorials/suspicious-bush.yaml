overview:
  - 可疑草丛是一张两费建筑目标单位，移动期间不会被部队和皇家塔主动锁定。抵达建筑、被法术摧毁或触发目标后，草丛会消失并放出两名能够攻击地面单位的草丛哥布林。
  - 2026 年调整后，草丛会在距离建筑一点六格时触发，不再紧贴皇家塔放出哥布林。这个改动让生成位置更稳定，但也给防守方留下更明确的反应距离。
usage_tips:
  - 对手小法术不在手时可在桥头施压，迫使其使用部队等待哥布林出现，或消耗法术提前打开草丛。
  - 与另一侧的主要进攻同时部署，利用不可被锁定的移动阶段分散注意力；两费投入不宜搭配过多支援，以免被一次范围伤害化解。
  - 防守转反击时先观察对手建筑位置，草丛只会寻找建筑，中央建筑会改变路线并让哥布林远离皇家塔。
  - 当前触发距离更远，哥布林生成后仍需走到塔前；准备小法术清理拦截单位，或用前排为两名哥布林争取接近时间。
