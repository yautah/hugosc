overview:
  - 科学怪哥布林会同时部署远程博士和只攻击建筑的高生命怪物。博士攻击附带短暂眩晕，怪物负责向前承伤；支付两费可激活两者之间的闪电连接。
  - 闪电连接会持续伤害穿过连线的敌军，因此两名单位的相对站位比单体属性更重要。任一单位过早阵亡都会让技能失去主要价值。
usage_tips:
  - 让怪物在前方吸引防守，博士留在后方形成纵向连线，对手向两者之间下兵时再启动技能。
  - 不要在两名单位距离过近时急于使用技能，先让怪物推进可扩大连接覆盖的空间。
  - 博士生命值较低，应提防法术直接处理；失去博士后，怪物只剩下较慢的建筑推进能力。
matchups:
  - { title: 适合应对, text: '适合惩罚在博士与怪物之间密集部署的防守，并用怪物承担持续伤害。' }
  - { title: 需要提防, text: '高伤害法术可先处理博士，坦克克制单位也能迅速击杀怪物并切断连接。' }
  - { title: 搭配思路, text: '与能保护博士的支援、清除坦克克制单位的法术配合，围绕两单位站位组织推进。' }
