overview:
- 三个火枪手是一张九费高投入卡，部署三名精英火枪手。她们在远距离以六格射程攻击空中和地面目标，地面敌军贴近后会切换刺刀，造成明显更高的近战伤害。
- 三个单位可以在后场中线分成两路，制造双线输出和法术选择压力。九费几乎耗尽圣水，一旦被火球、毒药或火箭取得大范围价值，玩家很难立即补充防守。
usage_tips:
- 优先在国王塔后方中线部署，让两名与一名火枪手自然分路，避免对手用一张范围法术覆盖全部单位。
- 根据两路防守强度给单人路线补充更多前排，使两侧威胁接近，而不是把全部圣水继续投入已经更强的一路。
- 先用圣水收集器或其他中等生命值单位试探对手法术；确认关键法术离手后，再部署三火枪降低九费被直接交换的风险。
- 刺刀近战只攻击地面，不能替代远程防空；敌军贴近时还会改变目标选择，应留意空中威胁是否因此失去火力覆盖。
matchups:
- title: 适合应对
  text: 分路部署适合拉扯单一路线防守和雷电法术，近战刺刀还能惩罚贴身的中小型地面单位。
- title: 需要提防
  text: 火球配小法术、毒药、火箭和飓风聚拢都可能获得巨大圣水优势，快速反打也会利用部署后的圣水真空。
- title: 搭配思路
  text: 与皇家野猪、野蛮人攻城槌和圣水收集器组成分路与法术诱饵体系，让前排分别保护两侧火枪手推进。
