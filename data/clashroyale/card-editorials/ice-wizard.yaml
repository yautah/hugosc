overview:
  - 寒冰法师是三费范围控制单位，普通攻击会让敌军在 2.5 秒内降低 30% 的移动速度和攻击速度。部署时还会在三格范围内造成一次伤害并短暂减速空中和地面目标。
  - 他的伤害和每秒输出较低，主要价值是延长皇家塔、建筑和其他防守单位的输出时间。单独部署通常难以快速解决高生命目标，应与稳定伤害或拉扯手段配合。
usage_tips:
  - 把登场伤害留给蝙蝠、骷髅等低生命单位，或在对手推进集中时同时减速前排和后排，避免只命中单个无威胁目标。
  - 与飓风法术配合可把敌军聚集到范围攻击内，并激活国王塔；减速会让被拉扯的单位更久停留在防守区域。
  - 防守高伤单位时让骑士、建筑等先承伤，寒冰法师在后方持续减速，不要把他单独放在容易被切入的位置。
  - 进攻方若遇到寒冰法师，可用火球等法术配合其他伤害处理，或从两路施压，避免整组推进被持续减速。
matchups:
  - { title: 适合应对, text: '适合控制气球兵、野猪骑士、人海和成组推进，登场伤害与持续减速能显著降低其输出效率。' }
  - { title: 需要提防, text: '火球及后续小伤害、矿工和高伤突进单位能快速处理；自身输出偏低，无法独自阻止高生命坦克。' }
  - { title: 搭配思路, text: '常与飓风法术、墓碑、炸弹塔和高伤后排搭配，通过聚怪、减速与皇家塔火力完成防守。' }
