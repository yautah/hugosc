overview:
  - 圣水收集器是一张六费经济建筑，会在存活期间逐步生产圣水，并在被摧毁时产出最后一点。它通过前期投资换取后续费用优势，适合需要在双倍圣水阶段组织高费推进的卡组。
  - 收集器不会出现在起手，投入六费后也没有直接防守能力。高伤法术、矿工和快速换路进攻都能降低回报，部署前必须确认当前局面允许进行经济投资。
usage_tips:
  - 在对手缺少立即进攻能力或关键法术不在手中时部署，避免投资后被另一侧快速惩罚。
  - 根据对手法术调整位置，必要时让法术只能命中收集器而无法同时覆盖皇家塔或其他单位。
  - 计算剩余比赛时间，过晚部署可能无法完成足够的生产周期，难以收回圣水成本。
matchups:
  - { title: 适合应对, text: 节奏较慢、缺少直接拆建筑手段的卡组，长期生产可以逐渐建立费用优势。 }
  - { title: 需要提防, text: 地震、火箭、矿工和快速桥头施压都会减少收益或利用六费投资窗口进攻。 }
  - { title: 搭配思路, text: 适合高费推进和三枪等依赖费用积累的体系，用额外圣水支撑多单位进攻。 }
