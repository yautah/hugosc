overview:
  - 骑士是一张三费地面近战单位，费用低、生命值扎实，常用于承担小坦、拉扯和防守反击任务。他不依赖复杂机制，优势在于稳定可靠，可以用较低费用挡住不少中小型地面进攻。
  - 骑士的输出并不爆炸，也不能攻击空中单位。使用时要把他当作前排和节奏卡，而不是单独解决所有威胁的万能解；面对高爆发单位、空军或成群小单位时，通常需要配合法术或后排输出一起处理。
usage_tips:
  - 防守单体地面单位时，可以把骑士下在中场偏内侧，利用两座皇家塔共同输出，同时把敌方单位拉离防御塔。
  - 进攻时让骑士走在弓箭手、火枪手、飞镖哥布林等远程单位前面，吸收伤害并为后排争取输出时间。
  - 面对矿工、刺客、幻影刺客等切后排单位时，骑士可以作为低费保护牌，及时挡住威胁并保持反打节奏。
  - 不要把骑士随意桥头单下当作主要进攻手段。除非对手费用不足，否则他通常只能造成有限消耗，更适合从防守转入反击。
matchups:
  - title: 适合应对
    text: 适合处理单体或少量地面近战单位，也能用于拉扯王子、迷你皮卡、野猪骑士等需要被拖住节奏的进攻单位。
  - title: 需要提防
    text: 空中单位、骷髅军团等人海单位，以及高伤害范围单位会限制骑士发挥；如果没有后排或法术配合，他很容易被快速解掉。
  - title: 搭配思路
    text: 适合搭配远程输出和防御建筑，常见用法是骑士负责站位和承伤，后排单位负责清理敌军；在速转、控制和自闭体系中都能作为稳定前排。
