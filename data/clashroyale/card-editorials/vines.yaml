overview:
  - 藤蔓法术会在范围内选择最多三个高生命目标，将其束缚并在两秒内造成两段伤害。它可命中空中和地面，适合暂时隔离关键单位并打乱推进节奏。
  - 自动选择高生命目标意味着落点内单位构成会影响锁定结果。释放前应确认真正想控制的目标不会被其他高生命单位抢占名额。
usage_tips:
  - 在关键防守单位准备攻击时施放，利用束缚窗口让己方推进越过或集中完成击杀。
  - 面对多目标时缩小覆盖选择，避免无关单位占用最多三个锁定名额。
  - 它是控制法术而非纯清场法术，通常要配合己方单位利用两秒窗口才能形成足够收益。
matchups:
  - { title: 适合应对, text: '适合暂时控制高生命前排、远程支援或关键防守者，为己方单位争取输出时间。' }
  - { title: 需要提防, text: '目标过多时可能锁错单位，单独伤害也不足以直接处理多数中高生命目标。' }
  - { title: 搭配思路, text: '与需要短暂突破窗口的气球兵、攻城槌和高爆发单位配合。' }
