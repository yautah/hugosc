overview:
  - 小王子是一张三费远程英雄，连续站定攻击会逐步缩短攻击间隔。支付三费发动皇室救援，会召唤专属护卫突进并击退沿途地面单位。
  - 本体需要站定才能维持最高攻速，移动或重新锁定会影响输出节奏；护卫既是前排，也能把贴身单位推开，为小王子重新创造射程。
usage_tips:
  - 沉底或在皇家塔后部署可提前叠加攻速，接战时让护卫或其他前排保护他持续站定输出。
  - 敌方近战贴近时启动皇室救援，用突进伤害与击退解围；不要只把技能当作额外召唤单位。
  - 本体费用低但技能费用高，发动前要评估六费总投入，避免另一条路线完全失去防守能力。
matchups:
  - { title: 适合应对, text: '叠满攻速后能持续处理高生命目标，护卫的突进与击退适合打断地面推进。' }
  - { title: 需要提防, text: '火球等法术可处理本体，击退和迫使移动的手段会打断其攻速积累。' }
  - { title: 搭配思路, text: '与控制、坦克和低费防守卡配合，为小王子争取站定时间，并让护卫转入反击。' }
