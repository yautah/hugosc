overview:
  - 绿林团伙一次部署一名绿林小哥和两名绿林小妹。小哥生命值较高、只攻击地面，负责在前排承受伤害；两名小妹射程更远并能对空，是这张五费卡的主要输出来源。
  - 三个单位按短暂间隔依次出现，且小哥先于小妹生成。整组完整存活时可以兼顾地面阻挡和远程输出，但小妹生命值较低，若被法术或范围伤害提前清除，剩下的小哥威胁会明显下降。
usage_tips:
  - 防守时让小哥正面接住地面推进，小妹留在后方输出；不要把卡牌下得太靠前，让对手轻易用范围伤害同时覆盖三个单位。
  - 对手的小法术已使用后再组织反击，两名小妹更容易在小哥身后持续输出，并迫使对手追加费用。
  - 可以利用分散部署和单位间距降低法术收益，但面对火球等较大范围伤害时仍要避免与其他后排单位堆叠。
  - 对付空中单位时要保护两名小妹，小哥不能对空；一旦小妹被清除，绿林团伙将失去全部防空能力。
matchups:
  - { title: 适合应对, text: '需要被地面单位阻挡、同时缺少范围伤害的推进。小哥承担伤害，两名小妹可以从后方持续输出。' }
  - { title: 需要提防, text: '滚木、万箭齐发、火球以及飞斧屠夫等范围手段。它们能够清除或压低小妹，让五费组合只剩输出较低的小哥。' }
  - { title: 搭配思路, text: '与哥布林飞桶、骷髅气球等诱饵卡搭配，迫使对手在清理绿林小妹和处理其他人海之间分配法术。' }
