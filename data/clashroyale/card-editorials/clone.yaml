overview: [克隆法术会复制范围内友军，克隆体保留攻击能力但只有 1 点生命值且不能被治疗，适合放大已有推进而不是单独创造场面。]
usage_tips: [等主要单位与衍生单位同时进入范围后再施放。, 避开对手范围法术在手的窗口，克隆体会被任意伤害清除。, 利用亡语和生成效果，即使克隆体迅速阵亡也能继续产生价值。]
matchups:
  - { title: 适合应对, text: '适合放大气球兵、熔岩猎犬、骷髅气球等带有亡语或生成效果的推进。' }
  - { title: 需要提防, text: '电击、万箭齐发和任何范围伤害都能迅速清除克隆体。' }
  - { title: 搭配思路, text: '与多单位推进、亡语单位和能提前逼出小法术的卡牌配合。' }
