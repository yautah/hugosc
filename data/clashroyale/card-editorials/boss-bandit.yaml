overview:
  - 刺客头领是六费英雄近战单位，像幻影刺客一样会向一定距离外的地面目标突袭。她的逃生手榴弹可使用两次，让自己向后位移并重新创造突袭距离。
  - 技能既能脱离包围，也能重置站位再次打出双倍突袭伤害；但位移方向和新目标需要提前判断，错误使用可能把她送到更差的位置。
usage_tips:
  - 在敌方近战贴身、突袭无法触发时使用手榴弹，拉开距离后观察是否能重新锁定高价值目标。
  - 两次技能各自有短冷却，不必第一次有机会就连续用完；保留一次可在后续反击或躲避包围时提供选择。
  - 她费用较高，桥头单独部署容易被廉价人海拖住。先逼出低费防守或准备范围法术再推进。
matchups:
  - { title: 适合应对, text: '适合追击中等生命远程单位，并通过后撤重新发动突袭制造多段爆发。' }
  - { title: 需要提防, text: '低费人海、高生命单体单位和空中部队都能限制她，高费用也会放大失误代价。' }
  - { title: 搭配思路, text: '与范围法术和桥头施压组件配合，清除打断突袭的廉价单位并保护技能后的重新锁定。' }
