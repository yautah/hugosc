overview:
- 烈焰精灵是一张一费自爆型部队，会跳向目标并造成范围伤害，可以攻击空中和地面单位。它既能清理小型部队，也能用很低的费用辅助皇家塔处理更高费用的进攻，同时加快卡组循环。
- 烈焰精灵必须成功接近目标才能造成伤害，生命值又很低，提前受到攻击或被其他单位吸引都会让它失去价值。使用时需要判断跳跃距离、目标站位和皇家塔火力，避免只命中一个低价值单位，或让对手轻易激活国王塔。
usage_tips:
- 防守成群小型单位时稍晚部署，让敌人进入溅射范围后再跳跃，尽量用一次攻击命中更多目标。
- 桥头单独下出可以迫使对手回应或承受皇家塔伤害，但应先确认对手无法利用烈焰精灵轻易激活国王塔。
- 配合野猪骑士、矿工等进攻单位时，可以提前清理骷髅兵、哥布林等低费防守，为主要进攻单位保留更多输出时间。
- 作为一费循环牌使用前，要确认对手没有即将到来的小型空军或集群攻势，避免为了过牌失去关键范围伤害。
matchups:
- title: 适合应对
  text: 骷髅兵、哥布林、蝙蝠等低生命值集群，以及需要少量补充范围伤害才能解决的空中和地面部队。
- title: 需要提防
  text: 射程较远且能提前击杀它的单位、用于吸引跳跃的低价值目标，以及可以借其溅射范围激活国王塔的站位。
- title: 搭配思路
  text: 适合速转和低费进攻体系，可为野猪骑士、矿工、攻城锤等单位清理小型防守，也能与皇家塔共同完成低成本防守。
