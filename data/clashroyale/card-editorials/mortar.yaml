overview:
  - 迫击炮是一张四费超远射程建筑，可以越过河道攻击皇冠塔，也能在防守时用范围炮击处理成群地面单位。它存在近距离盲区，部署位置和目标选择直接决定能否稳定开火。
  - 进攻时迫击炮需要其他单位清理贴身防守，防守时则可以利用盲区与超远射程从安全位置支援。较慢的攻击频率意味着每一发都很重要，被重置目标或快速贴近会显著降低收益。
usage_tips:
  - 进攻迫击炮应靠近河道部署，并预留低费单位处理进入盲区的敌军，争取至少完成一次锁塔攻击。
  - 防守大型推进时可把迫击炮放在己方纵深，用远射程提供范围伤害，同时避免直接承受前排攻击。
  - 观察对手用于拉扯迫击炮的低费单位循环，先清理诱饵或等待费用差，再组织下一轮进攻。
matchups:
  - title: 适合应对
    text: 移动缓慢的地面推进、成群地面单位，以及缺少稳定远程拆建筑手段的卡组。
  - title: 需要提防
    text: 能快速进入盲区的单位、地震法术、远程高伤部队和持续用低费单位改变锁定的防守。
  - title: 搭配思路
    text: 与矿工、滚木、火球和低费循环单位配合，清理贴身防守并持续给对手施加两路压力。
