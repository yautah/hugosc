overview:
- 熔岩猎犬是一张七费空中坦克，只会锁定建筑。它本体生命值很高但伤害较低，主要作用是吸收皇家塔和防空单位的火力，为气球兵、飞行器等空中输出创造接近目标的时间。
- 熔岩猎犬被击败后会生成六只熔岩幼犬。幼犬可以攻击空中和地面，合计输出明显高于本体，因此死亡位置会直接影响整轮进攻：在皇家塔附近分裂能够继续施压，过早被击败则容易让幼犬被范围伤害集中清理。
usage_tips:
- 通常从国王塔后方部署，利用较慢移动速度恢复圣水，再根据对手的防空和另一路压力补充支援单位。
- 不要一次性把所有空中单位堆在猎犬身后，应根据对手的火球、万箭齐发和范围防空分批投入，减少一次法术处理整组单位的风险。
- 让猎犬先吸引皇家塔和防空单位，再下气球兵或高输出支援；支援下得过早，可能越过猎犬成为主要目标。
- 猎犬即将分裂时可以用矿工吸引皇家塔或清理远程防守，让六只幼犬获得更长输出时间。
matchups:
- title: 适合应对
  text: 缺少稳定防空、主要依赖地面单位或单体输出较低的卡组。高生命值本体可以拖住火力，分裂后的幼犬继续迫使对手回应。
- title: 需要提防
  text: 地狱之塔、地狱飞龙等递增伤害，飞斧屠夫等范围防空，以及猎犬落地后立即发起的另一路快速进攻。七费投入会暂时压缩防守空间。
- title: 搭配思路
  text: 常与气球兵、飞行器、重甲亡灵等空中输出搭配，并准备矿工或法术处理防空单位；卡组还需要低费地面防守应对对手换路施压。
