overview:
  - 野蛮人小屋是一张六费生成建筑，会分批派出野蛮人，并在被摧毁后留下最后一名单位。它适合用建筑拉扯地面推进，同时积累近战单位组织反击。
  - 费用较高且生成节奏慢，部署后短时间内会留下圣水劣势。范围伤害和高伤法术可以同时削弱小屋与生成单位，因此需要把它作为长期防守投资而不是即时解牌。
usage_tips:
  - 在圣水充足且对手难以立刻惩罚时部署，避免六费投入后另一侧无法防守。
  - 利用小屋位置拉扯以建筑为目标的单位，让生成的野蛮人从侧面包围并转入反击。
  - 与其他后排保持距离，减少毒药法术或火球同时覆盖小屋和支援单位的机会。
matchups:
  - { title: 适合应对, text: 需要建筑拉扯的地面推进，以及缺少稳定范围伤害、难以处理持续生成单位的卡组。 }
  - { title: 需要提防, text: 高伤法术、范围输出、快速换路进攻和能够在投资期间制造圣水压力的循环卡组。 }
  - { title: 搭配思路, text: 与远程对空和范围伤害配合，让小屋与野蛮人承担地面防线，再用剩余单位组织反击。 }
