overview:
  - 暗夜女巫是一张四费地面近战单位，每 5 秒生成两只蝙蝠。她本体只能攻击地面，生成的蝙蝠则能攻击空中和地面，使一张卡同时提供近战输出与持续防空。
  - 她不再在阵亡时生成蝙蝠，价值主要来自存活期间的多轮召唤。把她放在高生命前排后方，比单独在桥头投入更容易积累单位数量。
usage_tips:
  - 沉底部署可以利用行进时间生成第一批蝙蝠，并为后续前排与法术留出恢复圣水的时间；桥头裸下通常来不及形成数量优势。
  - 让戈仑石人、巨人或其他前排先吸收范围伤害，暗夜女巫留在后方持续生成蝙蝠并处理靠近的地面防守。
  - 面对范围法术时分散后排，不要让暗夜女巫与其他高价值支援同时进入毒药或火球的处理范围。
  - 防守她时优先处理本体可以停止后续生成，但已经出现的蝙蝠仍需防空手段；范围单位应尽量同时覆盖本体和蝙蝠。
matchups:
  - { title: 适合应对, text: '适合在前排保护下持续处理单体地面单位，蝙蝠还能迫使缺少防空的卡组追加额外回应。' }
  - { title: 需要提防, text: '飞斧屠夫、飞龙宝宝、女武神和毒药法术可以同时清理本体与生成单位，雷电法术也能连同其他后排一起处理。' }
  - { title: 搭配思路, text: '与戈仑石人、雷电巨人和克隆法术等推进组件配合，用前排保护持续生成，并准备法术清除范围防守。' }
