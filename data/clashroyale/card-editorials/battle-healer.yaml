overview:
- 战斗天使是一张四费近战支援单位，登场时会为附近友军提供一轮治疗，每次攻击又会触发范围治疗。她能在多单位持续交战中反复恢复生命值，让原本会被逐步消耗的推进保持战斗力。
- 她已经不再拥有脱战自我恢复，单体伤害也不突出。面对爆发伤害、空中单位或无法接近目标的拉扯时，攻击治疗难以启动，四费支援可能在产生足够治疗前被解决。
usage_tips:
- 尽量在已有受伤友军时部署，让登场治疗立即产生价值，而不是单独把她当作普通近战单位使用。
- 让高生命值前排吸引目标，战斗天使在侧后方攻击较安全的地面单位，可以持续触发范围治疗并延长整波推进。
- 面对高伤害法术时分散后排，避免战斗天使与主要输出同时被清除；治疗无法挽回瞬间击败的单位。
- 她只能攻击地面，卡组仍需准备防空；遇到纯空中压力时不要为了治疗效果延误真正的防空部署。
matchups:
- title: 适合应对
  text: 适合持续伤害、低爆发地面防守和多单位混战，攻击次数越多，范围治疗累积价值越高。
- title: 需要提防
  text: 空中部队、爆发法术和高伤害单体单位会让她难以持续攻击；击退与拉扯也会中断治疗节奏。
- title: 搭配思路
  text: 与圣水戈仑、雷电飞龙和暗夜女巫等多单位推进搭配，通过前排承伤与范围治疗维持整组部队。
