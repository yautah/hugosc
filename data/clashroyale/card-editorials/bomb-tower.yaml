overview:
  - 炸弹塔是一张四费地面范围伤害建筑，能够稳定清理成群地面单位，并在被摧毁后留下延时爆炸。它兼具拉扯、范围输出和死亡伤害，适合应对密集推进。
  - 炸弹塔无法攻击空中单位，攻击频率也不算快。面对单个高生命值目标时需要皇家塔或其他高伤单位补充输出，死亡炸弹还需要预判目标是否会停留在范围内。
usage_tips:
  - 放在场地中央拉扯地面推进，让每次范围攻击尽量同时命中前排和支援单位。
  - 利用死亡炸弹处理仍在建筑附近的单位，必要时用拉扯或控制把敌军留在爆炸范围。
  - 面对空地混合推进时，炸弹塔只负责地面部分，应提前准备稳定对空手段。
matchups:
  - { title: 适合应对, text: 皇家野猪、野蛮人和其他密集地面推进，范围攻击与死亡伤害都容易获得价值。 }
  - { title: 需要提防, text: 空中单位、远程高伤、地震法术以及生命值极高且能快速拆建筑的单体单位。 }
  - { title: 搭配思路, text: 与对空后排、减速和拉扯配合，让地面单位在炸弹塔射程与死亡炸弹范围内停留更久。 }
