overview:
- 亡灵大军是一张五费空中卡，一次部署六个可同时攻击空中和地面的亡灵。六个单位的合计输出极高，能迅速解决缺少范围对空手段的坦克、气球兵或其他单体目标。
- 这张卡最大的风险是五费投入会被箭雨、火球或范围对空单位高效清理。使用亡灵大军前要记录对手法术循环，并利用其他空中人海或诱饵牌先消耗范围解牌。
usage_tips:
- 面对只能攻击地面的坦克时从侧后方部署，让六个亡灵尽快集中输出。
- 箭雨或火球离开对手手牌后再转入反击，避免五费单位群被一张法术直接清理。
- 利用较大的部署间距包围范围单位，不要把六个亡灵全部放在同一侧的攻击扇区内。
- 圣水不明时避免桥头盲下，一旦被低费法术处理，另一路会立即失去防守资源。
matchups:
- { title: 适合应对, text: '巨人、皮卡超人、气球兵和其他缺少范围对空的单体目标，六单位可以迅速削减生命值。' }
- { title: 需要提防, text: '箭雨、火球和觉醒电击法术，以及法师、烟花炮手、飞斧屠夫等范围对空单位。' }
- { title: 搭配思路, text: '与熔岩猎犬、矿工或其他空中压力搭配，也可与蝙蝠等人海共同消耗对手的范围解牌。' }
