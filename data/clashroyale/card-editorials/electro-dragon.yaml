overview:
  - 雷电飞龙是一张五费空中支援单位，每次攻击会从首个目标向四格内另外两个目标弹射，最多命中三个单位，并对每个目标造成 0.5 秒眩晕。它能重置地狱系递增伤害、冲锋和电磁炮蓄力。
  - 连锁雷电不是范围伤害，普通形态每次最多命中三个目标。面对单个单位时只有一段伤害，面对站位密集的推进或生成单位时才更容易发挥全部价值。
usage_tips:
  - 部署在前排后方，让首个雷电目标靠近防守后排或建筑，利用四格弹射距离同时处理多个目标并持续重置蓄力。
  - 配合飓风法术把分散单位拉近，可以稳定形成三段连锁；进攻时还可把目标拉到公主塔附近，让最后一跳命中塔。
  - 攻击间隔较长，不要让蝙蝠或亡灵近身后才单独部署；需要前排或低费单位替它争取完成第一次攻击的时间。
  - 对单个高生命目标的输出并不高，主要价值是控制和多目标伤害，应与真正的坦克杀手或推进核心搭配。
matchups:
  - { title: 适合应对, text: '适合处理女巫、暗夜女巫和多个密集单位，也能持续重置地狱之塔、电磁炮、冲锋及其他蓄力机制。' }
  - { title: 需要提防, text: '单个高生命单位不会提供连锁目标，火球等法术可显著削弱本体，分散部署也会让弹射难以形成。' }
  - { title: 搭配思路, text: '与戈仑石人、皮卡超人等前排及飓风法术搭配，让前排承伤，飓风聚集目标，雷电飞龙负责控制与连锁输出。' }
