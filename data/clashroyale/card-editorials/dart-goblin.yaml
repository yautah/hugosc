overview:
- 吹箭哥布林是一张三费高速远程单位，攻击距离达到六点五格，并以零点八秒间隔连续攻击空中和地面目标。较长射程让他能在河道另一侧或皇家塔后方安全输出。
- 他的生命值很低，滚木、万箭齐发等法术可以稳定处理。极快移动还可能让他过早走出保护范围，若桥头偷袭被预判，三费很难换到有效输出。
usage_tips:
- 对手小法术离手时可在桥头快速部署，利用射程立即锁定皇家塔或远处单位，迫使对手补交其他防守。
- 防守时放在皇家塔侧后方，避免与其他低生命值单位重叠，让对手难以用一张范围法术获得多重收益。
- 利用长射程隔河攻击建筑和近战单位，但要注意当前七格视野会让他主动追逐附近目标，必要时调整部署路线。
- 将他作为法术诱饵的一部分，而不是唯一远程输出；被小法术清除后，卡组仍应有其他方式处理空中单位。
matchups:
- title: 适合应对
  text: 擅长远距离消耗慢速近战单位、低生命值人海和缺少小法术的防守，也能快速补充防空火力。
- title: 需要提防
  text: 滚木、万箭齐发和毒药能稳定限制他，快速突进单位也会越过射程优势直接贴身。
- title: 搭配思路
  text: 与哥布林飞桶、骷髅军团等法术诱饵卡搭配，迫使对手在多张低生命值威胁之间分配小法术。
