overview:
  - 哥布林魔咒是两费持续法术，对范围内敌人造成伤害；受影响单位阵亡时会转化为己方哥布林。当前版本已移除额外承伤强化，价值集中在持续伤害与转化数量。
  - 它本身伤害有限，需要与其他单位或法术共同完成击杀。目标越多、越接近阵亡，转化收益越高。
usage_tips:
  - 先让敌方人海进入可被收割的生命区间，再施放魔咒并用范围攻击完成击杀。
  - 对单个高生命单位不要只为转化效果投入，除非能确认其会在持续时间内阵亡。
  - 生成的哥布林可立即参与反击，落点应兼顾后续进攻方向。
matchups:
  - { title: 适合应对, text: '适合配合范围伤害处理骷髅、哥布林和其他低生命多单位。' }
  - { title: 需要提防, text: '单独伤害低，对高生命或快速离开范围的目标难以触发转化。' }
  - { title: 搭配思路, text: '与飞斧屠夫、女武神、小法术等收割手段配合，把敌方数量转化为反击。' }
