overview:
  - 哥布林钻机是一张四费可部署在竞技场任意位置的建筑，钻出地面时造成伤害，并在存活期间及被摧毁后放出哥布林。它能直接出现在皇冠塔旁，也能用于防守拉扯。
  - 钻机的哥布林会分批出现，容易被预判范围伤害逐次清理。落点和出兵方向需要结合对手防守习惯变化，否则固定部署会让对手用同一套低费方式稳定处理。
usage_tips:
  - 改变钻机在皇冠塔周围的落点，使哥布林从不同方向出现，增加对手预判防守的难度。
  - 防守时可把钻机放在中央拉扯地面单位，利用钻出伤害和生成哥布林补充输出。
  - 观察对手范围伤害的循环，在其不在手中时发起钻机进攻，或用其他单位先骗出解牌。
matchups:
  - { title: 适合应对, text: 缺少稳定范围伤害和建筑解牌的卡组，持续生成的哥布林容易积累塔伤。 }
  - { title: 需要提防, text: 女武神、黑暗王子、炸弹兵和毒药法术等可持续覆盖落点的范围伤害。 }
  - { title: 搭配思路, text: 与攻城炸弹人、矿工和法术配合制造多点压力，迫使对手无法把范围伤害全部留给钻机。 }
