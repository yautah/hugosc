overview:
  - 巨石投手是五费地面范围单位，巨石会沿直线滚动并贯穿多个目标，对可击退的轻中型地面部队造成伤害和位移。实际投射距离长于锁定距离，站位合适时能同时命中前排、后排甚至皇家塔。
  - 高生命值让他适合防守后参与反打，但攻击间隔较长且无法对空。面对重型免疫击退单位或空军时，单独部署很难形成有效交换。
usage_tips:
  - 尽量让敌方单位与皇家塔或后排处于同一直线，利用滚石的贯穿距离扩大一次攻击的收益。
  - 防守冲锋和快速地面单位时提前部署，击退会重置多数冲锋与攻击动作；贴身下牌会减少可利用的滚动距离。
  - 配合龙卷风把分散单位拉成一线，既能提高范围伤害，也能让击退持续拖慢整轮推进。
  - 面对空军或重型前排时及时补充防空与单体输出，不要把巨石投手当作独立解决所有推进的核心伤害来源。
matchups:
  - { title: 适合应对, text: '适合处理野猪骑士、攻城炸弹人、野蛮人和成排地面支援，贯穿击退能不断打断其推进节奏。' }
  - { title: 需要提防, text: '空中单位完全不会受到攻击；皮卡超人、超级骑士和其他重型单位不易被击退，也能凭高伤贴身解决他。' }
  - { title: 搭配思路, text: '与龙卷风、寒冰法师和建筑搭配，集中敌军并反复延缓移动，为后排和皇家塔争取输出时间。' }
