overview:
  - 皇家速递是三费仅能部署在己方半场的延时法术，落地造成范围伤害并生成一名皇家卫兵。它兼具清场与留下防守单位的能力，但需要提前预判。
  - 空投延迟意味着它不适合临时补救已经贴塔的快速目标；准确落点则能同时命中后排、吸收伤害并形成反击。
usage_tips:
  - 根据空投时间提前覆盖对手推进路线，让箱子在单位进入区域时落地，而不是看到目标停下后才施放。
  - 尽量同时命中多个支援单位，生成的皇家卫兵再负责拖住幸存目标或加入反击。
  - 受限于己方半场，进攻阶段无法直接清理河对岸防守，应搭配可跨场施放的其他法术。
matchups:
  - { title: 适合应对, text: '适合处理桥头进入己方半场的地面人海与中低生命后排，并留下带护盾卫兵。' }
  - { title: 需要提防, text: '空投延迟容易被快速单位躲开，也不能部署到敌方半场主动清除防守。' }
  - { title: 搭配思路, text: '适合防守反击和控制体系，与建筑或拉扯单位配合把敌军固定在落点。' }
