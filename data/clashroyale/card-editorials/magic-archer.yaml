overview:
  - 神箭游侠是四费远程单位，锁定射程为七格，但箭矢会继续飞行到十一格并穿透路径上的所有空中和地面目标。正确站位可以同时攻击防守单位和其后的皇家塔。
  - 他的生命值和单次伤害有限，价值高度依赖连线角度与持续输出。贴近部署或与其他后排重叠，容易被高伤法术一次处理；站位过偏则可能浪费穿透能力。
usage_tips:
  - 观察目标与皇家塔的连线，在河道附近横向微调部署位置，让箭矢穿过前排、建筑或防守单位后继续命中塔。
  - 与飓风法术配合可把多个目标拉到同一直线，既提高范围输出，也可能同时消耗皇家塔；不要只按普通范围单位的站位使用。
  - 防守时利用七格锁定射程在多数近中程单位之外输出，并用低费前排阻止敌军直接接近。
  - 对手使用神箭游侠时，把防守单位放在皇家塔连线之外；必要时用矿工、火球或高伤近战快速处理，避免反复被穿透消耗。
matchups:
  - { title: 适合应对, text: '穿透箭适合处理墓园、人海和前后排重叠的推进，也能隔着建筑持续输出并寻找皇家塔连线。' }
  - { title: 需要提防, text: '火球、毒药法术、矿工和高伤近战能快速处理；被冰人等单位拉到另一条路线时也会失去关键角度。' }
  - { title: 搭配思路, text: '与飓风法术、皇家野猪、攻城槌和低费前排搭配，通过聚怪、保护和桥头角度制造穿透收益。' }
