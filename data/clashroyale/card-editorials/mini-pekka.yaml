overview:
  - 迷你皮卡是一张四费单体近战部队，攻击速度不快，但每次命中的伤害很高。它通常用于处理巨人、皇家巨人和野猪骑士等地面目标，并把防守后剩余的生命值转化为反击压力。
  - 它只能攻击地面且没有范围伤害，面对低费杂兵和拉扯时容易浪费攻击。部署位置应优先保证它尽快接触高价值目标，而不是让它在桥头单独追逐骷髅兵或哥布林。
usage_tips:
  - 尽量在己方半场完成防守，利用皇家塔共同输出；迷你皮卡存活后再补前排或法术组织反击。
  - 面对坦克加后排的推进时，根据距离选择直接切后排或先处理坦克，避免在两者之间反复转移目标。
  - 进攻前确认对手是否保留骷髅军团、哥布林团伙等杂兵，并准备电击法术、滚木或范围支援清理。
  - 可以放在野猪骑士等快速单位的路径上完成拦截，部署过远则可能因较短攻击距离漏掉第一次攻击。
matchups:
  - { title: 适合应对, text: '巨人、皇家巨人、野猪骑士和其他高生命值地面单体。高额单次伤害可以快速压缩其推进时间。' }
  - { title: 需要提防, text: '骷髅军团、守卫、蝙蝠和其他低费杂兵，以及中置单位的连续拉扯。它攻击较慢且无法对空。' }
  - { title: 搭配思路, text: '与电击法术、滚木和范围部队搭配清理杂兵；冰人或其他低费前排也能吸收伤害，帮助它接近皇家塔。' }
