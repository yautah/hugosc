overview:
  - 电击法术是两费即时小法术，对小范围内空中和地面目标造成伤害并眩晕 0.5 秒。眩晕会打断攻击、冲锋和递增伤害，并让地狱之塔、地狱飞龙重新开始叠加。
  - 它范围较小、伤害低于部分同费法术，优势是落地快与重置能力。一次准确的打断往往比纯伤害更重要。
usage_tips:
  - 等地狱类单位伤害升高后再电击可最大化重置收益，也可在王子冲锋或电磁炮即将攻击时争取关键时间。
  - 对人海要注意伤害阈值，不要默认所有同费小单位都能被直接消灭。
  - 进攻时把电击留给最后一次防守交互，0.5 秒眩晕可能帮助主力多完成一次攻击。
matchups:
  - { title: 适合应对, text: '适合重置地狱之塔、地狱飞龙和电磁炮，并清理骷髅兵、蝙蝠等低生命单位。' }
  - { title: 需要提防, text: '作用范围与伤害有限，面对分散人海或较高生命单位时无法独立完成处理。' }
  - { title: 搭配思路, text: '与野猪骑士、皇家巨人和气球兵等需要突破建筑或争取攻击窗口的核心配合。' }
