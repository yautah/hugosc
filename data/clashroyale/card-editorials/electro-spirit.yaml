overview:
- 雷电精灵是一张一费地面单位，跳向目标后会在附近单位之间连锁传导，最多命中九个空中或地面目标。每次命中都会造成伤害和 0.5 秒眩晕，因此它既能快速过牌，也能重置地狱塔、地狱龙和电磁炮等单位的蓄力状态。
- 连锁路径依赖目标之间的站位，而雷电精灵自身会在起跳后消失。它适合清理骷髅兵、蝙蝠等低生命值人海，或为己方输出争取短暂时间；但若对手将关键单位分散部署，连锁就可能无法覆盖所有目标。
usage_tips:
- 面对成群单位时等它们靠近后再部署，让连锁传导覆盖更多目标，避免第一次跳跃只命中前排单位。
- 对付地狱龙、地狱塔和电磁炮时，将眩晕留给蓄力或开火的关键时刻，比单纯用来过牌更有价值。
- 进攻时可以让雷电精灵跟在主力单位后方，利用连锁伤害清理小型防守单位，并打断对手的第一轮输出。
- 不要在对手可以轻松激活国王塔的位置随意放出；连锁传导到国王塔后，后续整场进攻都会面临额外火力。
matchups:
- title: 适合应对
  text: 骷髅兵、蝙蝠和哥布林等站位接近的低生命值单位，以及地狱系单位、电磁炮和需要打断攻击的目标。
- title: 需要提防
  text: 分散站位会切断连锁，高生命值单位也不会被一次跳跃解决。若连锁命中国王塔，还可能为对手提前激活防守火力。
- title: 搭配思路
  text: 适合快速循环和需要低费控制的卡组，可与野猪骑士、皇家巨人或矿工搭配，帮主力单位穿过人海和蓄力防守。
