overview:
  - 幻影刺客是一张三费地面突进单位。目标位于 3.5 至 6 格之间时，她会短暂蓄力后发动突袭，快速接近目标并造成双倍伤害；突袭过程中免疫伤害。
  - 她的基础生命值与正面持续输出并不突出，优势在于低费、快速移动和跨越距离制造的节奏。用低价值单位打断突袭，往往比让她连续冲向后排或皇家塔更有效。
usage_tips:
  - 桥头部署可以立刻威胁皇家塔，但应先观察对手是否握有骷髅兵、哥布林等低费单位；这些单位能在她蓄力后落地，迫使突袭撞上廉价目标。
  - 防守时将幻影刺客放在与目标保持适当距离的位置，争取用突袭伤害快速处理远程后排，随后凭借较快移速转入反击。
  - 突袭期间免疫伤害不等于全程无敌。她在蓄力前与落地后都能被攻击，法术和单位应瞄准这两个窗口。
  - 不要让她独自承担高生命前排。幻影刺客更适合追击脆弱后排、清理残血单位或在另一条路线制造低费压力。
matchups:
  - { title: 适合应对, text: '适合追击火枪手、法师和公主等中低生命远程单位，也能利用突袭穿过空档快速接近皇家塔。' }
  - { title: 需要提防, text: '骷髅兵、哥布林、卫队和其他低费多单位可以打断突袭并包围她，高生命近战单位也能正面压制其持续输出。' }
  - { title: 搭配思路, text: '常与攻城槌、皇家幽灵、皮卡超人和毒药法术组成桥头施压体系，用多路威胁消耗对手的低费防守。' }
