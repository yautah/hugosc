overview:
  - 电磁炮是六费地面范围单位，每次攻击需要约四秒充能，命中后造成极高范围伤害。它的威胁来自一次改变战局的爆发，而不是稳定持续输出。
  - 眩晕、电击和冰冻会打断当前充能，低费单位也能诱导射击。移动缓慢且无法对空，使它必须依赖前排、法术和防空支援才能稳定接近目标。
usage_tips:
  - 在后场部署并用高生命前排保护，让电磁炮在接近桥头前完成充能；贴近敌军下牌通常来不及开火。
  - 先用其他单位或法术逼出电击、闪电法师等重置手段，再组织电磁炮推进，避免第一炮被低成本打断。
  - 防守时让爆炸范围同时覆盖前排和后排，必要时用龙卷风或牵引把目标聚拢到一炮范围内。
  - 对手用小单位骗炮时不要盲目追加费用，保留范围法术清路，并接受电磁炮有时只承担逼迫出牌的作用。
matchups:
  - { title: 适合应对, text: '适合处理成排地面推进和高生命前排，一次完整充能可同时重创目标及其附近支援。' }
  - { title: 需要提防, text: '闪电法师、电击法术、雷电法术和低费诱导单位会反复重置或浪费炮击，空军也不会被锁定。' }
  - { title: 搭配思路, text: '与哥布林巨人、巨人和狂暴法术搭配，前排吸收伤害，小法术清理诱导与人海。' }
