overview:
  - 哥布林巨人是一张六费建筑目标前排，背包中的两名哥布林投矛手会在移动过程中攻击空中和地面目标。本体阵亡后，两名投矛手落地继续作战，因此这张卡能一边推进，一边处理部分轻型防守单位。
  - 与普通巨人相比，他生命值较低但移动更快，也能通过背包输出削弱人海和防空。对手仍可用中置建筑改变路线，并用高单体伤害快速击败本体，再分别处理落地投矛手。
usage_tips:
  - 让哥布林巨人走在核心后排前方，利用背包投矛手补刀蝙蝠、亡灵和低生命远程单位，减少法术必须覆盖的目标数量。
  - 先判断对手建筑位置，必要时准备地震或雷电处理建筑和高伤害防守单位，避免六费前排长时间被拉离公主塔。
  - 中等移速适合惩罚对手沉底高费单位，但不要在己方没有防守圣水时盲目换路，完整推进通常仍需要后排和法术投入。
  - 防守时可让本体吸收空中单位伤害，背包投矛手持续反击；本体阵亡后的两个单位也能成为下一轮反击起点。
matchups:
  - { title: 适合应对, text: '背包投矛手能处理部分轻型空地单位，对墓园、熔岩幼犬和低生命人海有一定辅助防守价值。' }
  - { title: 需要提防, text: '皮卡超人、威猛矿工和地狱系单位能快速削减本体，拉扯建筑则会延长其接塔路线。' }
  - { title: 搭配思路, text: '常与电磁炮、王子、黑暗王子和狂暴法术组成推进，利用本体承伤及投矛手补刀，为高爆发后排创造输出空间。' }
