overview:
  - 骷髅守卫是一张三费三单位地面卡牌，每名守卫都拥有独立护盾。护盾能够完整吸收一次伤害，即使面对高额单次攻击，护盾被打破后本体仍会存活并继续战斗。
  - 三名守卫拥有一点六格的近战长距离，可以隔着前排互相补充输出。它们本体生命值很低，护盾一旦被范围伤害统一打破，后续小法术或溅射攻击就能快速清场。
usage_tips:
  - 部署时让三名守卫包围单体地面单位，利用独立护盾分别承受攻击，减少高伤单位一次处理多个目标的机会。
  - 面对法术时避免与其他低生命值部队重叠；即使护盾能挡住第一段伤害，连续范围伤害仍会清理失去护盾的本体。
  - 防守冲锋或高伤单位时稍微提前部署，让守卫展开并从不同方向接触目标，避免全部被同一条直线攻击覆盖。
  - 护盾未被打破的守卫适合转入反击，可在其前方补充肉盾，让三单位长距离近战持续输出。
matchups:
  - { title: 适合应对, text: '适合包围高伤单体、冲锋和攻击间隔较长的地面单位，独立护盾能显著浪费对手的单次伤害。' }
  - { title: 需要提防, text: '万箭齐发、毒药和持续范围伤害会先破盾再清理本体，空中单位也能在守卫无法反击时稳定输出。' }
  - { title: 搭配思路, text: '与法术诱饵、肉盾和防空单位搭配，让守卫承担地面单体防守，并把剩余护盾转化为反击价值。' }
