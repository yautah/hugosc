overview:
- 皇家巨人是一张六费地面进攻核心，只会锁定建筑，并从五格射程外开炮。他不需要完全贴近防御塔才能输出，因此可在桥头快速建立威胁，也能走在防守存活单位前方组织反击。
- 射程优势不意味着可以忽略站位。防御建筑能够将他拉离皇家塔，高单体输出和地狱系单位也会迅速削减生命值；使用时需要根据对手的建筑和主要解牌保留法术、渔夫或控制支援。
usage_tips:
- 先用其他单位完成防守，再把皇家巨人放在存活后排前方，让对手同时处理前排和支援。
- 记住对手防御建筑的循环，建筑不在手时再桥头施压，或保留地震法术等手段快速处理。
- 面对地狱塔和地狱龙时，使用雷电精灵、电击法术或雷电法术重置蓄力，为皇家巨人争取额外开炮时间。
- 不要在落后圣水时单独桥头部署；六费被对手低费建筑拉扯后，容易让另一路暴露在反打中。
matchups:
- title: 适合应对
  text: 缺少防御建筑、单体输出有限的阵容，以及在防守后已经留下多个支援单位的反击机会。
- title: 需要提防
  text: 地狱塔、地狱龙、皮卡超人和迷你皮卡等高单体输出，以及能稳定将他拉离防御塔的低费建筑。
- title: 搭配思路
  text: 渔夫可以拉走防守单位，猎人和凤凰可在防守后转入支援，地震、雷电或小法术则根据对手解牌处理建筑、人海或蓄力单位。
