overview:
- 狂战士是一张两费地面近战卡，攻击间隔只有 0.6 秒，能以很高频率持续处理单体目标。她的单次伤害不高，但两费成本、较扎实的生命值和快速起手，使其适合补足防守伤害并跟随前排反击。
- 她只能攻击地面且没有范围伤害，因此害怕空中单位、人海包围和能在射程外持续输出的远程单位。使用时要让狂战士专注于她擅长的单体目标，再由法术或其他单位清理人海和对空威胁。
usage_tips:
- 面对单体地面单位时尽量贴身部署，利用 0.2 秒首次攻击快速建立输出。
- 让防御塔或前排先吸引目标，狂战士从侧面输出，避免她独自承受高伤害。
- 防守后若仍保留较多生命值，可在前方补充坦克或进攻核心，把高频输出转入反击。
- 不要单独使用她处理骷髅军团等人海，先用范围手段清理才能避免被低费包围。
