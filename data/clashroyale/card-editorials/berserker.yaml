- { title: 需要提防, text: '空中单位、骷髅军团等人海，以及能在近身前造成持续伤害的远程单位。' }
- { title: 搭配思路, text: '与能吸引火力的前排、范围法术和对空单位搭配，由狂战士专注快速削减单体目标。' }
