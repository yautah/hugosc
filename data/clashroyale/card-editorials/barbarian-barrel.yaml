overview:
  - 野蛮人滚桶是两费地面小法术，木桶沿直线滚动造成伤害，终点生成一名野蛮人。它兼具清理低生命单位与留下地面防守者的能力，但不能命中空中目标。
  - 滚动距离较短，落点决定野蛮人出现位置。用滚桶处理桥头单位时，生成单位还能继续承伤或转入反击。
usage_tips:
  - 对公主、哥布林飞桶等目标要校准滚动路径，让伤害覆盖目标且野蛮人出现在有利位置。
  - 面对远程后排可让滚桶先削血，再由生成野蛮人贴身完成处理。
  - 无法处理空中人海，卡组仍需保留其他防空或空地通用法术。
matchups:
  - { title: 适合应对, text: '适合处理公主、哥布林、骷髅兵等地面低生命单位并留下反击单位。' }
  - { title: 需要提防, text: '只能命中地面且距离有限，对分散目标和空中单位无能为力。' }
  - { title: 搭配思路, text: '适合墓园、控制和防守反击体系，用低费交换后保留野蛮人站场。' }
