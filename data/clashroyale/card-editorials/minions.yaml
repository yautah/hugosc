overview:
- 亡灵是一张三费空中部队，一次部署三个可以攻击空中和地面的单位。三只亡灵合计输出可观，能够绕过只攻击地面的部队，在皇家塔协助下处理坦克、近战单位和部分空中进攻，并把存活单位转化为反击压力。
- 这张卡的弱点是三个单位生命值都不高，而且部署位置较集中。万箭齐发等范围法术可以直接取得费用优势，范围防空单位也能同时压低整组亡灵的输出；使用时应先判断对手的小法术和稳定对空是否在手，避免把三费投入变成一次没有伤害的交换。
usage_tips:
- 防守只攻击地面的单位时，将亡灵部署在目标侧后方，让三个单位尽快开始输出，同时避开目标可能产生的死亡伤害或范围效果。
- 对手的万箭齐发或主要范围法术刚刚使用后，可以让存活亡灵跟随前排反击；没有前排时直接过河，通常容易被皇家塔和低费对空处理。
- 面对气球兵等空中威胁时应提前部署，利用移动速度和射程开始输出，不要等目标接近皇家塔后才下牌。
- 需要分散范围伤害时，可让其他支援单位与亡灵保持距离，避免对手用一次法术同时清除全部防空力量。
matchups:
- title: 适合应对
  text: 只攻击地面的近战单位、缺少范围伤害的高生命值部队，以及需要持续单体输出处理的空中进攻。皇家塔吸引目标时，三只亡灵可以较安全地完成防守。
- title: 需要提防
  text: 万箭齐发等范围法术、飞斧屠夫等范围防空，以及能够在亡灵接近前持续输出的远程单位。对手保留小法术时，桥头集中投入风险很高。
- title: 搭配思路
  text: 适合与矿工、骑士等低费前排组成反击，也能作为气球兵和熔岩猎犬体系中的补充空中输出；卡组最好另有一层防空，避免亡灵被法术处理后失去回应。
