overview:
  - 电击车小队是一张四费三单位远程卡牌，每辆电击车都能攻击空中和地面目标，并在命中时造成零点五秒眩晕。三辆车交错攻击时可以持续打断蓄力、冲锋和高频攻击。
  - 单辆电击车的伤害与生命值都不高，集中部署容易被范围法术处理，分路后又会降低同一路的控制密度。它更适合作为防守控制和反击支援，而不是单独承担主要输出。
usage_tips:
  - 对抗地狱塔、地狱飞龙或冲锋单位时让三辆车尽量错开攻击节奏，连续眩晕可以重置蓄力并延缓关键命中。
  - 根据对手法术选择部署方式：有火球等范围法术时利用三单位展开减少同时受击，缺少范围手段时可集中控制大型目标。
  - 从国王塔后分路部署能够同时补充两侧防守，但要提前判断哪一路需要两辆车，避免关键路只留下一个低输出单位。
  - 不要让它们直接走在前排；用肉盾或近战单位吸收伤害，电击车才能在后方持续提供眩晕和防空。
matchups:
  - { title: 适合应对, text: '擅长限制蓄力单位、慢速高费推进和单体攻击者，连续眩晕也能为皇家塔争取额外输出时间。' }
  - { title: 需要提防, text: '火球、毒药和范围部队能同时消耗多辆电击车，快速贴身单位也会压缩其远程控制空间。' }
  - { title: 搭配思路, text: '与皇家野猪、皇家卫队和高生命值前排搭配，利用分路能力组织防守反击，并由其他单位承担主要伤害。' }
