overview:
  - 地狱之塔是一张五费递增伤害建筑，持续锁定同一目标时伤害会逐级提高，特别适合处理巨人、戈仑石人等高生命值单位。它可以攻击空中和地面目标，也是重要的重型单位解法。
  - 递增伤害需要持续锁定，电击、冰冻、击退、隐身和小单位干扰都会重置或转移目标。部署位置要避免被支援单位轻易接触，同时确保主目标进入射程。
usage_tips:
  - 等高生命值目标接近后再部署，减少持续时间损耗，并为伤害升档预留足够锁定时间。
  - 提前清理主目标前方的小单位，避免地狱之塔把锁定和高档伤害浪费在诱饵上。
  - 预判对手的重置法术，在法术交出后用其他单位拖延，帮助地狱之塔重新建立锁定。
matchups:
  - { title: 适合应对, text: 巨人、戈仑石人、熔岩猎犬和其他依赖高生命值前排的推进。 }
  - { title: 需要提防, text: 电击类重置、冰冻、雷电法术、密集小单位和能够远程拆塔的支援单位。 }
  - { title: 搭配思路, text: 与范围伤害、低费拉扯和法术配合，先清理诱饵，再让地狱之塔持续锁定核心目标。 }
