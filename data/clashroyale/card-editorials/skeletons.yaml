overview:
- 骷髅兵是一张一费地面卡牌，一次部署三个生命值很低的近战单位。它的主要价值不是正面属性，而是以最低费用完成过牌、改变目标路线、包围单体单位，并为皇家塔或后排争取额外攻击时间。
- 三个骷髅兵几乎会被任何范围伤害一次清除，但对手若为它们额外使用法术，往往会付出更高费用。使用这张卡需要依靠时机和站位：部署准确可以用一费化解明显更高费用的单体威胁，部署过早或过近则只会让三个单位同时消失。
usage_tips:
- 拉扯近战单位时放在己方中场偏内侧，让目标转向并进入两座皇家塔共同覆盖的区域，延长其行进时间。
- 防守王子、迷你皮卡等单体单位时，等目标接近后从周围部署，使三个骷髅兵形成包围，避免被一次攻击连续清理。
- 使用骷髅兵过牌前先确认对手没有即将到来的单体高伤害进攻；一费虽然容易循环，但失去关键拉扯工具可能让后续防守付出更多费用。
- 配合防御建筑时，可以用骷髅兵修正敌方单位路线，让目标在建筑和皇家塔火力中停留更久。
matchups:
- title: 适合应对
  text: 攻击速度较慢的单体地面单位、需要改变路线的近战进攻，以及只差少量拖延时间就能由皇家塔解决的目标。
- title: 需要提防
  text: 范围伤害、登场伤害和小法术都能立即清除三个单位；面对能够穿透或连续攻击的单位时，也很难获得稳定拖延时间。
- title: 搭配思路
  text: 适合所有重视循环速度和精细防守的卡组，常与防御建筑、冰人和远程输出搭配，用一费调整站位并把主要伤害交给其他单位完成。
