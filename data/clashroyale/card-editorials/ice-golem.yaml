overview:
- 戈仑冰人是一张两费建筑目标肉盾，输出很低，但生命值和缓慢移动适合承担伤害、拉扯近战部队并调整双方节奏。死亡时的冰爆会伤害空中和地面单位，并在两格范围内降低其移动与攻击速度。
- 他不会主动攻击部队，单独进攻几乎没有威胁。使用价值主要来自路线控制、承伤和死亡位置；若冰爆远离敌军触发，两费卡提供的控制收益会明显下降。
usage_tips:
- 在己方中路偏另一侧部署可以拉扯近战单位跨越较长路线，为两座皇家塔和后排输出争取时间。
- 进攻时放在低生命值输出单位前方承担伤害，让冰爆在敌方防守群中触发，减缓其反击和清场速度。
- 对付骷髅、蝙蝠等低生命值单位时，计算冰爆范围和时机，死亡伤害可以帮助后排减少一次攻击需求。
- 不要为了让他攻击建筑而过度支援；两费投入的核心是交换节奏，通常应把后续圣水留给真正的进攻单位。
matchups:
- title: 适合应对
  text: 适合拉扯皮卡超人、超级骑士等地面单位，也能用死亡冰爆削弱和减速靠近的小型空地部队。
- title: 需要提防
  text: 远程单位不会轻易被拉扯，建筑目标属性也让他无法主动保护后排；高伤害单位可快速改变预期死亡位置。
- title: 搭配思路
  text: 常与野猪骑士、十字连弩和低费循环卡搭配，作为廉价前排、拉扯工具或反击时的减速触发器。
