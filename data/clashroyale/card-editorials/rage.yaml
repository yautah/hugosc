overview:
  - 狂暴法术是两费范围强化法术，落地造成少量伤害，并在 4.5 秒内提高友军移动与攻击速度。单位离开范围后强化还会短暂保留一秒。
  - 它能放大已有场面，却不能凭空创造防守或前排。单位数量与剩余生命越充足，攻速强化的总收益越高。
usage_tips:
  - 等多名友军进入同一区域再施放，尽量让整个推进而非单个单位获得强化。
  - 落地伤害可顺带清理低生命单位，但不要为了少量伤害浪费主要强化窗口。
  - 面对控制法术时稍晚施放，避免友军在狂暴持续期间被完全冻结或拉离范围。
matchups:
  - { title: 适合应对, text: '适合放大多单位推进、召唤物和高伤害慢攻单位的输出窗口。' }
  - { title: 需要提防, text: '缺少场面时价值很低，击退、冻结和范围清场都能消耗强化时间。' }
  - { title: 搭配思路, text: '与精锐野蛮人、气球兵、戈仑石人及多单位推进体系配合。' }
