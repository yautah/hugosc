overview:
  - 符文巨人是一张四费建筑目标前排，普通攻击较低，但会在 8.5 格内强化最多两名距离最近的友军。被强化单位每第三次攻击会追加符文伤害，强化对象选择和攻击频率通常比符文巨人本体输出更重要。
  - 强化不会选择建筑，多弹丸攻击也只获得一次完整加成，不会让每枚弹丸分别追加伤害。符文巨人阵亡后，现有强化还能保留五秒，给存活后排留下最后一轮输出窗口。
usage_tips:
  - 部署前控制附近单位数量，让强化优先落在攻击频率高、能稳定接触目标的友军身上，避免被低价值过牌单位占用名额。
  - 符文巨人移速中等且只攻击建筑，适合在前方承伤；后排应保持能进入 8.5 格强化范围、又不会与本体一起吃范围法术的距离。
  - 每第三次攻击触发意味着攻速和持续存活很重要，快速远程单位通常比慢速单次爆发单位更容易反复获得追加伤害。
  - 本体阵亡后不要立即放弃推进，五秒残留强化仍可能完成关键攻击；可用控制法术延长后排接触目标的时间。
matchups:
  - { title: 适合应对, text: '适合围绕高频攻击单位构建持续推进，让符文巨人承伤的同时提高后排对单位和防御建筑的处理速度。' }
  - { title: 需要提防, text: '建筑可以改变本体路线，范围法术能同时削弱强化对象；低费友军若抢到强化，也会显著降低整轮进攻收益。' }
  - { title: 搭配思路, text: '与弓箭手、烟花炮手等能持续输出的后排搭配，并用小法术清理干扰单位，让强化攻击稳定命中高价值目标。' }
