overview:
  - 骷髅墓碑是一张三费低费建筑，会分批生成骷髅兵，并在被摧毁时额外放出一组骷髅。它适合拉扯地面单位、打断单体攻击和用多个小单位拖延高伤目标。
  - 骷髅兵容易被范围伤害清理，墓碑本体也缺少直接攻击能力。面对范围输出或空中推进时，需要其他单位承担主要伤害。
usage_tips:
  - 把墓碑放在场地中部拉扯地面单位，让分批生成的骷髅兵从不同时间点接替承伤。
  - 利用被摧毁后的骷髅兵包围单体单位，但要避开对手即将释放的范围法术。
  - 面对攻击频率慢的高伤单位时，骷髅兵可以反复重置其攻击目标，显著延长防守时间。
matchups:
  - { title: 适合应对, text: 单体地面高伤、冲锋单位和以建筑为目标的推进，多个骷髅兵能持续拖延。 }
  - { title: 需要提防, text: 范围伤害、空中单位、毒药法术和能同时清理墓碑与生成单位的进攻。 }
  - { title: 搭配思路, text: 与远程对空、范围伤害和反击单位配合，墓碑负责低费拉扯与拖延。 }
