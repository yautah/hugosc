overview:
  - 哥布林牢笼是一张四费防守建筑，牢笼本体先负责拉扯和承伤，被摧毁后会放出哥布林硬汉继续近战。一次部署同时提供建筑与反击单位，是它区别于普通防守建筑的核心价值。
  - 哥布林硬汉单体输出较高，但缺少范围伤害且容易被拉扯。若牢笼放置过早，建筑持续时间会被白白消耗；若硬汉在不利位置出现，也可能无法形成有效反击。
usage_tips:
  - 把牢笼放在场地中央拉扯以建筑为目标的单位，让硬汉在防守结束后沿较安全的路线组织反击。
  - 面对高伤推进时可利用其他单位延长牢笼存活时间，使皇家塔在硬汉登场前尽量削弱敌军。
  - 不要把全部反击希望放在硬汉身上，面对人海或空中单位时应提前准备范围伤害和对空支援。
matchups:
  - title: 适合应对
    text: 野猪骑士、攻城锤、巨人等可被建筑拉扯的地面单位，以及需要防守后转入反击的局面。
  - title: 需要提防
    text: 空中推进、远程单位、地震法术和能够低费处理哥布林硬汉的人海单位。
  - title: 搭配思路
    text: 与远程对空、范围伤害和反击核心配合，让牢笼吸收第一轮伤害，再利用硬汉补充前排与单体输出。
