overview:
- 飞行器是一张四费远程空中单位，六格射程可以隔河攻击部分建筑和地面单位。它移动较快，防守后只要保留生命值，就能迅速转入反击并迫使对手补交防空手段。
- 飞行器生命值不高，容易被火球或稳定防空单位处理。高速移动也可能让它脱离己方前排保护，过早进入敌方射程后很难持续输出。
usage_tips:
- 利用六格射程把飞行器放在己方半场偏后位置，先让皇家塔或前排吸引目标，再进行安全输出。
- 防守存活后及时补上地面前排，可以保护飞行器继续推进，并迫使对手同时处理空中与地面单位。
- 隔河攻击建筑时注意对手的拉扯位置，不要为了少量消耗让飞行器单独飞入防空火力。
- 对手持有火球时尽量与其他中等生命值单位分开，避免一张法术同时命中飞行器和关键后排。
matchups:
- title: 适合应对
  text: 射程优势适合消耗缺少远程反制的地面单位，也能在防守后持续追击缓慢推进。
- title: 需要提防
  text: 火球、火箭和远程防空能稳定压制飞行器；移动过快时还可能脱离己方坦克，独自进入皇家塔射程。
- title: 搭配思路
  text: 与熔岩猎犬、皇家野猪和野蛮人攻城槌等多点施压体系搭配，可迫使对手在有限防空手段之间做选择。
