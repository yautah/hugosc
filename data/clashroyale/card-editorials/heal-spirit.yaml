overview:
  - 治疗精灵是一张一费自毁型范围单位，会跳向空中或地面目标并造成范围伤害，随后在落点形成半径二点五格的治疗区域。治疗在一秒内分为四次脉冲，能够覆盖附近的友方空中和地面部队。
  - 它的价值取决于命中位置与友军站位。治疗区域围绕敌方目标产生，若精灵被提前击败或被低费单位引离推进，既无法造成伤害，也不会留下治疗效果。
usage_tips:
  - 通常放在需要治疗的推进单位后方，让前排先接触敌军，精灵再跳入交战中心，使四次脉冲覆盖尽可能多的友军。
  - 不要在友军与敌军距离过远时提前部署；极快移动可能让精灵独自冲出队形，落点也会与需要治疗的部队错开。
  - 防守时可用部署位置把敌军引向己方单位附近，再让精灵命中，从一次费用中同时获得范围伤害和治疗收益。
  - 对手用骷髅、蝙蝠等低费单位侧拉时应及时调整节奏，必要时先处理诱饵，避免整次治疗被带离主战场。
matchups:
  - { title: 适合应对, text: '适合配合能在法术或持续伤害后存活的多单位推进，四次脉冲可以恢复多人生命并延长整体输出时间。' }
  - { title: 需要提防, text: '低费侧拉、滚木和野蛮人滚桶等手段能让它提前消失或偏离主力，治疗区域也无法恢复建筑。' }
  - { title: 搭配思路, text: '与皇家野猪、精锐野蛮人、圣水戈仑及其他多单位或高生命值推进搭配，让范围治疗同时覆盖多个目标。' }
