overview:
- 巨人是一张五费地面坦克，只会锁定建筑。与更昂贵的重型坦克相比，他部署灵活、生命值与费用的比例较高，适合在防守单位存活后迅速放到前排，把零散防守转化为反击。
- 巨人无法攻击部队，单独进攻很容易被高伤害单位、人海或建筑处理。他真正的威胁来自身后的输出与法术配合，因此使用时要根据对手的建筑、单体输出和范围解牌安排支援顺序。
usage_tips:
- 需要组织完整推进时可以从国王塔后方部署，利用巨人的缓慢移动恢复圣水；已有单位完成防守时，则可在它们前方直接放下巨人发起反击。
- 支援单位不要紧贴巨人部署，应留出间距，避免火球、雷电法术或范围部队同时覆盖坦克与后排。
- 面对防御建筑时先判断是否值得交法术或控制单位。巨人被拉到中场后继续堆兵，往往会让整轮进攻投入过高。
- 巨人过河前应保留一定圣水处理人海和高伤害单位；只依靠巨人的生命值硬推，通常无法稳定接近皇家塔。
matchups:
- title: 适合应对
  text: 适合在防守后承接存活的远程或范围单位，也能用高生命值吸引皇家塔，为墓园、气球兵等进攻组件提供时间。
- title: 需要提防
  text: 地狱之塔、威猛矿工等递增伤害，高伤害近战单位以及骷髅军团等人海都能快速消耗巨人；建筑还可以把他拉离目标路线。
- title: 搭配思路
  text: 与火枪手、雷电法师等远程单位组成传统推进，或搭配墓园、气球兵形成双重威胁；准备小法术和范围伤害处理人海会更稳定。
