overview:
  - 特斯拉电磁塔是一张四费对空对地防守建筑，未锁定目标时会缩入地下，避免被多数远程攻击直接消耗。它攻击频率稳定，适合在场地中央牵制并处理多种推进单位。
  - 地下状态并不等于完全安全，地震法术仍能造成伤害，持续时间也会正常流失。特斯拉电磁塔需要在目标接近时及时升起，因此部署时机和位置同样重要。
usage_tips:
  - 放在场地中央可以同时覆盖两路，并把以建筑为目标的单位拉入皇家塔交叉火力。
  - 面对空中推进时保留特斯拉电磁塔到关键单位进入覆盖范围再部署，避免持续时间提前耗尽。
  - 对手携带地震法术时，将其他高价值单位与特斯拉电磁塔分开放置，降低法术的综合收益。
matchups:
  - title: 适合应对
    text: 气球兵、野猪骑士及中等生命值的空地单位，尤其适合需要一张建筑同时承担对空与拉扯的场合。
  - title: 需要提防
    text: 地震法术、远程高伤单位、成群部队和能够快速迫使电磁塔升起后集火的组合。
  - title: 搭配思路
    text: 与低费拉扯单位、范围伤害和击退效果配合，保护电磁塔持续输出并延长敌军行进路线。
