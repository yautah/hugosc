overview:
- 哥布林投矛手是一张两费三单位远程卡牌，可以攻击空中和地面目标。费用低、移动速度快，使它既能承担过牌和拉扯，也能在皇家塔协助下补充对空输出；三个单位分开攻击时，还可以处理多个低生命值目标。
- 单个投矛手的生命值和伤害都有限，正面承担范围伤害时很容易整组离场。它更适合利用射程、数量和费用差完成辅助任务，而不是单独解决中高生命值进攻；部署过早也可能让快速移动的三个单位在主要进攻形成前先被消耗。
usage_tips:
- 防守近战单位时放在己方中场偏内侧，利用五格射程开始输出，并把目标拉向两座皇家塔能够覆盖的位置。
- 需要过牌时优先从后场分路部署，减少三个单位同时被范围伤害命中的机会，也能提前兼顾两条路线。
- 配合矿工、野猪骑士等低费进攻时，让主要单位先吸引皇家塔，再用投矛手补充输出；投矛手先过河会迅速失去数量优势。
- 面对蝙蝠、骷髅兵等小型单位时，要让三个投矛手尽量同时开始攻击，避免被逐个接近后用近战数量交换。
matchups:
- title: 适合应对
  text: 低生命值空军、小型地面单位和需要被远程拉扯的近战部队。与皇家塔配合时，它还能用两费补足对中等生命值目标的伤害。
- title: 需要提防
  text: 滚木、万箭齐发等低费范围伤害，以及能够一次命中多个单位的范围攻击。三个投矛手站位集中时，对手很容易获得正向费用交换。
- title: 搭配思路
  text: 适合低费循环、矿工消耗和诱饵体系，也能与骑士等迷你坦克组合，让前排承伤、投矛手从后方提供对空与远程输出。
