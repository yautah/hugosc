overview:
- 瓦基丽武神是一张四费地面近战单位，每次挥斧都会对自身周围造成范围伤害。她能清理包围在身边的人海，也有足够生命值承担部分前排职责，是防守地面推进时较稳定的通用选择。
- 她不能攻击空中，移动和攻击距离也不突出。面对分散站位的远程单位或高伤害单体部队时，瓦基丽武神很难只靠旋转攻击获得优势，部署位置和是否能同时覆盖多个目标尤其重要。
usage_tips:
- 对付骷髅军团、哥布林和其他地面人海时，尽量直接部署在目标中间，让首次攻击尽快覆盖全部单位。
- 防守带后排的推进时，可以把她放在支援单位附近而不是坦克正面，利用范围伤害先清后排，再配合皇家塔处理前排。
- 作为反击前排时不要让远程单位贴得过近，避免对手的范围伤害同时覆盖瓦基丽武神和后排。
- 她无法对空，卡组中仍需准备稳定防空；面对纯空中压力时，不要因为四费投入而挤压真正防空牌的圣水。
matchups:
- title: 适合应对
  text: 擅长处理骷髅军团、哥布林飞桶、野蛮人等靠数量输出的地面单位，也能在敌军聚集时同时消耗前排与后排。
- title: 需要提防
  text: 空中部队、远距离拉扯和高伤害单体单位会限制她的范围优势；被分散引导时，四费防守也可能难以取得交换收益。
- title: 搭配思路
  text: 与野猪骑士、墓园和哥布林钻机搭配时可负责清理地面防守；配合远程防空单位，则能组成覆盖空地的稳定防守核心。
