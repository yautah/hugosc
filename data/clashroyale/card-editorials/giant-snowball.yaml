overview:
  - 大雪球是两费范围法术，命中后会击退目标并在三秒内降低其移动和攻击速度。它可以攻击空中和地面，控制价值通常高于直接伤害。
  - 击退方向由爆炸中心决定，落点微调会影响目标被推离皇家塔、推向中央还是离开己方进攻单位。
usage_tips:
  - 防守时把爆炸中心放在目标外侧，可将单位推离皇家塔并延长行进距离；进攻时则可把防守者推离主力。
  - 对气球兵、亡灵等空中目标，击退与减速能为皇家塔争取额外攻击次数。
  - 不要只按伤害使用，预判目标移动后的落点与减速覆盖时间，才能发挥两费控制的完整价值。
matchups:
  - { title: 适合应对, text: '适合干扰气球兵、野猪骑士和集中人海，也能把防守单位推离关键位置。' }
  - { title: 需要提防, text: '伤害较低，对高生命单位只能延缓而不能直接解决，错误击退方向还可能帮助对手。' }
  - { title: 搭配思路, text: '与矿工、气球兵、野猪骑士等依赖站位的进攻核心配合，通过击退创造连接机会。' }
