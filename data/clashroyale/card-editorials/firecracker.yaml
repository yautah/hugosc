overview:
- 烟花炮手是一张三费远程单位，六格射程外发射炮弹，命中后分裂为五枚继续向后飞行的弹片。她可以借助前排目标命中后方单位甚至防御塔，以低费提供超远范围压力。
- 每次开火会让她向后移动一格，既能躲开近战单位，也可能在反复后坐中改变路线、激活对手国王塔或离开理想射角。她的攻击间隔较长、生命值较低，需要通过前排和站位保护。
usage_tips:
- 利用前排单位作为弹道起点，调整角度让五枚弹片穿过后排或防御塔。
- 将她放在皇家塔后方或侧面，让每次后坐延长生存时间，避免被近战单位直接贴身。
- 进攻时先确认弹片是否会意外命中国王塔，提前激活国王塔可能让后续整场进攻更难。
- 对手有箭雨或火球时避免与其他后排密集站位，不要让一张法术同时命中多个高价值目标。
matchups:
- { title: 适合应对, text: '人海、密集后排和前后站位成一线的进攻，五枚弹片可借前排同时伤害后方目标。' }
- { title: 需要提防, text: '箭雨、火球、矿工和能快速贴身的单位，以及利用她的长弹道提前激活国王塔的站位。' }
- { title: 搭配思路, text: '与野猪骑士、防御建筑和低费循环搭配，用前排吸引目标，让烟花炮手在后坐中反复提供范围输出。' }
