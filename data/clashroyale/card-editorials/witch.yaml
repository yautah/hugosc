overview:
  - 女巫是一张五费远程支援卡，可以攻击空中和地面并造成范围伤害。她每隔七秒召唤四只骷髅兵，本体输出并不突出，主要价值来自持续补充单位、分散单体攻击和保护推进。
  - 女巫需要时间积累骷髅兵，刚部署时容易被高伤害单位或法术直接处理。她更适合在己方半场参与防守后组织反击，而不是单独放在桥头承担即时解场。
usage_tips:
  - 通常从国王塔后方部署，让女巫在接战前完成至少一次召唤；面对快速进攻时应提前判断，避免五费投入来不及形成骷髅屏障。
  - 用前排吸收范围伤害，让骷髅兵包围单体单位，女巫则保持在安全距离持续输出；不要让她走到前排身前。
  - 对手保留火球、毒药或雷电法术时，应与其他高价值后排拉开距离，避免一次法术同时获得过多收益。
  - 防守结束后再补充坦克或法术，比一开始投入完整推进更稳妥；女巫能否存活进入反击通常决定这笔五费是否划算。
matchups:
  - { title: 适合应对, text: '适合牵制皮卡超人、王子等单体地面单位，也能持续补充防空和范围伤害，应对缺少即时法术的慢速推进。' }
  - { title: 需要提防, text: '女武神、飞斧屠夫等范围单位可以同时处理女巫和骷髅兵；雷电、火箭等高伤害法术也能绕过召唤单位直接击败本体。' }
  - { title: 搭配思路, text: '与巨人、戈仑石人等前排搭配最直接，也可配合飓风法术聚集目标，让本体范围伤害和骷髅包围获得更多价值。' }
