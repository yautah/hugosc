overview:
- 冰雪精灵是一张一费地面单位，跳向空中或地面目标后造成范围伤害，并冻结范围内单位 1.1 秒。它能用最低费用完成过牌、拉扯和打断，为皇家塔或己方输出单位争取额外攻击时间。
- 冰雪精灵的伤害不是主要价值，关键在于命中时机和范围。对手可以用低费单位在前方吸收跳跃，也可分散站位减少冻结目标；因此它更适合在交战已经形成后补充控制，而不是远距离单独进场。
usage_tips:
- 拉扯近战单位时将冰雪精灵放在中场偏内侧，让目标改变路线并在冻结期间接受两座皇家塔火力。
- 进攻时让前排单位先吸引目标，冰雪精灵再跳入密集防守，用范围冻结为主力单位创造输出窗口。
- 对付王子、蛮羊骑士、电磁炮和地狱系单位时，把冻结留到其冲锋或蓄力已经建立后，才能最大化打断价值。
- 过牌前先确认对手没有即将发起的关键进攻；一费循环虽然灵活，但失去冻结可能让下一次防守多付更高费用。
matchups:
- title: 适合应对
  text: 王子、黑暗王子、蛮羊骑士、电磁炮和地狱系单位，以及站位密集、可被一次范围冻结覆盖的进攻。
- title: 需要提防
  text: 对手可以用骷髅兵、烈焰精灵等低费单位吸收跳跃，也可通过分散部署使关键单位避开冻结范围。
- title: 搭配思路
  text: 适合野猪骑士、矿工和其他快速循环卡组，也可与防御建筑、远程输出搭配，用拉扯与冻结延长目标在己方火力中的停留时间。
