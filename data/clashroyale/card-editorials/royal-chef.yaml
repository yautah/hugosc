overview:
  - 皇家大厨会周期性为场上符合条件的友军提升等级，用较慢的塔楼攻击换取单位成长能力。强化落在高价值或能持续存活的部队上时，可以显著提高整轮推进收益。
  - 烹饪需要时间，皇家塔被摧毁后速度还会下降。随机或条件式强化不一定落在最需要的单位上，卡组也必须补足皇家大厨本身较弱的即时防守能力。
usage_tips:
  - 尽量让高价值单位在强化完成时仍存活于场上，避免增益落在即将被消灭的低费单位上。
  - 用建筑和高效防守弥补皇家大厨的塔楼输出，争取比赛时间让多轮烹饪产生累计价值。
  - 皇家塔被摧毁后烹饪变慢，应更谨慎规划后续推进，不要依赖短时间内连续强化。
matchups:
  - { title: 适合应对, text: 节奏较慢、允许单位长期存活和多轮推进的对局，等级强化能不断积累优势。 }
  - { title: 需要提防, text: 快速桥头爆发、持续小单位施压和能迅速摧毁皇家塔的卡组，会放大塔楼输出不足。 }
  - { title: 搭配思路, text: 与高生命值前排、英雄和可持续作战单位搭配，让等级提升覆盖更长的战斗时间。 }
