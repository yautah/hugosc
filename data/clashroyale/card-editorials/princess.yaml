overview:
  - 公主是三费超远程范围单位，九格射程允许她在河道己方一侧直接攻击皇家塔。她的单次伤害不高、攻击间隔较长，但能跨越较大区域清理空地人海并持续施压。
  - 公主生命值很低，容易被滚木、万箭齐发或直接切入的单位处理。她更适合利用距离和位置换取多次攻击，同时迫使对手交出法术，为其他诱饵牌创造窗口。
usage_tips:
  - 桥头公主可以立即消耗皇家塔并试探对手解牌；后场部署则能覆盖两路防守，具体位置应根据当前需要选择。
  - 多张公主同时在场时应拉开距离，避免对手用同一张法术全部处理；也不要让公主与其他低生命后排重叠。
  - 对付人海时预判其移动路线，让箭矢落点覆盖整组单位。面对快速突进单位时则需要前排阻挡，避免公主被直接接近。
  - 防守公主时优先使用能稳定击败她的等费或低费手段；若用单位处理桥头公主，应从靠近她的一侧部署，减少额外塔伤。
matchups:
  - { title: 适合应对, text: '超远射程和范围伤害适合处理骷髅军团、亡灵大军、哥布林团伙及后排聚集的推进。' }
  - { title: 需要提防, text: '滚木、万箭齐发、矿工和快速突进单位能够稳定处理，火球等范围法术还可能同时命中附近支援。' }
  - { title: 搭配思路, text: '常用于法术诱饵体系，与哥布林飞桶、哥布林团伙和骷髅军团共同消耗对手的范围解牌。' }
