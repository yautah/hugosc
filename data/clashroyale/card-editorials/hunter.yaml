overview:
  - 猎人是一张四费空地防守单位，每次发射十枚呈扇形散布的弹丸。贴近目标时多枚弹丸可以同时命中，造成极高爆发；距离越远，弹丸越分散，实际伤害也越低。
  - 他适合在己方半场贴近坦克或气球兵部署，但攻击间隔较长，位置不佳时很容易只命中少量弹丸。击退会把猎人推离目标，既降低单次伤害，也可能重置攻击准备。
usage_tips:
  - 防守高生命单位时尽量贴近部署，让十枚弹丸集中命中；面对范围伤害或冲锋单位时则要避免站位过近而被先手击败。
  - 对付气球兵要提前放置，确保第一轮完整弹丸及时命中；部署过晚可能来不及完成第二次攻击。
  - 与渔夫搭配可以把目标拉到猎人面前，稳定获得近距离满额伤害，是处理大型地面单位的经典组合。
  - 进攻时不要把猎人视为稳定远程后排，他在远距离对塔伤害有限，更适合保护前排并清理靠近的防守单位。
matchups:
  - { title: 适合应对, text: '贴脸爆发适合处理气球兵、熔岩猎犬和高生命地面前排，也能用分散弹丸清理靠近的小型单位。' }
  - { title: 需要提防, text: '远程单位可以在弹丸分散时消耗猎人，雪球、火球和滚木的击退会拉开距离并降低后续爆发。' }
  - { title: 搭配思路, text: '与渔夫、飓风法术或减速效果配合，把目标固定在近距离；再以低费单位保护猎人度过较长攻击间隔。' }
