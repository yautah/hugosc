overview:
  - 弓箭手是一张三费双单位远程卡牌，可以同时攻击空中和地面目标。两个单位同时输出时效率稳定，也可以从国王塔后方分路部署，用较低费用兼顾两侧防守。
  - 她们的优势来自射程、攻击频率和部署灵活性，而不是正面承伤。只要保持安全距离，弓箭手就能持续处理空军、小型单位和缺少范围攻击的近战部队；一旦被范围伤害或法术同时命中，两人同时离场也会让这张卡迅速失去价值。
usage_tips:
  - 从国王塔后方居中部署，可以将两个弓箭手分到不同路线，减少被同一个法术处理的风险，并提前照顾两路攻势。
  - 防守近战单位时尽量提前下牌，让弓箭手利用射程多完成几次攻击；必要时使用低费单位吸引目标，为她们争取输出时间。
  - 跟随巨人、戈仑石人等高生命值单位推进时，应与其他后排保持间距，避免对手用一个范围法术同时命中整组支援单位。
  - 防守气球兵或其他空中单位时，要留意对手的法术循环。弓箭手一旦被提前清除，通常还需要准备第二层对空手段。
matchups:
  - title: 适合应对
    text: 低生命值空军、缺少范围伤害的近战单位，以及需要同时照顾两路的分路进攻。配合皇家塔时，她们也能有效消耗中等生命值单位。
  - title: 需要提防
    text: 万箭齐发等直接伤害法术，以及能够同时命中两个单位的范围伤害部队。部署过近会让对手用一次出牌同时解决两名弓箭手。
  - title: 搭配思路
    text: 适合跟随坦克承担远程支援，也能辅助迫击炮、十字连弩等建筑持续清理防守单位；在皇家卫队、皇家野猪等分路体系中也容易发挥价值。
