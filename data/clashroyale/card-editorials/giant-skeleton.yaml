overview:
  - 骷髅巨人是一张六费高生命地面单位，普通攻击只命中单个地面目标，真正的威慑来自阵亡后三秒爆炸的范围炸弹。炸弹能击退并重创附近单位，因此对手必须同时考虑站位和撤离路线。
  - 他不像巨人那样只锁定建筑，容易被低费地面单位拉扯，但也能主动攻击防守单位。当前炸弹不再对皇冠塔造成双倍伤害，更适合防守清场和限制密集站位。
usage_tips:
  - 防守时把骷髅巨人放在推进路线中央，让高价值后排进入死亡炸弹范围；必要时用飓风法术把分散单位拉回爆炸区域。
  - 不要把他当作普通巨人直接沉底推进，对手可以用低费单位持续拉扯；先在己方半场完成防守，再利用剩余生命组织反击更稳妥。
  - 观察死亡位置比追求本体伤害更重要，靠近桥头或公主塔前阵亡往往能压缩对手部署空间，并迫使防守单位后撤。
  - 面对渔夫时避免让骷髅巨人被拉到己方国王塔附近；反过来使用渔夫，可以把敌方死亡炸弹拖离己方塔。
matchups:
  - { title: 适合应对, text: '适合瓦解多个地面单位组成的密集推进，死亡炸弹能清理中低生命支援，并为后续反击留下空间。' }
  - { title: 需要提防, text: '地狱之塔、威猛矿工等持续单体伤害可以高效处理本体，低费地面单位还能把他引离希望的爆炸位置。' }
  - { title: 搭配思路, text: '与飓风法术、克隆法术或快速后排搭配，围绕死亡炸弹控制站位；防守清场后再追加气球兵等威胁形成反击。' }
