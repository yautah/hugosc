overview:
  - 哥布林机甲是一张五费地面单位，本体近距离挥拳攻击地面目标，背部火箭发射器会自动打击 2.5 至 5 格内的空中或地面目标。两套攻击互不替代，使它在推进中能够同时处理前排和远处支援。
  - 机甲的远程火箭攻击频率较低，对皇家塔伤害也经过削减，主要价值是迫使对手分散部署并持续消耗后排，而不是作为单独的远程主攻手。
usage_tips:
  - 让机甲在己方半场接住地面单位，再用剩余生命进入反击，通常比桥头裸下更容易发挥近战与火箭的双重价值。
  - 推进时把主要目标留在机甲近处、把远程支援隔在火箭射程内，可以让两套攻击同时工作；目标全部贴身时火箭发射器反而难以锁定。
  - 火箭发射器能够攻击空中，但攻击间隔较长，不能把它当作唯一防空。面对蝙蝠或亡灵等多单位时仍需范围防空补位。
  - 对手使用高伤害单体单位贴身时，机甲本体会较快损失生命；提前准备控制、拉扯或小单位保护能延长火箭输出时间。
matchups:
  - { title: 适合应对, text: '适合在推进中牵制分散部署的远程后排，也能依靠较高生命值承受中等强度的地面伤害。' }
  - { title: 需要提防, text: '皮卡超人、地狱之塔等高单体伤害能迅速处理机甲，密集人海也会让它的单体拳击和低频火箭效率下降。' }
  - { title: 搭配思路, text: '与范围法术、重型前排和能保护它免受贴身围攻的支援单位配合，尽量创造两套武器同时输出的站位。' }
