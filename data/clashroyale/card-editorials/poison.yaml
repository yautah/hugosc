overview:
  - 毒药法术是四费持续范围法术，在八秒内多次伤害并降低敌军移动速度。它适合覆盖固定区域、压制中低生命支援和阻止对手持续向同一区域补兵。
  - 总伤害需要时间完成，对立即威胁不如火球；优势是范围持续存在，能同时处理后续进入的单位并配合推进封锁防守空间。
usage_tips:
  - 围绕墓园、矿工或重型推进覆盖皇家塔与防守区域，让对手补下的单位持续承受伤害。
  - 面对需要立刻打断的目标不要只依赖毒药，必要时搭配即时小法术或单位控制。
  - 多个毒药效果可以叠加，但连续投入八费前要确认目标价值和防守余量。
matchups:
  - { title: 适合应对, text: '适合处理女巫、火枪手、人海和墓园防守单位，并长期封锁固定区域。' }
  - { title: 需要提防, text: '伤害生效慢，快速单位可离开范围，高生命目标也能在持续期间继续输出。' }
  - { title: 搭配思路, text: '与墓园、矿工、戈仑石人等持续进攻配合，限制对手在塔旁部署支援。' }
