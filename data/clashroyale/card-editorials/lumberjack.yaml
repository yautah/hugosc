overview:
  - 狂暴樵夫是一张四费高速近战单位，拥有很快的攻击频率。阵亡时会释放造成伤害的狂暴法术，使范围内友方部队和建筑获得 30% 攻速与移速加成。
  - 他的威胁由本体输出和死亡后的推进加速共同构成。防守者即使快速将其击败，也可能让后续气球兵或其他核心单位立即进入狂暴状态。
usage_tips:
  - 与气球兵或高伤近战单位一同推进时，让狂暴樵夫走在稍前方承受伤害，阵亡后的狂暴区域才能覆盖真正的进攻核心。
  - 防守时可利用高速攻击处理野猪骑士和中型地面单位，随后让残血樵夫带着反击部队前进，迫使对手处理死亡狂暴。
  - 注意死亡位置。过早在己方半场阵亡会浪费狂暴效果，接近河道或皇家塔时阵亡通常能为后续部队创造更大收益。
  - 面对狂暴樵夫时可以把他拉离后续核心，或先控制气球兵等主要威胁，避免为了快速击败樵夫而主动给整轮推进加速。
matchups:
  - { title: 适合应对, text: '高速单体输出适合处理野猪骑士、攻城槌和多数中型地面单位，阵亡狂暴还能帮助防守单位转入反击。' }
  - { title: 需要提防, text: '骷髅军团、卫队等多单位能分摊攻击，远程控制和建筑也可让他在不理想的位置阵亡。' }
  - { title: 搭配思路, text: '经典搭配包括气球兵、冰冻法术、戈仑石人和野蛮人精锐，让死亡狂暴覆盖高爆发或高生命推进单位。' }
