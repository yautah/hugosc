overview:
  - 加农炮是一张三费地面防守建筑，核心价值是用较低费用改变敌方单位路线，并配合皇家塔持续输出。它不能攻击空中目标，但对野猪骑士、巨人和攻城单位等地面威胁有稳定的牵制能力。
  - 加农炮的持续时间和生命值有限，单独承担高强度推进时容易被快速拆除。部署位置需要兼顾拉扯距离与皇家塔覆盖，过早放置会浪费持续时间，过晚放置则可能来不及改变目标。
usage_tips:
  - 面对以建筑为目标的单位时放在场地中部，让敌军绕行并进入两座皇家塔的交叉火力。
  - 尽量等敌军接近后再部署，减少自然损耗，确保关键单位进入射程时加农炮仍有足够生命值。
  - 对手携带地震法术或高伤法术时，不要让加农炮与其他关键防守单位重叠，避免一次出牌同时失去多层防线。
matchups:
  - title: 适合应对
    text: 以建筑为目标的地面单位、单体近战推进和需要被拉到场地中央的威胁。
  - title: 需要提防
    text: 空中单位、远程单位、地震法术以及能够快速突破建筑的高爆发组合。
  - title: 搭配思路
    text: 与低费单位、击退和减速效果配合，延长敌军在中央区域停留的时间，让皇家塔完成主要输出。
