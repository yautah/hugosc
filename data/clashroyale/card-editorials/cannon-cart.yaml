overview:
  - 加农炮战车是五费远程地面单位，生命值降至 50% 时会失去移动能力并转为持续 15 秒的建筑。转换后保留攻击距离和输出，但生命值会随时间衰减，也开始能够牵引只攻击建筑的单位。
  - 两种形态共享一条生命值进程，因此它不像旧护盾机制那样获得完整第二条血量。价值来自移动形态参与反打，以及在合适位置损坏后继续输出或临时充当建筑。
usage_tips:
  - 放在前排后方输出，让移动形态安全过河；即使战车被打至半血，固定炮台仍能继续掩护推进。
  - 防守建筑目标单位时注意转换位置，只有损坏后的固定形态才能产生建筑牵引，不能把满血战车当作稳定防御建筑。
  - 利用 5.5 格射程从防线后方处理单体目标，面对人海时预留范围单位或法术，避免高攻速被低费单位包围浪费。
  - 对手用法术提前压到半血时，战车会原地固定并开始衰减；沉底部署要避免让对手同时命中皇家塔取得额外收益。
matchups:
  - { title: 适合应对, text: '适合在前排保护下持续处理地面单体，损坏后还能留下固定火力并临时牵引建筑目标单位。' }
  - { title: 需要提防, text: '人海、强力近战和高伤法术能快速让战车停下或直接清除，空中单位不会受到攻击。' }
  - { title: 搭配思路, text: '与巨人、戈仑石人或皮卡超人等前排搭配，并用范围法术清理围攻单位，延长两阶段总输出。' }
