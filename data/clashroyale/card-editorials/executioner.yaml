overview:
  - 飞斧屠夫是五费远程范围单位，斧头在飞出和返回时各造成一次伤害，并能贯穿沿途的地面与空中目标。完整命中需要目标在斧头往返期间留在路径附近，因此站位和控制效果比面板单次伤害更重要。
  - 他拥有较高生命值，适合承担后排范围输出并在防守后反打，但锁定距离短于斧头飞行距离。面对分散部署或高爆发近战时，双段伤害不一定能完整打出。
usage_tips:
  - 把飞斧屠夫放在推进路线侧后方，使斧头往返路径覆盖前排和后排，避免正贴坦克导致斧头只命中单一目标。
  - 与龙卷风配合把单位拉到同一直线上，既能保证去程命中，也能让回程再次穿过密集目标。
  - 防守熔岩猎犬、亡灵大军等空中集群时留意斧头回程时机，过早追加法术可能浪费原本足够的第二段伤害。
  - 面对皮卡超人、超级骑士等高爆发近战时需要前排或建筑保护，避免他在完成一次完整往返前被贴身击杀。
matchups:
  - { title: 适合应对, text: '适合处理熔岩猎犬体系、人海和前后排重叠的推进，双段贯穿可以同时覆盖空中与地面单位。' }
  - { title: 需要提防, text: '高伤近战、远距离单体输出和分散站位会降低回旋斧价值，和尚还可以反射飞斧造成反制。' }
  - { title: 搭配思路, text: '与龙卷风、冰人和防御建筑搭配，先固定或聚拢目标，再让斧头完成两次贯穿。' }
