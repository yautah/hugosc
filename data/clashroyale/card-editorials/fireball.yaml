overview:
  - 火球是四费中范围伤害法术，可攻击空中和地面并击退多数单位。它能稳定处理多种中等生命后排，也常用于同时命中单位、建筑和皇家塔。
  - 火球的关键是获取复数目标价值。单独砸塔通常不如命中高价值支援并附带塔伤，除非已进入明确的法术斩杀阶段。
usage_tips:
  - 等对手把远程单位部署在皇家塔附近再施放，争取同时获得单位交换与塔血收益。
  - 击退可以打断部分攻击或把单位推离防守位置，落点不应只考虑是否覆盖目标。
  - 记录同等级伤害阈值，判断哪些单位能被直接消灭、哪些还需要滚木或电击补伤。
matchups:
  - { title: 适合应对, text: '适合处理火枪手、飞行器、女巫婆婆等中等生命支援，并惩罚密集站位。' }
  - { title: 需要提防, text: '对高生命前排效率低，目标分散时四费法术容易只换到有限价值。' }
  - { title: 搭配思路, text: '与野猪骑士、皇家巨人和攻城槌等核心配合，清除建筑旁支援并争取额外连接。' }
