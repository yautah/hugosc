overview:
  - 地震法术是三费持续法术，在三秒内分三次伤害地面单位与皇家塔，并对普通建筑造成更高倍率伤害。范围内地面单位还会被大幅减速。
  - 它不能命中空中单位，核心用途是清除建筑并帮助进攻核心连接皇家塔；面对无建筑卡组时，直接伤害效率相对有限。
usage_tips:
  - 等对手建筑落下后覆盖建筑与皇家塔，尽量同时获得拆建筑、减速防守和塔伤三重价值。
  - 地震可以命中隐藏的特斯拉电磁塔，也能影响悬浮地面单位，但不会处理真正的空中部队。
  - 三段伤害不是瞬间完成，面对即将攻击的低生命目标应提前施放或搭配即时小法术。
matchups:
  - { title: 适合应对, text: '尤其克制圣水收集器、特斯拉电磁塔、加农炮和其他依赖建筑防守的体系。' }
  - { title: 需要提防, text: '无法伤害空中单位，对没有建筑的对局很难取得完整三费价值。' }
  - { title: 搭配思路, text: '与野猪骑士、皇家野猪和皇家巨人等易被建筑拉扯的进攻核心配合。' }
