overview:
  - 雷电巨人是一张七费重型前排，只攻击建筑。处于电击背包三格范围内的敌军每次攻击他时，都会受到反弹伤害并被眩晕 0.5 秒，因此高频近战和贴身人海往往会被自己的攻击节奏反制。
  - 电击背包只惩罚范围内的攻击者，远距离输出、建筑和递增伤害单位仍能稳定处理他。高费用也让沉底部署后的另一条路线较为脆弱，需要用低费防守或换路压力控制圣水差。
usage_tips:
  - 让雷电巨人承担正面伤害，再用龙卷风把远程防守拉进电击背包范围；不要只为触发反弹而把已经安全处理的单位拉到皇家塔附近。
  - 推进前保留重置或高伤法术处理地狱之塔、地狱飞龙和防守建筑，否则雷电巨人会在接近皇家塔前被快速消耗。
  - 单倍圣水阶段谨慎沉底，七费投入容易被野猪骑士、蛮羊骑士等快速单位换路；双倍圣水后更容易补齐支援和法术。
  - 对手使用远程单位时，先观察其站位再决定是否追加龙卷风或支援，不要把所有费用堆在无法触发背包反击的一条直线上。
matchups:
  - { title: 适合应对, text: '适合压制骷髅军团、蝙蝠和高频近战单位，攻击者越靠近且攻速越快，电击背包的反弹与眩晕收益越高。' }
  - { title: 需要提防, text: '地狱之塔、地狱飞龙、皮卡超人和远距离输出能够绕开或承受反弹，建筑还可持续牵引他的路线。' }
  - { title: 搭配思路, text: '与龙卷风、雷电法术和雷电飞龙组合，把远程防守拉入反击范围，并处理建筑与递增伤害单位。' }
