overview:
- 野蛮人攻城槌是一张四费建筑目标单位。它移动三格后进入冲锋，撞击建筑时造成双倍伤害；槌体被摧毁后还会留下两名野蛮人，因此一张牌同时包含突破建筑和地面近战两段压力。
- 攻城槌本身不攻击部队，也不能处理空中目标。眩晕、击退和建筑拉扯会重置冲锋，若两名野蛮人也被范围伤害一并清理，后续价值会明显降低。
usage_tips:
- 桥头部署可以缩短启动距离，适合在对手圣水不足或关键防守牌离手时快速施压。
- 防守后保留下来的单位前方放置攻城槌，可以让它承担部分伤害，并把一次防守转化为双路或同路反击。
- 面对建筑时留意其摆位，必要时用法术处理建筑周围的小单位，避免攻城槌尚未接近目标就被提前拆掉。
- 攻城槌被打破后，两名野蛮人的站位较集中；对手保留滚木、火球等范围手段时，不要把全部反击价值都寄托在破槌后的单位上。
matchups:
- title: 适合应对
  text: 适合惩罚缺少建筑或重型单体防守的卡组，也能在防守后配合残血单位形成持续桥头压力。
- title: 需要提防
  text: 电击法术、滚木、巨型雪球和持续击退会打断冲锋；高伤害单体与稳固建筑也能在接塔前拆掉攻城槌。
- title: 搭配思路
  text: 常与皮卡超人、幻影刺客、皇家幽灵等桥头进攻单位搭配，并配合毒药或火球清理建筑和后排防守。
