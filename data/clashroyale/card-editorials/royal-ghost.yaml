overview:
  - 皇家幽灵是三费范围近战单位，部署后处于隐身状态，敌方单位和建筑无法主动锁定；发动攻击后显形，连续 1.8 秒没有攻击目标时会再次隐身。
  - 他会悬浮越过河道，但仍按地面单位受到攻击和拉扯。隐身让他容易接近脆弱后排，却也意味着无法在未显形时替后方单位吸收皇家塔或敌军火力。
usage_tips:
  - 桥头部署可以利用隐身和快速移动逼迫对手响应，但要避免在圣水不足时被高生命近战单位防住后形成反击。
  - 防守远程后排时可提前部署，让幽灵保持隐身接近并先手攻击；范围伤害还能同时处理周围的低生命单位。
  - 与野猪骑士、攻城槌或皇家巨人同行时，注意隐身幽灵不会替核心单位承伤，应在他显形后再决定是否追加支援。
  - 面对敌方幽灵时，可先用低费地面单位迫使其显形，再让防空或高伤单位参与攻击；单独的空中单位无法持续锁定隐身幽灵。
matchups:
  - { title: 适合应对, text: '适合接近公主、吹箭哥布林、烟花炮手等远程后排，范围伤害也能处理哥布林和骷髅人海。' }
  - { title: 需要提防, text: '骑士、瓦基丽武神和迷你皮卡等高生命近战单位能稳定挡住，法术和范围攻击即使在隐身期间也可命中。' }
  - { title: 搭配思路, text: '与野猪骑士、攻城槌、皇家巨人等快速或远程核心搭配，利用幽灵清理人海并在反击中重新隐身。' }
