overview:
- 野蛮人是一张五费群体近战卡牌，一次部署五个单位。单个野蛮人的属性并不突出，但五人合计拥有较高生命值和持续输出，能够包围并快速处理只攻击地面的坦克、冲锋单位和缺少范围伤害的近战部队。
- 这张卡的强度高度依赖单位数量。火球等范围法术配合少量补充伤害可以同时削弱整组野蛮人，范围攻击单位也能压缩他们的输出时间。部署时需要利用分路、包围和错开法术价值，而不是把五人当成一张可以无条件桥头施压的进攻卡。
usage_tips:
- 在国王塔后方居中部署，可以让五名野蛮人分成两路，提前建立两侧防守，并降低对手用一个法术处理全部单位的收益。
- 防守高生命值地面单位时，尽量等目标进入己方半场后从周围部署，让野蛮人迅速完成包围，避免所有人挤在同一侧追赶。
- 确认对手的火球、毒药法术或主要范围伤害单位不在手中后，再考虑把存活的野蛮人集中用于反击。
- 面对野猪骑士、攻城锤等建筑目标单位时，可直接部署在行进路径上，利用单位碰撞和高总输出减少皇家塔承受的伤害。
matchups:
- title: 适合应对
  text: 高生命值地面坦克、单体近战单位和建筑目标部队。五个单位形成包围后，可以在较短时间内提供很高的合计输出。
- title: 需要提防
  text: 火球、毒药法术以及女武神、飞斧屠夫等范围伤害单位。五名野蛮人站位过于集中时，对手很容易获得正向费用交换。
- title: 搭配思路
  text: 适合放入需要火球诱饵或分路施压的体系，也可以在防守后为皇家野猪、攻城锤等单位提供地面掩护。
