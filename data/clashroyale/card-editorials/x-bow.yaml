overview:
  - 十字连弩是一张六费超远射程建筑，可以从己方半场锁定皇冠塔，也能在防守时高速攻击地面单位。它需要较长部署时间和持续保护，是典型的围绕锁定时机展开的进攻核心。
  - 十字连弩只能攻击地面，单次伤害不高，目标被低费单位反复替换时很难锁塔。部署投入较大，一旦保护失败，通常会留下明显的圣水劣势。
usage_tips:
  - 确认对手主要前排或建筑解牌不在手中后再进攻部署，减少被立即吸引或拆除的风险。
  - 用低费单位和法术保护连弩，优先清理会进入射程的诱饵，而不是盲目追求额外塔伤。
  - 防守时可利用超远射程处理地面推进，存活后的连弩还能迫使对手继续交牌。
matchups:
  - { title: 适合应对, text: 缺少高生命值前排、建筑或快速贴身手段的卡组，容易被持续锁定消耗。 }
  - { title: 需要提防, text: 巨人类前排、地震法术、远程高伤和低费单位循环都能阻止锁塔。 }
  - { title: 搭配思路, text: 与特斯拉电磁塔、低费循环、滚木和火球配合，建立稳定防守后寻找费用差进攻。 }
