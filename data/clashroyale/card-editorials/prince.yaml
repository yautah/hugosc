overview:
  - 王子是一张五费单体近战卡牌，连续移动 2.5 格后进入冲锋，速度提升并在命中时造成双倍伤害。他能跳过河道，防守结束后往往可以迅速转成进攻压力。
  - 王子的弱点是每次只攻击一个地面目标，冲锋还会被眩晕、击退或大量低费单位打断。使用重点是先处理对手的人海和重置手段，再让冲锋命中高价值目标。
usage_tips:
  - 优先用王子防守野猪骑士、蛮羊骑士和中高生命地面单位，保留生命值后形成反击，比单独桥头投入更容易换到圣水优势。
  - 部署时留出足够距离让王子完成冲锋；在己方半场贴近目标放置虽然能立刻输出，但会失去第一下双倍伤害。
  - 进攻前确认对手的人海卡是否在手，准备小法术或范围支援，避免五费单位被低费单位长期牵制。
  - 电击法术、滚木和击退会重置冲锋，既要提防对手用它们防守，也可以主动重置敌方王子的冲锋。
matchups:
  - { title: 适合应对, text: '适合处理野猪骑士和中型地面前排，冲锋命中后可以迅速削减生命并保留反击威胁。' }
  - { title: 需要提防, text: '骷髅军团、守卫等多单位卡牌能分摊单体攻击，眩晕和击退会重置冲锋，建筑也能把路线拉离公主塔。' }
  - { title: 搭配思路, text: '与小法术、黑暗王子或范围远程单位搭配，先清除人海，再利用冲锋速度惩罚对手圣水不足或卡序空缺。' }
