overview:
  - 威猛矿工是四费英雄近战单位，持续攻击同一目标时伤害会分三阶段提升，最终形成极高的单体输出。支付一费可留下炸弹并从地下移动到另一条路线。
  - 他适合处理坦克和建筑，但切换目标会重置递增伤害。爆炸逃生既能脱离不利交互，也能改变进攻路线并用炸弹清理原地小单位。
usage_tips:
  - 防守高生命前排时尽量避免被低费单位插入打断锁定，让钻机持续升到最高伤害阶段。
  - 对手用人海包围时启动爆炸逃生，既可避开围攻，也能让延时炸弹处理留在原地的单位。
  - 换路前确认另一侧有可承接的进攻目标，否则一费技能可能只换来无效行进并丢失原有输出。
matchups:
  - { title: 适合应对, text: '持续递增伤害非常适合处理巨人、戈仑石人、皇家巨人和高生命建筑。' }
  - { title: 需要提防, text: '电击、击退和廉价单位可频繁重置锁定，空中单位也不会成为钻机目标。' }
  - { title: 搭配思路, text: '与小法术和范围单位配合清除打断者，并利用换路技能给双路施压卡组增加变化。' }
