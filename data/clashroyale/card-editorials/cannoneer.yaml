overview:
  - 炮兵是高单发伤害、低攻击频率的皇家塔部队，擅长处理中高生命值单体单位。每发炮弹威力明显高于皇家塔公主，但较长攻击间隔会让小型人海更容易靠近。
  - 使用炮兵的卡组需要主动补足范围伤害和低费清场能力。若让多个低生命值单位分散进入射程，他容易出现伤害溢出和攻击节奏跟不上的问题。
usage_tips:
  - 让低费单位先聚集或拉扯敌军，再用范围伤害处理人海，把炮兵攻击留给更高价值目标。
  - 面对单体进攻时可计算炮兵的高额单发伤害，减少额外防守投入并保留圣水反击。
  - 避免让多个小单位同时分路接近皇家塔，较慢攻击频率很难兼顾连续目标。
matchups:
  - { title: 适合应对, text: 中高生命值单体部队、慢速前排和需要高单发伤害快速削弱的目标。 }
  - { title: 需要提防, text: 骷髅军团、哥布林和其他密集或分散人海会放大攻击间隔较长的弱点。 }
  - { title: 搭配思路, text: 与范围法术、炸弹兵等清场卡配合，让炮兵专注处理高生命值单位。 }
