overview:
  - 渔夫是一张三费地面控制单位，会用鱼钩把远处地面部队拉到自己身边；面对建筑时则会把自己拉向目标。被鱼钩命中的单位还会短暂降低移动和攻击速度。
  - 他的直接输出并不突出，核心价值是改变站位。一次合适的拉扯可以让两座公主塔共同攻击、把进攻单位带离皇家塔，或者利用敌方单位激活国王塔。
usage_tips:
  - 面对野猪骑士、攻城槌等直奔建筑的单位时，把渔夫放在场地中部偏另一侧，利用鱼钩改变其路线并争取双塔输出。
  - 对巨人、戈仑石人等前排可先拉离后排，让己方单体输出集中处理；鱼钩后的减速也能延长防守时间。
  - 渔夫不能钩取空中单位，且鱼钩需要蓄力。部署后若目标离开范围或被其他单位挡住，控制效果可能无法按预期发生。
  - 进攻时可借敌方建筑把自己拉近，再用较快的首次攻击衔接输出，但不要为了这次位移让渔夫提前脱离己方推进阵型。
matchups:
  - { title: 适合应对, text: '适合拉扯野猪骑士、皇家巨人和各类高生命地面前排，也能用敌方单位激活国王塔。' }
  - { title: 需要提防, text: '空中单位完全不受鱼钩影响，骷髅兵等低费单位还能打断锁定并包围输出较低的渔夫。' }
  - { title: 搭配思路, text: '与猎人、皮卡超人、地狱之塔等近距离高伤害手段配合，把目标拉到最有利的集火位置。' }
