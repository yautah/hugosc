overview:
  - 弓箭女皇是一张五费远程英雄，可攻击空中和地面。支付一费开启隐身斗篷后，她暂时无法被多数单位锁定，并获得大幅攻击速度强化。
  - 技能适合在关键输出窗口躲避锁定并快速处理目标，但隐身不等于免疫范围伤害，已经落下的法术和溅射仍可能命中她。
usage_tips:
  - 等待对手的主要单位锁定女皇后再开启斗篷，可以打断攻击并争取完整的爆发时间。
  - 在前排保护下使用技能可快速处理建筑或皇家塔；没有前排时，隐身可能让敌军转而直接攻击己方皇家塔。
  - 技能冷却较长，应把它留给决定交换结果的窗口，而不是仅为提高几次普通攻击的速度。
matchups:
  - { title: 适合应对, text: '高爆发适合快速处理高生命单位与建筑，同时提供稳定防空。' }
  - { title: 需要提防, text: '火球、毒药、箭雨和范围攻击可在隐身期间造成伤害，闪电也能在目标条件满足时命中。' }
  - { title: 搭配思路, text: '与坦克、野猪骑士或皇家巨人配合，让前排承伤并为斗篷爆发创造安全输出时间。' }
