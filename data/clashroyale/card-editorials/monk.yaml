overview:
  - 盖世武僧是五费地面英雄，普通攻击以三段连击循环，最后一击伤害更高并带有击退。支付一费开启超然物外后会大幅减伤，并把多数投射物反弹给对手。
  - 技能可以反制火箭、火球和远程弹道，但对持续范围伤害、近战攻击或无法反弹的效果主要只提供减伤。发动时机决定它是一笔高价值交换还是单纯延缓阵亡。
usage_tips:
  - 观察对手法术或高伤害投射物的出手动作再开技能，尽量让反弹覆盖最有价值的一次攻击。
  - 进攻时把武僧放在主力前方，迫使对手在等待技能结束和冒险使用投射物之间选择。
  - 三连击的最后一击能击退地面单位，可用于打断冲锋或把目标推离皇家塔，但不要依赖它处理空中目标。
matchups:
  - { title: 适合应对, text: '擅长反制火箭、火球、飞斧和其他可反弹投射物，也能靠减伤承担爆发。' }
  - { title: 需要提防, text: '近战高伤害、地狱类递增伤害和持续范围法术不会因反弹机制完全失效。' }
  - { title: 搭配思路, text: '与高价值推进单位和桥头压力卡配合，用技能保护阵型并把敌方法术送回防守区域。' }
