overview:
  - 皇家塔公主是默认皇家塔部队，攻击频率和单次伤害较为均衡，可以稳定攻击空中与地面目标。她没有额外技能或资源机制，适合需要通用防守能力的卡组。
  - 与其他皇家塔部队相比，皇家塔公主既不擅长瞬间处理高生命值目标，也不会因弹药或强化机制产生明显空窗。对局价值主要来自稳定输出和与卡组防守体系的配合。
usage_tips:
  - 利用稳定攻击处理被拉到中央的单位，让两座皇家塔尽量同时参与输出。
  - 防守小型单位时可适当依赖皇家塔，减少不必要的圣水投入，但要准确判断剩余伤害。
  - 面对高生命值推进时提前部署主要防守，皇家塔公主更适合补充输出而不是独立解决目标。
matchups:
  - { title: 适合应对, text: 常规空地单位和需要持续稳定输出的场面，不受弹药或蓄力节奏限制。 }
  - { title: 需要提防, text: 高生命值前排、爆发进攻和能直接抵达塔下的单位，需要卡组提供主要防守。 }
  - { title: 搭配思路, text: 几乎适配所有卡组，尤其适合不希望皇家塔机制改变防守节奏的通用体系。 }
