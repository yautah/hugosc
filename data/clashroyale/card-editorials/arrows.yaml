overview:
  - 万箭齐发是三费大范围伤害法术，会以三轮箭雨覆盖目标区域。总伤害适合清理低生命人海，分段命中还能处理在第一轮后生成或进入范围的单位。
  - 它的覆盖面积大、容错较高，但对皇家塔伤害比例较低。主要价值是稳定清场和保护推进，而不是单纯消耗塔血。
usage_tips:
  - 面对亡灵大军、烟花炮手或成群单位时，稍等目标进入同一范围再施放，争取一张法术处理多个单位。
  - 三轮伤害需要短暂时间完成，处理即将攻击皇家塔的目标时应提前落点，避免最后一轮来不及命中。
  - 进攻前记录对手的人海防守，保留万箭齐发随推进使用通常比无目标消耗皇家塔更有价值。
matchups:
  - { title: 适合应对, text: '适合处理亡灵大军、骷髅军团、哥布林团伙和烟花炮手等低生命单位。' }
  - { title: 需要提防, text: '对中高生命单位伤害有限，三费投入若只命中单个廉价目标容易产生负交换。' }
  - { title: 搭配思路, text: '与容易被人海阻挡的气球兵、王子和桥头推进单位配合，负责清除大范围防守。' }
