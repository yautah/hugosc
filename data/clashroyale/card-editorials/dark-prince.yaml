overview:
  - 黑暗王子是一张四费地面范围单位，护盾可以单独吸收一次高伤害，移动三格后进入冲锋并造成双倍范围伤害。他还能跳过河道，适合快速支援两侧和延续防守反击。
  - 他的单体持续输出不算突出，优势在于清理中低生命值单位、用护盾抵消关键攻击，并通过冲锋迫使对手及时部署。护盾被击破后，生存能力会明显下降。
usage_tips:
  - 尽量让黑暗王子获得三格冲锋距离，桥后或防守结束后形成的冲锋比贴身部署更能发挥伤害和移动速度优势。
  - 用其他单位承受高伤害，让黑暗王子的范围攻击清理周围人海；面对单个重型单位时不要把他当作主要坦克克制卡。
  - 护盾可以吸收王子冲锋、电磁巨炮射击等一次高伤害，部署时应让护盾先接触关键攻击，再由后续单位完成交换。
  - 利用跳河能力从中路快速接近目标，但要注意跳跃不会自动解决建筑拉扯，必要时仍需法术或另一侧压力。
matchups:
  - { title: 适合应对, text: '适合清理哥布林团伙、野蛮人和其他地面密集单位，护盾也能帮助他承受单次高伤害并继续反击。' }
  - { title: 需要提防, text: '高生命值单体近战、防御建筑和空中单位会限制他的输出；提前用低费单位打断冲锋，也能显著降低首次接触伤害。' }
  - { title: 搭配思路, text: '与王子组成双王子推进，或加入巨人、皮卡超人体系负责清理人海；小法术和远程防空可以补足他无法攻击空中的弱点。' }
