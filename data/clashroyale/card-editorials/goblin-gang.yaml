overview:
- 哥布林团伙是一张三费混合人海，同时部署三个近战哥布林和三个投矛哥布林。近战单位负责快速包围地面目标，投矛单位则可从后方攻击空中和地面，一张卡便能覆盖多种防守需求。
- 六个单位的总输出不低，但生命值都很有限，范围法术和范围攻击能以较少操作清理整组。其核心价值在于迫使对手交出小法术，再为哥布林飞桶、骷髅气球或其他人海创造窗口。
usage_tips:
- 防守单体地面单位时从周围部署，让近战哥布林包围，投矛哥布林在后方保持输出。
- 面对空中目标时保护三个投矛哥布林，不要让他们与近战单位一起被范围伤害清理。
- 记录对手滚木、电击法术或箭雨的循环，在解牌离手时配合其他诱饵单位进攻。
- 不要在对手范围单位已经建立射程时直接贴身部署，先用皇家塔、建筑或前排吸引目标。
matchups:
- { title: 适合应对, text: '王子、迷你皮卡等单体地面单位，以及需要同时用近战包围和远程对空处理的混合进攻。' }
- { title: 需要提防, text: '滚木、箭雨和电击法术等范围手段，以及女武神、法师等能持续清理密集单位的目标。' }
- { title: 搭配思路, text: '与哥布林飞桶、骷髅气球和公主组成法术诱饵，也可在快速循环中作为一张同时覆盖空地的通用防守。' }
