overview:
- 皇家野猪是一张五费四单位建筑进攻卡。横向部署可以把野猪分到两路，集中部署则能快速叠加对单个建筑的伤害；它们还能跳过河道，减少部分地形绕行。
- 四个单位站位分散，对单体防守和雷电法术更有韧性，但范围伤害会同时覆盖多只野猪。五费投入也意味着错误分路或撞上稳定建筑后，短时间内很难补充第二波压力。
usage_tips:
- 对手只有单体防守时可以分路部署，让两侧都需要额外处理；面对范围单位时则根据其所在路线集中进攻另一侧。
- 后场横向放置可以自然形成两只与两只的分路，桥头部署更快但留给判断和补牌的时间较少。
- 配合地震法术处理中央建筑时，尽量让法术同时覆盖防御塔和建筑，提高五费进攻的整体交换收益。
- 防守后留下远程单位时，可让皇家野猪分路充当前排，迫使对手在两侧分配防守和法术。
matchups:
- title: 适合应对
  text: 擅长分散单体防守、雷电法术和只能覆盖一路的卡组，也能用双路压力惩罚高费部署。
- title: 需要提防
  text: 炸弹塔、烈焰熔炉和高伤害范围单位能同时处理多只野猪；飓风还可把它们聚集后统一清理。
- title: 搭配思路
  text: 与地震法术、皇家卫队和三个火枪手等分路体系搭配，通过法术诱饵和双路前排迫使对手拆分资源。
