overview:
  - 精灵女王会根据部署时的圣水数量选择形态：三费时以快速地面近战单位登场，六费时骑乘灵兽成为能同时攻击空中和地面的远程单位。两种形态共用等级与伤害，但攻击间隔、射程、移动方式和费用不同。
  - 这张卡的难点不是单纯比较哪种形态更强，而是控制部署瞬间的圣水。地面形态费用低、输出频率高，适合防守与快速反击；空中形态射程更远且不受地面单位攻击，但六费投入会明显压缩后续操作空间。
usage_tips:
  - 准备使用地面形态时，应在圣水达到六费前完成部署；若圣水恰好跳到六费，卡牌会自动切换为空中形态并改变整轮节奏。
  - 地面形态适合处理落单的地面单位或跟随小型推进，高伤害与快速移动能形成有效反击，但不应正面承受大量集火。
  - 空中形态适合需要补充防空、跨越地面阻挡或在前排后方持续输出的场面，部署前要确认卡组仍有费用应对对手换路进攻。
  - 使用镜像法术时，复制出的费用与形态取决于此前部署的版本；规划连续出牌时要把这一点计入圣水循环。
matchups:
  - { title: 适合应对, text: '地面形态适合快速处理中等生命值地面单位，空中形态则能避开地面近战并从远处打击空地目标。' }
  - { title: 需要提防, text: '高伤害法术、远程防空与能快速贴身的单位都会压缩空中形态的输出时间；地面形态面对人海和高生命前排时效率有限。' }
  - { title: 搭配思路, text: '与能稳定承伤的前排、低费循环卡和范围法术配合，让玩家可以根据当轮圣水与对局需求自由选择形态。' }
