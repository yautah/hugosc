overview:
- 法师是一张五费远程范围单位，火球可以同时命中空中和地面目标。较大的溅射范围让他擅长处理集中推进和成群单位，防守存活后也能为前排提供稳定支援。
- 五费投入和中等生命值使他很怕高伤害法术与贴身单位。若攻击目标被分散拉开，法师的范围优势难以发挥，也容易因为站位过近与前排一起被法术覆盖。
usage_tips:
- 防守时把法师部署在皇家塔侧后方，让前排先吸引火力，再利用范围攻击覆盖敌方支援单位。
- 对付人海时不要过早出牌，等待目标聚集或越过河道后再部署，能让第一次火球命中更多单位。
- 反击时让坦克或高生命值单位走在前面，同时拉开间距，降低对手用一张火球或雷电法术同时处理前后排的机会。
- 法师费用较高，不宜只为清理少量低费单位频繁裸下；先判断能否存活并参与反击，再决定是否投入五费。
matchups:
- title: 适合应对
  text: 擅长清理亡灵大军、野蛮人、骷髅军团等密集单位，也能同时攻击空中与地面的混合推进。
- title: 需要提防
  text: 高伤害法术、矿工贴身和快速单体单位会压缩输出时间；分散进攻也会降低每次范围攻击的收益。
- title: 搭配思路
  text: 与巨人、戈仑石人等前排配合可组成推进后排，也适合搭配飓风法术，把敌军拉进同一片溅射范围。
