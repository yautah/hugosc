overview:
- 哥布林是一张两费地面近战卡牌，一次部署四个移动速度很快的单位。四人同时包围目标时合计输出不低，可以用较少费用处理单体进攻、阻挡建筑目标单位，也能在对手缺少低费范围伤害时形成反击压力。
- 这张卡的价值依赖四个单位能否同时存活并接近目标。滚木等范围法术可以一次处理整组哥布林，范围攻击和部署伤害也会迅速削弱数量优势；使用时应把它视为拉扯、包围与诱饵工具，而不是能够正面承受伤害的稳定防线。
usage_tips:
- 防守单体近战单位时，从目标周围部署形成包围，让四个哥布林分散承受攻击，并缩短所有单位接触目标的时间。
- 对付野猪骑士、攻城锤等建筑目标单位时，部署在行进路径上可以利用碰撞体积拖慢目标，同时让四个单位尽快输出。
- 对手的滚木或主要低费范围法术刚使用后，可以让存活哥布林参与反击，或用另一张诱饵牌迫使对手在下一轮做取舍。
- 不要把哥布林直接叠放在范围伤害单位正面；必要时先用其他单位吸引攻击，再从侧后方部署完成包围。
matchups:
- title: 适合应对
  text: 单体地面单位、建筑目标进攻和缺少范围伤害的中型部队。四个单位形成包围后，可以用两费换取较长拖延时间和可观合计输出。
- title: 需要提防
  text: 滚木、巨型雪球等低费范围法术，以及女武神等能够持续命中多个单位的范围攻击。部署过于集中时，四个单位可能在开始输出前同时离场。
- title: 搭配思路
  text: 适合滚木诱饵、矿工消耗和低费循环体系，也能与远程单位或防御建筑配合，由哥布林负责包围和拖延，后方负责稳定输出。
