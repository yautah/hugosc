overview:
  - 黄金圣骑是一张四费英雄近战单位，额外支付一费可发动连续突袭，在最多十个相邻地面目标之间穿梭并造成高于普通攻击的伤害。命中皇家塔后连锁会立即结束。
  - 突袭期间免疫伤害，并能越过河道追击后排。技能强度高度依赖敌方站位：目标间距合适时可以一路连接皇家塔，目标过远、位于身后或被廉价单位引向侧面时则会提前终止。
usage_tips:
  - 发动技能前观察所有潜在目标，不要只盯着第一个单位；理想路线应从前排连接到后排，再延伸至皇家塔。
  - 飓风法术可以把多个目标集中到突袭范围内，小法术则能先削低生命值单位，帮助连续突袭完成击杀并继续寻找目标。
  - 防守时可用突袭的伤害免疫躲避高伤害单次攻击，但技能冷却较长，不应默认一轮部署可以稳定发动两次。
  - 对手会用低费单位把突袭引向中央或侧边。稍等对方交出诱饵后再启动，往往比在桥头立刻按下技能更可靠。
matchups:
  - { title: 适合应对, text: '适合处理站位相连的地面人海与远程后排，也能利用突袭免疫躲过高伤害攻击。' }
  - { title: 需要提防, text: '空中单位无法被锁定，高生命近战能压制其较低的普通伤害，分散站位和侧向诱饵会切断突袭路线。' }
  - { title: 搭配思路, text: '与飓风、滚木和桥头施压单位配合，通过聚怪或清理诱饵为连续突袭创造通往皇家塔的路径。' }
