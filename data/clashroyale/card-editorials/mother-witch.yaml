overview:
  - 女巫婆婆是一张四费远程支援单位，攻击会给敌方部队施加持续五秒的诅咒。被诅咒的部队在效果持续期间阵亡，会在原地生成一只只攻击建筑的己方野猪。
  - 她对单个高生命目标的直接输出有限，真正优势是把敌方数量转化为反击规模。面对骷髅兵、蝙蝠和其他低生命人海时，一次成功防守就可能形成多只野猪的反推。
usage_tips:
  - 面对人海时先让女巫婆婆完成标记，再用小法术或范围单位收尾，可以稳定触发转化；过早清场会浪费她的核心机制。
  - 把她部署在皇家塔后方或前排单位之后，避免在施加诅咒前被法术或突进单位直接处理。
  - 生成的野猪只攻击建筑，适合自然形成双路压力；无需强行把所有野猪集中到同一路，也不要为保护单只野猪投入过多圣水。
  - 对手没有人海单位时，应把她视为低伤害远程支援，不要仅为追求转化效果而勉强使用，必要时保留到更合适的防守轮次。
matchups:
  - { title: 适合应对, text: '尤其克制骷髅军团、亡灵大军、哥布林团伙和墓园等多单位攻势，能把防守目标数量转化为建筑压力。' }
  - { title: 需要提防, text: '火球、毒药和高伤害突进单位能快速处理本体；对单个重型单位时诅咒难以产生足够收益。' }
  - { title: 搭配思路, text: '与滚木、万箭齐发、女武神等收割手段配合，先施加诅咒再完成击杀，并用前排保护她持续标记更多目标。' }
