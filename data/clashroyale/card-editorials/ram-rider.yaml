overview:
  - 蛮羊骑士由只攻击建筑的蛮羊和独立攻击部队的骑手组成。蛮羊移动 2.5 格后开始冲锋并造成双倍伤害，骑手则用套索攻击空地部队，使其移动速度降低 70%。
  - 套索不会降低攻击速度或造成眩晕，近身单位到达攻击距离后仍能正常输出。它更适合拖慢追击、打断冲锋准备和为蛮羊争取接近建筑的时间。
usage_tips:
  - 在河道附近利用蛮羊跳河和骑手套索牵引地面单位，让皇家塔在敌军缓慢追赶时持续输出。
  - 进攻时先观察对手建筑位置，蛮羊会像其他建筑目标单位一样被牵引；预留法术或第二路压力处理建筑。
  - 套索优先寻找未被减速的部队，可以同时限制多个追兵，但不要把它当作眩晕来阻止电磁炮或地狱飞龙攻击。
  - 击退和眩晕会打断冲锋，接近皇家塔时可用小法术处理阻挡单位，但应避免把全部费用押在一次冲锋连接上。
matchups:
  - { title: 适合应对, text: '适合牵制移动缓慢的高伤地面单位，并在防守后利用剩余生命值转为建筑压力。' }
  - { title: 需要提防, text: '防御建筑、击退、眩晕和站在目的地附近的近战单位能够稳定阻止冲锋，远程控制也不会被套索完全停住。' }
  - { title: 搭配思路, text: '与气球兵、雷电法术或大雪球搭配，用蛮羊吸引建筑和减速防空，再由另一进攻点制造压力。' }
