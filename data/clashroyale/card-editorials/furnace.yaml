overview:
  - 烈焰熔炉是一张四费远程地面单位，能够攻击空中和地面目标，并每隔七秒生成一只烈焰精灵。它从早期的固定建筑改为可移动部队后，既能持续提供范围消耗，也能跟随推进补充火力。
  - 熔炉本体攻击频率较慢，当前射程为五点五格，价值主要来自长时间存活后积累的烈焰精灵。它不再具备建筑的拉扯能力，也没有被摧毁后的额外生成，因此部署位置和保护成本会直接影响收益。
usage_tips:
  - 防守时放在主力单位侧后方，让本体利用射程攻击，同时让周期生成的烈焰精灵清理人海或逼迫对手分配小法术。
  - 反击时让高生命值单位走在前方，避免熔炉先被远程单位锁定；它存活越久，七秒一次的生成收益越稳定。
  - 面对两路压力时可利用烈焰精灵的生成方向补充另一侧，但不要把四费熔炉当成能够独立守住一路的传统建筑。
  - 当前射程已缩短至五点五格，部署过远可能无法及时加入交战；应根据敌军落点预留移动和首次攻击时间。
matchups:
  - { title: 适合应对, text: '适合消耗低生命值人海、慢速推进和缺少稳定远程处理手段的阵容，持续生成还能逼迫对手反复响应。' }
  - { title: 需要提防, text: '高伤法术、远程点杀和快速突进会缩短存活时间；作为部队后也无法像建筑一样主动吸引建筑目标单位。' }
  - { title: 搭配思路, text: '与高生命值前排、控制法术和其他分路压力卡配合，用前排保护本体，并让烈焰精灵补充范围伤害。' }
