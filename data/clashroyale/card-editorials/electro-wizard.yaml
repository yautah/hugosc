overview:
  - 闪电法师是四费远程控制单位，部署时会在三格范围内造成一次电击法术伤害和 0.5 秒眩晕。普通攻击会优先分配给两个目标；只有一个目标时，两道电流会同时命中并合并伤害。
  - 每次攻击的眩晕可以重置地狱系递增伤害、冲锋和电磁炮充能，但自身生命值不高。把他当作持续输出核心容易被中型法术或高伤单位快速处理。
usage_tips:
  - 把登场电击留给电磁炮、地狱飞龙、冲锋单位或密集残血目标，直接沉底会浪费最有价值的一次范围控制。
  - 对单一目标时两道电流合并，适合补充单体伤害；面对两个目标时会自动分击，用于同时打断两边攻击节奏。
  - 与前排保持距离，避免和其他后排重叠承受火球或雷电；四费控制单位存活越久，重复眩晕价值越高。
  - 防守后反打时保留小法术清理人海，闪电法师攻速不快，单靠双目标攻击并不能迅速解决大量单位。
matchups:
  - { title: 适合应对, text: '适合重置地狱飞龙、地狱之塔、电磁炮和冲锋单位，也能用登场电击清理或打断密集目标。' }
  - { title: 需要提防, text: '火球、毒药和高伤近战能迅速压低或解决他；分散站位也会让登场范围无法同时覆盖关键单位。' }
  - { title: 搭配思路, text: '与皇家巨人、皮卡超人和蛮羊骑士搭配，为前排提供重置与双目标控制，并参与防守反打。' }
