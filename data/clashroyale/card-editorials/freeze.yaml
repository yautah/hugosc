overview:
  - 冰冻法术是四费范围控制法术，会造成少量伤害并让区域内单位与建筑停止行动四秒。它不靠伤害换取价值，而是用固定时间窗口帮助进攻或防守完成关键交互。
  - 首次使用的突然性很强，但对手知道卡组后会主动分散站位。施放时应同时覆盖皇家塔和主要防守单位，避免四费只冻结单个廉价目标。
usage_tips:
  - 等己方气球兵、野猪骑士等接近皇家塔且防守单位已经落下后再冻结，最大化四秒输出窗口。
  - 防守时可冻结高伤害推进争取皇家塔和援军处理，但技能结束后目标会立刻恢复行动。
  - 冻结状态单位不能被其他单位推动，落点与后续控制顺序需要提前安排。
matchups:
  - { title: 适合应对, text: '适合锁住皇家塔与集中防守，也能紧急延缓高伤害推进。' }
  - { title: 需要提防, text: '伤害低且费用高，目标分散或提前预判时很难取得足够交换。' }
  - { title: 搭配思路, text: '常与气球兵、墓园和野猪骑士等能在短窗口制造大量伤害的核心配合。' }
