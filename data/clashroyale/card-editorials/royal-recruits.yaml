overview:
- 皇家卫队是一张七费地面卡牌，六名带盾单位会横跨己方半场部署，默认各有三名走向两路。盾牌能够独立承受一次高伤害，六个单位则可同时拦截两路的单体输出，让一次高费投入分摊到整个竞技场。
- 它们的优势是覆盖面和数量，而不是单体属性。范围伤害、连锁攻击和空中单位能够高效处理密集卫队；若根据对手进攻改变中线附近的部署位置，则可将队形调整为二四或四二分路，把更多单位送往压力更大的一侧。
usage_tips:
- 根据双路压力在中线附近左右微调部署，利用二四或四二分路将更多卫队分配给需要的一侧。
- 防守时让卫队从不同方向包围单体输出，避免六名单位全部进入同一个范围攻击区域。
- 对手的火球、毒药或范围单位离开手牌后，再利用存活卫队在双路同时配合进攻核心。
- 七费投入很重，不要在对手可立即反打另一路时无目的地沉底，部署前要保留能够补充对空或处理后排的圣水。
matchups:
- title: 适合应对
  text: 皮卡超人、王子和野蛮人精锐等依赖单体攻击的地面单位，以及需要同时回应的双路进攻。
- title: 需要提防
  text: 炸弹兵、法师、女武神和巨石投手等范围单位，以及能够同时覆盖多名卫队的法术。
- title: 搭配思路
  text: 常与皇家野猪、飞行器和法术搭配，将双路存活单位转化为持续压力，并用对空支援弥补卫队只能攻击地面的弱点。
