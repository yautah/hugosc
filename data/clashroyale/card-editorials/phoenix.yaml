overview:
  - 凤凰是四费空中单体单位，拥有稳定近战输出。首次被击败时会造成范围死亡伤害并留下凤凰蛋，蛋在 3.8 秒内未被摧毁，就会孵化为拥有完整生命值和伤害的凤凰。
  - 重生凤凰再次被击败时不会造成死亡伤害，也不会生成第二颗蛋。凤凰的价值因此取决于死亡位置：有前排或其他单位保护蛋时可能形成第二轮输出，孤立死亡则容易连同蛋一起被处理。
usage_tips:
  - 防守时把凤凰部署在能受到皇家塔支援的位置，击败来犯单位后可带着反击部队前进，也更容易有人保护后续生成的蛋。
  - 进攻时让坦克或其他单位先承受伤害，使凤凰蛋生成后仍有单位吸引火力；电击法术和大雪球也能短暂拖延对手对蛋的攻击。
  - 不要只为重生而过度投入圣水。若凤凰和蛋都处于对手防御范围，及时停止追加支援通常比强行保护更稳妥。
  - 面对凤凰时先规划如何处理凤凰蛋；万箭齐发及更高伤害法术可以直接完成处理，远程防空也能在击败本体后继续攻击蛋。
matchups:
  - { title: 适合应对, text: '适合贴近处理女巫、火枪手等单个远程单位，也能在防守高生命前排后转入反击。' }
  - { title: 需要提防, text: '猎人、亡灵大军和稳定远程防空可以快速击败本体并继续处理凤凰蛋，法术也可能直接阻止孵化。' }
  - { title: 搭配思路, text: '与雷电巨人、哥布林巨人等前排以及克隆、镜像配合，可让其他单位保护凤凰蛋并延长空中压力。' }
