overview:
- 野蛮人精锐是一张六费地面卡，一次部署两名移动快、生命值和单次伤害都较高的近战单位。他们能快速处理中高生命值地面目标，防守后只要有一名存活，就会在桥头形成必须回应的反击压力。
- 六费成本使他们害怕被低费人海、建筑和控制分散拉扯，而只能攻击地面也意味着空中单位可以安全输出。精锐更适合在明确的防守交换中使用，而不是圣水不明时盲目桥头压满六费。
usage_tips:
- 防守高生命值地面单位时将两名精锐放在目标两侧，使其同时输出并避免被线性攻击一起命中。
- 记住对手的骷髅军团、哥布林团伙和防御建筑是否在手，再决定是否桥头反击。
- 对手在另一路沉底高费后，可用精锐快速换路施压，但必须确保己方仍有手段处理原路进攻。
- 准备轻型法术或范围单位清理人海，不要让六费输出被一费骷髅兵长时间拉扯。
matchups:
- { title: 适合应对, text: '巨人、皇家巨人等地面前排，以及在防守中需要高单体伤害快速削减的目标。' }
- { title: 需要提防, text: '人海、防御建筑、冰雪精灵等控制拉扯，以及不会被他们攻击的空中单位。' }
- { title: 搭配思路, text: '与狂暴法术、轻型法术和能对空的支援单位搭配，用防守交换保留精锐后再组织反击。' }
