overview:
  - 气球兵是一张五费空中进攻核心，只锁定建筑，接近目标后的首次投弹很快，单次伤害足以迫使对手立即回应。它阵亡后还会留下三秒后爆炸的炸弹，对范围内空地单位造成伤害。
  - 气球兵的路线容易被建筑改变，也依赖其他卡牌处理防空单位。它不适合在没有信息时反复单独投入，通常要通过坦克、控制或法术创造至少一次投弹机会。
usage_tips:
  - 先记住对手的主要防空和建筑卡序，等关键解牌离手后再下气球兵；盲目重复同一路进攻很容易持续亏费。
  - 利用前排或冰人吸收塔和防空火力，让气球兵保持在后方；部署太靠前会使它越过坦克，提前承受全部伤害。
  - 火球、雪球和电击法术不仅用于造成伤害，也能通过击退或重置争取最后一段飞行距离，帮助气球兵完成关键投弹。
  - 防守攻城建筑时可以用气球兵快速拆除，但它无法承受这类建筑的攻击，仍需地面单位替公主塔吸引火力。
matchups:
  - { title: 适合应对, text: '对缺少稳定防空或刚用掉建筑的卡组威胁很大，只要完成一次投弹就能取得显著塔血优势。' }
  - { title: 需要提防, text: '特斯拉电磁塔、地狱之塔和高输出防空能稳定拦截，减速与眩晕也会显著拖延接塔时间。' }
  - { title: 搭配思路, text: '常与狂暴樵夫、熔岩猎犬、冰人或冰冻法术搭配，通过前排承伤、速度增益或控制效果换取投弹窗口。' }
