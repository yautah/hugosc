overview:
  - 浪人是一张五费快速近战单位，每隔 3.5 秒可以格挡一次近战攻击：该次伤害会被完全免除，并以两倍伤害反击攻击者。格挡进入冷却后，他会像普通单体近战单位一样承受伤害。
  - 这套机制让浪人擅长和攻击慢、单次伤害高的近战单位单挑，却不适合同时面对多个攻击者。小单位或高频攻击可以先消耗格挡，再用主力完成击杀。
usage_tips:
  - 防守高伤害近战单位时，尽量让浪人以可用格挡状态接下第一击；若先被低费单位触发，核心反制价值会明显下降。
  - 格挡只处理近战攻击，远程单位、法术与空中伤害仍会正常命中。部署前要确认对手的主要伤害来源。
  - 反击伤害取决于被格挡的攻击，面对皮卡超人等高单次伤害单位收益最高；对快速低伤单位则不要过度依赖反伤。
  - 进攻时用法术或其他单位清除人海，避免对手用一个廉价单位触发格挡后再让高伤害防守者接手。
matchups:
  - { title: 适合应对, text: '擅长单挑皮卡超人、迷你皮卡和王子等高单次伤害近战单位，首轮格挡能制造明显交换优势。' }
  - { title: 需要提防, text: '远程与空中单位不触发可反制的近战交互，多单位和高频攻击也能迅速消耗格挡冷却。' }
  - { title: 搭配思路, text: '与范围伤害、小法术和能处理防空目标的单位搭配，为浪人清除人海并保留单挑环境。' }
