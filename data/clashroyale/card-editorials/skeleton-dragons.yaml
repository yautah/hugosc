overview:
- 骷髅飞龙是一张四费空中单位卡，一次部署两只能同时攻击空中和地面的范围输出单位。两只单位的火力可以集中在同一目标上，也能在地图中线附近分开，分别支援两路防守或反击。
- 它们的优势是飞行、范围伤害和双单位带来的站位弹性，但单只生命值和攻击频率都不突出。面对箭雨、火球或者能快速处理空中单位的远程火力时，将两只同时暴露给一次范围伤害会明显降低价值。
usage_tips:
- 在国王塔后方中线部署，可以让两只骷髅飞龙分别走向两路，用一张牌同时回应双路压力。
- 面对蝙蝠、亡灵和地面人海时，稍微提前部署，让两只单位建立射程并避免被近身包围。
- 进攻时将它们放在坦克或前排后方，利用双重范围伤害清理低生命值防守，不要让它们独自承担对空火力。
- 已知对手持有火球或强力对空单位时，利用分路或与其他后排拉开间距，避免一次法术同时获得多个目标。
matchups:
- title: 适合应对
  text: 蝙蝠、亡灵群和密集的地面支援单位，以及缺少对空手段的近战单位。两只单位可以为两路同时提供空中防守。
- title: 需要提防
  text: 火球、箭雨等范围法术，以及火枪手、猎人和法师等对空输出。两只站得过近时，对手容易同时处理全部价值。
- title: 搭配思路
  text: 适合与巨人、熔岩猎犬和其他能吸收火力的前排搭配，也可与地面范围单位互补，建立同时覆盖空地的防守体系。
