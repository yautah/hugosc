overview: [虚空法术会连续打击目标区域，范围内目标越少，单个目标承受的伤害越高；目标数量增加时伤害会被显著分摊。]
usage_tips: [对单个高价值单位施放前先清除附近廉价单位。, 对手可临时补兵分摊伤害，应预判其圣水与手牌。, 三次打击有间隔，移动目标可能在伤害完成前离开范围。]
matchups:
  - { title: 适合应对, text: '适合处理落单的高价值单位和建筑。' }
  - { title: 需要提防, text: '廉价多单位能迅速分摊伤害，移动目标也可能离开范围。' }
  - { title: 搭配思路, text: '与小法术和范围单位配合，先清除用于分摊的单位。' }
