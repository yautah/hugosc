overview:
- 野猪骑士是一张四费高速建筑目标单位，可以跳过河道并迅速接近防御塔。费用适中、进攻路线直接，适合通过反复循环制造稳定消耗，也是许多速转体系的主要胜利手段。
- 他不会攻击部队，面对建筑、飓风拉扯和高伤害防守时容易被完全阻挡。单次强行进攻收益有限，需要结合对手牌序、圣水和建筑位置判断是否值得投入支援法术。
usage_tips:
- 记住对手建筑和主要防守牌的循环，等关键反制离手后再桥头部署，能显著提高接塔概率。
- 边路靠外位置部署可以利用跳河缩短路线，也能根据建筑摆位调整行进方向，减少被中央建筑同时拉扯两路的机会。
- 不要每次都预判法术；先观察对手第一次防守，再决定用滚木、地震或火球处理人海与建筑。
- 防守后有残存单位时，野猪骑士可以充当前方快速目标，把一次低费防守转化为反击压力。
matchups:
- title: 适合应对
  text: 适合惩罚高费卡组和建筑离手的牌序，持续速转还能迫使对手反复投入相同防守费用。
- title: 需要提防
  text: 加农炮、特斯拉电磁塔等建筑，飓风激活国王塔，以及高伤害近战单位都能限制接塔次数。
- title: 搭配思路
  text: 常与地震法术、火球或滚木搭配处理建筑和人海，并配合低费单位组成快速循环，持续争夺牌序优势。
