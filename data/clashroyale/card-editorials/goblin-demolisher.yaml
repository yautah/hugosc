overview:
  - 哥布林爆破手是一张四费地面范围输出，正常状态会在五格距离投掷炸药。生命值降至一半后，他会停止远程攻击、提高移动速度并转而锁定建筑，最终在接触目标、被击败或倒计时结束时爆炸。
  - 自爆形态持续十秒，爆炸范围达到两点五格，能够同时威胁建筑和周围部队。对手也可以在其转化后通过拉扯或控制让爆炸远离皇家塔，因此半血并不等于必然造成塔伤。
usage_tips:
  - 防守时让他先以范围攻击处理成群地面单位，半血转化后再利用剩余生命值组织反击，通常能同时获得清场和建筑压力。
  - 预判即将进入自爆形态时准备法术或控制单位，清除中央建筑与轻型拦截，帮助他在十秒倒计时内接近皇家塔。
  - 面对空军不要单独投入，他无法攻击空中目标；应搭配稳定防空，避免四费单位被空中部队无伤处理。
  - 对手有建筑时可先观察其位置，自爆形态只锁定建筑，中央拉扯会显著改变路线并消耗有限持续时间。
matchups:
  - { title: 适合应对, text: '适合防守密集地面单位并转化为反击压力，爆炸还能惩罚围绕建筑或皇家塔密集部署的防守。' }
  - { title: 需要提防, text: '空中单位、中央建筑、击退和减速都能限制自爆形态；远程单体输出也可能在转化后迅速将其击败。' }
  - { title: 搭配思路, text: '与地震法术、小法术和防空单位配合，先清理建筑及轻型拦截，再让自爆形态逼近核心目标。' }
