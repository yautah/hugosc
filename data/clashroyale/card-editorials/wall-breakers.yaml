overview:
  - 攻城炸弹人是一张两费双单位突击卡，只锁定建筑，移动极快，接触目标后自爆并造成范围伤害。两名单位同时命中时塔伤可观，即使只连接一名，也常能以低费用换取稳定消耗。
  - 它们生命值低，范围伤害、建筑和激活后的国王塔都能高效拦截。优势在于费用低、速度快，可以分路部署、配合矿工承伤，或逼迫对手提前交出防守卡。
usage_tips:
  - 桥头分开部署可以同时测试两路防守，迫使对手选择投入位置；对手防守牌不在手时再把两名集中到主要进攻路。
  - 与矿工、冰人或其他前排配合，让塔先锁定承伤单位，攻城炸弹人就更容易完整接近建筑。
  - 记住对手的小法术和建筑卡序，利用两费快速循环反复施压；不要每次都在同一节奏下牌，让对手获得固定防守时机。
  - 防守时也可用自爆范围伤害处理靠近建筑的单位，但普通形态必须成功接触建筑才会爆炸，不能当作随处触发的法术。
matchups:
  - { title: 适合应对, text: '对缺少低费范围伤害或建筑的卡组施压效率很高，也能利用分路迫使单体防守单位做出选择。' }
  - { title: 需要提防, text: '炸弹塔、加农炮和低费范围伤害能稳定处理，国王塔激活后也会帮助公主塔提前击败其中一名。' }
  - { title: 搭配思路, text: '与矿工、毒药或雪球构成快速消耗，通过承伤、清理人海和击退，为至少一名攻城炸弹人争取连接。' }
