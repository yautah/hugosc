overview:
- 骷髅气球是一张三费空中进攻卡，气球本体只锁定建筑，被击落或到达目标后会造成范围死亡伤害，并在地面释放七个骷髅兵。防守方需要先处理空中本体，然后继续回应落地人海。
- 一张小法术通常能解决落地骷髅兵，因此骷髅气球常用于法术诱饵。当对手的滚木、巨型雪球或电击法术不在手时，七个骷髅兵会快速造成高频伤害；若单独无目的地桥头投入，则容易被对空单位与小法术分别化解。
usage_tips:
- 记住对手小法术的循环，在解牌离手后再让骷髅气球接近防御塔。
- 与矿工搭配时让矿工先吸引皇家塔，使落地骷髅兵获得更多攻击时间。
- 防守时可将气球放在地面人海上方，利用被击落时的死亡伤害和骷髅兵分散目标。
- 注意高攻速对空单位可在远离防御塔处提前击落气球，必要时先用法术或前排压制。
matchups:
- { title: 适合应对, text: '对空手段较少、小法术循环已被其他人海诱出的阵容，以及需要用死亡伤害处理的密集地面单位。' }
- { title: 需要提防, text: '弓箭手、火枪手等稳定对空单位，以及能立即清理落地骷髅兵的范围法术。' }
- { title: 搭配思路, text: '与矿工、哥布林飞桶和其他人海牌组成诱饵，分散对手小法术，再用轻型法术处理对空阻拦。' }
