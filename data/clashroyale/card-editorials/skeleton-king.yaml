overview:
  - 骷髅帝王是四费地面溅射英雄，场上其他单位阵亡时会为他收集灵魂。支付两费发动灵魂召唤，可依据已收集数量在身边生成 6 至 16 只骷髅兵。
  - 本体适合承伤和处理地面小单位，技能则把此前交换积累为反击规模。灵魂不足时仓促发动会明显降低两费技能的收益。
usage_tips:
  - 与墓园、骷髅军团或其他多单位卡牌配合，先通过防守积累灵魂，再在对手范围法术离手后召唤。
  - 召唤位置围绕本体展开，可利用骷髅帝王贴近皇家塔或关键单位后再发动，缩短骷髅兵行进距离。
  - 面对范围伤害时不要把本体和召唤单位一起送入同一处理范围，必要时保留技能作为下一轮压力。
matchups:
  - { title: 适合应对, text: '适合在单位频繁阵亡的对局中积累灵魂，并用溅射攻击处理地面人海。' }
  - { title: 需要提防, text: '女武神、飞斧屠夫、毒药和滚木等范围手段能快速清理召唤出的骷髅兵。' }
  - { title: 搭配思路, text: '与墓园、骷髅气球、骷髅军团和能逼出小法术的卡牌搭配，围绕灵魂数量安排反击。' }
