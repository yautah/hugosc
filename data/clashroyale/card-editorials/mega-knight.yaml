overview:
  - 超级骑士是七费重型地面范围单位，部署时会对周围敌军造成伤害与击退。距离地面目标 3.5 至 5 格时，他会蓄力跃击并造成高额范围伤害，适合在防守解场后转为反打前排。
  - 高生命值和范围攻击不等于高单体输出。面对皮卡超人、地狱系和被建筑持续牵引时，他会消耗大量时间；频繁触发跃击还可能被对手利用来激活国王塔。
usage_tips:
  - 优先用登场伤害覆盖两名以上中等生命单位，七费只处理单一低费目标通常难以形成有效交换。
  - 防守完成后再补低费远程或空军支援，利用剩余生命值推进；不要在单倍圣水一次投入过多费用。
  - 控制与目标的距离，过近无法跃击，过远则需要步行；利用小单位或建筑改变目标可让他在错误方向反复跳跃。
  - 防守超级骑士时以小型坦克在中间承伤，配合皇家塔和高单体输出处理，避免把脆弱单位堆在登场与跃击范围内。
matchups:
  - { title: 适合应对, text: '适合处理野蛮人、皇家野猪及密集地面后排，登场伤害和范围普攻能迅速扭转桥头压力。' }
  - { title: 需要提防, text: '皮卡超人、地狱之塔、地狱飞龙和威猛矿工能稳定削减生命值，建筑与低费单位还可反复牵引。' }
  - { title: 搭配思路, text: '与蝙蝠、闪电法师和小法术组合，补足对空、重置递增伤害并清理残余人海。' }
