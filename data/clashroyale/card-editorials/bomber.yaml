overview:
- 炸弹兵是一张两费地面远程部队，每次投掷炸弹都会造成范围伤害。低费用和较大的溅射范围使他很适合清理骷髅军团、哥布林和集中行进的近战部队，也能在坦克身后持续压缩对手的地面防守空间。
- 炸弹兵只能攻击地面，生命值也不足以承担前排任务。空中单位可以完全无视他的攻击，快速近战单位贴身后也会压缩投弹次数；要发挥费用优势，需要让其他单位或皇家塔吸引目标，并避免为了保护两费支援投入过多额外资源。
usage_tips:
- 防守人海或密集近战部队时，让目标先锁定皇家塔或前排，再把炸弹兵放在安全距离输出，避免他成为第一攻击目标。
- 跟随巨人等坦克推进时保持适当间距，既让前排吸收伤害，也避免对手用一个范围法术同时命中坦克后的多个支援单位。
- 面对分散单位时不要急于下牌，等待目标汇合或被拉扯到同一区域后再部署，才能充分利用每次投弹的范围伤害。
- 卡组必须保留可靠对空手段；炸弹兵过牌后若只剩地面防守，容易被气球兵或低费空军直接惩罚。
matchups:
- title: 适合应对
  text: 骷髅兵、哥布林、野蛮人等地面群体，以及围绕坦克集中推进的地面支援。只要保持距离，两费就能提供持续范围输出。
- title: 需要提防
  text: 所有空中单位、能够迅速贴身的近战部队，以及远程单体输出。炸弹兵无法还击空军，也不适合在没有前排时单独站场。
- title: 搭配思路
  text: 与巨人、戈仑石人等前排组合最直接，也适合搭配飓风法术集中敌人；在低费防守中，可由骑士或冰人承伤，炸弹兵负责清理周围地面单位。
