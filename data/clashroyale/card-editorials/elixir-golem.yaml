overview:
  - 圣水戈仑是一张三费建筑目标肉盾，被消灭后分裂为两个小圣水戈仑，每个小戈仑又会分裂为两个圣水泡泡。三种形态合计提供大量生命值和持续推进，但全部被消灭后会向对手返还四点圣水。
  - 当前返费分散在各阶段：圣水戈仑提供一点，每个小圣水戈仑提供半点，每个泡泡再提供半点。对手会随着防守推进逐步获得反打资源，因此使用者必须在返费转化为反攻前取得足够塔伤或场面优势。
usage_tips:
  - 在圣水充足且能跟上后排时部署，三费只是启动成本；若没有足够支援，分裂单位会被逐步清理并给对手送出四费反攻资源。
  - 利用治疗、狂暴和范围输出保护分裂后的多个单位，它们数量增加后更容易同时包围建筑，也更容易从范围增益中获得收益。
  - 不要在对手拥有完整高伤防守且己方后排不在轮转时桥头强推，低费肉盾的表面优势会很快转化为对手圣水优势。
  - 防守时谨慎使用，建筑目标特性限制了拉扯能力；只有在它能保住关键后排并顺势形成反击时，承担返费代价才合理。
matchups:
  - { title: 适合应对, text: '适合惩罚范围伤害不足、缺少稳定拉扯和难以快速处理多阶段单位的防守，双倍圣水阶段更容易跟上完整支援。' }
  - { title: 需要提防, text: '高效范围输出、建筑拉扯、控制和持续伤害能逐阶段清理单位，并利用返还的四费迅速组织反攻。' }
  - { title: 搭配思路, text: '与战斗天使、治疗精灵、电磁炮和范围法术搭配，用治疗保护多形态单位，并由后排处理集中的防守。' }
