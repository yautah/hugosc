overview:
  - 雷电法术是六费高伤害法术，会自动命中范围内生命值最高的三个敌方单位或建筑，并造成短暂眩晕。对皇家塔的伤害比例低于普通目标。
  - 自动选取高生命目标让落点比精确点击单个单位更重要。额外单位进入范围可能改变三道雷电的分配，施放前应确认目标排序。
usage_tips:
  - 尽量同时覆盖皇家塔、建筑和高价值后排，让三次命中都产生有效交换。
  - 利用眩晕重置地狱类递增伤害或打断关键攻击，为推进主力争取连接时间。
  - 对手可能用高生命单位吸走一道雷电，等待目标分离后再施放往往更稳妥。
matchups:
  - { title: 适合应对, text: '适合处理地狱之塔、电磁炮、女巫和多个中高生命支援组成的密集防守。' }
  - { title: 需要提防, text: '六费投入很重，廉价高生命单位或分散站位会降低三目标自动锁定的价值。' }
  - { title: 搭配思路, text: '与戈仑石人、皇家巨人和雷电巨人等重型推进配合，清除建筑与后排。' }
