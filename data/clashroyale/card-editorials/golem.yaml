overview:
  - 戈仑石人是一张八费重型前排，只攻击建筑，拥有极高生命值。阵亡时会造成范围伤害并分裂成两个小戈仑石人，小戈仑石人阵亡时还会再次造成范围伤害，使整轮推进需要分阶段处理。
  - 高费用和三秒部署时间意味着下牌后短时间内几乎没有防守余量。它更适合双倍圣水后或确认对手无法有效换路时沉底部署，再用后排和法术逐步构建推进。
usage_tips:
  - 单倍圣水阶段谨慎沉底，先确认对手换路进攻的威胁和己方低费防守牌；八费投入若被迫中途补防，后排往往无法及时跟上。
  - 后排优先补充范围伤害与眩晕单位，分别处理人海和地狱系防守；不要让多个高价值支援挤在一起承受雷电或火箭。
  - 戈仑石人阵亡的位置很重要，死亡伤害和两个小戈仑石人能继续占据路线，靠近防守单位或公主塔时价值更高。
  - 防守戈仑推进时可以反路施压，迫使对手在继续补充后排与保护另一座塔之间做选择，减少完整推进成形机会。
matchups:
  - { title: 适合应对, text: '适合在高圣水阶段承受大量伤害并保护持续输出后排，分裂与多段死亡伤害能逐步消耗防守单位。' }
  - { title: 需要提防, text: '地狱之塔、地狱飞龙、威猛矿工和皮卡超人能快速削减本体，渔夫还可改变路线并分离后排。' }
  - { title: 搭配思路, text: '与暗夜女巫、雷电飞龙、飞龙宝宝和雷电法术搭配，分别补足持续单位、范围伤害、重置和高价值解场。' }
