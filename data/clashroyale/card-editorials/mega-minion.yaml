overview:
- 重甲亡灵是一张三费空中单体单位，攻击速度不快，但每次攻击伤害较高，生命值也比普通亡灵更能承受法术。它适合防守坦克、近战单位和无法对空的推进，并在存活后跟随前排反击。
- 单体攻击意味着它处理人海较慢，移动速度和攻击距离也不足以让它独立形成稳定进攻。重甲亡灵的价值通常来自低成本防守后的剩余生命值，而不是单独在桥头施压。
usage_tips:
- 防守近战单位时可以放在其行进路线侧后方，利用空中属性避免被反击，同时减少被敌方后排范围伤害顺带命中的机会。
- 面对气球兵等空中目标应提前部署，较慢的移动和攻击间隔会放大迟下牌造成的损失。
- 存活后在前方补巨人、戈仑冰人等坦克，可以把一次防守转成低成本反击；重甲亡灵单独过河通常容易被皇家塔和低费防空处理。
- 不要用它独自处理蝙蝠或亡灵大军，单体攻击效率太低，应交给范围伤害或法术解决。
matchups:
- title: 适合应对
  text: 适合处理无法对空的近战单位，以及需要持续单体输出的坦克和气球兵；较高生命值也使它不容易被普通小法术直接清除。
- title: 需要提防
  text: 亡灵大军、蝙蝠等空中人海会利用其单体攻击，火枪手等远程防空也能在它接近前持续输出。
- title: 搭配思路
  text: 可与巨人、戈仑石人和熔岩猎犬等前排搭配，承担防空与单体输出；卡组还应准备范围伤害，补足它处理人海的短板。
