overview: [镜像法术会以额外 1 费复制上一张使用的卡牌，并按镜像等级生成对应属性；它不会出现在起手，但当前版本可以复制英雄卡。]
usage_tips: [围绕最有价值的上一张卡规划顺序，避免被无关低费卡覆盖。, 连续使用同一威胁可突破对手单一解牌循环。, 额外费用会放大亏损，确认对手缺少回应后再镜像。]
matchups:
  - { title: 适合应对, text: '适合复制对手暂时没有解牌的核心威胁或关键法术。' }
  - { title: 需要提防, text: '复制成本更高，错误出牌顺序会让镜像变成无效选项。' }
  - { title: 搭配思路, text: '与诱饵、法术循环和能迫使对手交出唯一解牌的体系配合。' }
