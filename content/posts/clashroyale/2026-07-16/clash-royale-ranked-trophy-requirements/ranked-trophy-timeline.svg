<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">皇室战争天梯奖杯门槛调整时间表</title>
  <desc id="desc">7月和8月为13000杯，9月和10月为13500杯，11月回到14000杯。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263f91"/>
      <stop offset="0.55" stop-color="#1c7bc1"/>
      <stop offset="1" stop-color="#f4b536"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#071026" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 510 C180 445 280 610 470 535 C690 448 805 560 1000 475 C1100 430 1155 420 1200 430 L1200 675 L0 675 Z" fill="#101b3f" opacity=".32"/>
  <g fill="#fff">
    <text x="72" y="95" font-size="42" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">皇室战争天梯门槛调整</text>
    <text x="72" y="145" font-size="23" font-family="Arial, 'PingFang SC', sans-serif" opacity=".9">Ranked 解锁奖杯要求从 7 月起临时下调，后续每两个月逐步回升。</text>
  </g>
  <g transform="translate(72 215)" filter="url(#shadow)">
    <rect width="1056" height="280" rx="26" fill="#ffffff"/>
    <line x1="118" y1="150" x2="935" y2="150" stroke="#d8e1ee" stroke-width="8" stroke-linecap="round"/>
    <g font-family="Arial, 'PingFang SC', sans-serif" text-anchor="middle">
      <circle cx="145" cy="150" r="30" fill="#2e7df6"/>
      <text x="145" y="160" font-size="24" font-weight="800" fill="#fff">7-8</text>
      <text x="145" y="78" font-size="44" font-weight="900" fill="#18233f">13000</text>
      <text x="145" y="112" font-size="19" fill="#647089">7月 / 8月</text>
      <text x="145" y="224" font-size="22" font-weight="700" fill="#2e7df6">现在生效</text>

      <circle cx="528" cy="150" r="30" fill="#f2a51f"/>
      <text x="528" y="160" font-size="24" font-weight="800" fill="#fff">9-10</text>
      <text x="528" y="78" font-size="44" font-weight="900" fill="#18233f">13500</text>
      <text x="528" y="112" font-size="19" fill="#647089">9月 / 10月</text>
      <text x="528" y="224" font-size="22" font-weight="700" fill="#b27000">第一次回调</text>

      <circle cx="910" cy="150" r="30" fill="#ea4f43"/>
      <text x="910" y="160" font-size="24" font-weight="800" fill="#fff">11</text>
      <text x="910" y="78" font-size="44" font-weight="900" fill="#18233f">14000</text>
      <text x="910" y="112" font-size="19" fill="#647089">11月起</text>
      <text x="910" y="224" font-size="22" font-weight="700" fill="#b73931">回到原计划</text>
    </g>
  </g>
  <g font-family="Arial, 'PingFang SC', sans-serif" fill="#fff">
    <text x="72" y="570" font-size="28" font-weight="800">重点：不是永久降门槛，而是给追赶玩家多两个月窗口。</text>
    <text x="72" y="615" font-size="21" opacity=".9">如果你现在在 12500-13500 杯之间，这几周是冲进 Ranked 的最佳时间段。</text>
  </g>
</svg>
