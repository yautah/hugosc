      function initHome() {
        const home = document.getElementById("home-view");
        home.innerHTML = "";
        Object.keys(fullData)
          .sort()
          .forEach((cat) => {
            const count = fullData[cat].length;
            home.innerHTML += `
                    <div onclick="showTable('${cat}')" class="glass-card p-8 rounded-3xl cursor-pointer category-card text-center">
                        <div class="text-5xl mb-4 filter drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]">${
                          icons[cat] || "💎"
                        }</div>
                        <h3 class="text-lg font-bold text-white mb-2">${cat}</h3>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest">${count} 项词缀</p>
                    </div>
                `;
          });
      }

      function showTable(category) {
        document.getElementById("home-view").classList.add("hidden");
        document.getElementById("detail-view").classList.remove("hidden");
        document.getElementById("current-title").innerText = category;

        const list = fullData[category];
        document.getElementById("current-count").innerText =
          `${list.length} 项可用词缀记录`;

        const tbody = document.getElementById("table-content");
        tbody.innerHTML = "";

        list.forEach((item) => {
          const typeClass = `tag-${item.type.toLowerCase()}`;
          tbody.innerHTML += `
                    <tr class="hover:bg-purple-900/10 transition-colors border-b border-slate-800/30">
                        <td class="p-5">
                            <span class="font-mono text-[11px] text-purple-300 bg-purple-950/40 px-2 py-1 rounded border border-purple-800/30">

                            </span>
                        </td>
                        <td class="p-5 text-slate-300 leading-relaxed font-light">
                            ${item.desc}
                        </td>
                        <td class="p-5">

                                ${item.type}
                            </span>
                        </td>
                    </tr>
                `;
        });
        window.scrollTo(0, 0);
      }

      function showHome() {
        document.getElementById("home-view").classList.remove("hidden");
        document.getElementById("detail-view").classList.add("hidden");
